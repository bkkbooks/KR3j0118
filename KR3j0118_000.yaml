body:
  text: 示兒編雜家類三雜説之屬提要臣等謹案示兒編二十三卷宋孫奕撰奕字季昭號履齋廬陵人其厯官無可考第十卷中稱紹熙丁巳三月侍宴春華樓聞大丞相周益公議論考之宋史紹熙元年為庚戍至五年甲寅即內禪丁巳實慶元三年殆寧宗時嘗官侍從傳寫誤為紹熙歟是編凡總説一卷經説五卷文説詩説共四卷正誤三卷雜記四卷字説五卷中第九卷前為文説後為詩説李維楨序謂文説三卷詩説二卷誤也前有開禧元年自序稱考評經傳漁獵訓詁非敢以汚當代英明之眼姑以示之子孫故名曰示兒編其書雜引衆説往往曼衍又徵據既繁時有筆誤如經説類中以廣雅博雅並言而皆云張揖作詩説類中以杜甫襲用白居易詩雜記類中謂唐太宗納巢刺王妃為妻嫂字説類中謂詩有陳他案陳他之名見于詩序奕以為詩則非皆失于考訂以至荆舒是懲句經説類中反覆論僖公無此事故孟子歸之周公正誤類中又謂僖公之事孟子誤以為周公王安石字説霸字條下稱其學務穿鑿無定論藝苑雌黃一條又稱熙豐間定有成書是正舛錯學者不能深考類以穿鑿嗤之亦間或自相矛盾文説類中契丹空紙祭文一事尤委巷不根之談其經説類中于竊比老彭訓彭為旁于黽勉從事訓黽為蛙王士禎古夫於亭雜録深取之實亦附會之論然其中字音字訓辨别異同可資考證者居多其冗雜者可削其精核者究不可廢也乾隆四十五年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀示兒編自序杜子美示宗武有詩韓退之示兒有詩學者至令誦之而東坡先生一以為聖賢事一以為利祿事殆若有所區别然君子茍不能忘其子則隨其資而示以意使之知學則一而已余之少也猶不如人今老矣所望者惟子與孫然懶惰無匹聞學褊隘上不能進之於聖賢之域下不能引之於利祿之塗則以平生之末學者示之是亦使之知學之意也茍籯無金教無經一再世不為君子之歸可不懼哉於是考評經傳漁獵訓話以立總説經説文説詩説正誤雜記字説凡七條大抵論焉而不盡盡焉而不確非敢以汚當代英明之眼姑以示之子孫耳故名曰示兒編使後世賢廣吾意不賢毋謂不汝誨也吾子其懋戒之哉開禧元祀九月上浣廬陵孫奕序
