body:
  text: 示兒編卷一宋孫奕撰總說經傳引古經傳之文雖出古聖賢之手然旁舉逺引亦必有所從始如書引人亦有言論語引周任有言之類古今皆知文言為孔子之所作以左氏襄公九年考之穆姜之薨筮之遇艮之八史曰是謂艮之隨姜曰亡是於周易曰隨元亨利貞無咎元體之長也亨嘉之㑹也利義之和也貞事之幹也君子體仁足以長人嘉德足以合禮利物足以和義貞固足以幹事然故不可誣也是以雖隨無咎案穆姜之筮後十四年而聖人生實魯襄公之二十二年也又夫子年六十有三乃始繫周易以此言解乾卦故謂之文言云昭公十二年楚靈王聞子革誦祈招之詩而感其不能自克仲尼曰古也有志克己復禮仁也信善哉及其答顔淵之問而曰克己復禮為仁則是援古志以告之也孟子論國家閒暇明政刑一章竝答滕文公以太王去邠事人皆知其為孟子之言及稽諸家語孔子謂子路曰君子而强氣則不得其死小人而強氣則刑戮洊臻豳詩曰殆天之未隂雨徹彼桑土綢繆牖户今汝下民或敢侮余孔子曰能治其國家如此雖欲侮之豈可得乎周自后稷積行纍功以有爵土公劉重之以仁及至太王亶父崇以德遜其立根置本備豫逺矣初太王都豳狄人侵之事之以皮幣不得免焉事之以珠玉不得免焉於是屬耆老而告曰狄人之所欲吾土地也吾聞之君子不以所養而害人二三子何患乎無君遂獨與太姜去之踰梁山邑于岐山之下豳人曰仁人之君不可失也從之如歸市焉天之與周民之去殷久矣若此而不王天下未之有也武庚惡能侮邶詩曰執轡如組兩驂如舞孔子曰為此詩者其知政乎此夫子訓子路之詞也孟子一則援以證政刑之說一則援以證小事大之問良由此始若夫唐明皇序孝經而謂子曰吾志在春秋行在孝經蓋得之於何休序公羊傳之文而何休又得之於鉤命决文也後漢趙岐序孟子而謂仲尼有云我欲託之空言不如載之行事之深切著明也蓋取之於太史公自序之語而太史公又取之於春秋繁露也經解引易曰差若毫釐繆以千里乃出易緯之文也王充論衡注詳見毫釐解六經主於王易始乎皇而成乎王書作乎帝而繼乎王詩始乎諸侯而終乎王禮樂制作乎王而春秋一乎尊王也六經無真字六經之中無真字非無真字也夫人而不僞也是故仙之一字聖經所不著聖人所不言以至於佛若僧若禪聖人尤不筆之於書蓋其衛道之嚴也故佛之敢入中國者乃在於經籍焚滅之久禮義衰微之末二百餘年而後始至也則六經之有功於人也大矣天帝髙而覆物者天也尊而宰物者帝也健而不息者乾也故以形體謂之天以主宰謂之帝以運動謂之乾后皇蒸辟后繼也謂繼治之君也皇大也謂圖大之君也蒸衆也謂御衆之君也辟法也謂立法之君也君臨也謂臨涖天下之君也主宰也謂宰制天下之君也皇帝王通稱皇可以謂之帝月令云其帝大皡是也亦可以謂之王禮運云昔者先王未有宫室是也帝可以謂之皇吕刑云皇帝清問下民是也亦可以謂之王大禹謨云四夷來王是也王可以謂之皇文王有聲云皇王蒸哉是也亦可以謂之帝歸妹云帝乙歸妹是也嵗祀年載通稱伊訓惟元祀陸氏釋文曰年也又引爾雅言夏曰嵗商曰祀周曰年唐虞曰載則是帝王各有定名也按堯典曰以閏月定四時成嵗舜典曰嵗二月東巡守則唐虞不特曰載也禹貢曰作十有三載乃同則夏不特曰嵗也伊訓曰太甲元年太甲上曰三年復歸於亳則商不特曰祀也洪範曰惟十有三祀又云一曰嵗周禮曰大計羣吏誅賞則必曰三嵗則周不特曰年也然則四者名異而實同何哉蓋載以始一嵗而終嵗以星一嵗而周祀以祭一嵗而遍年以禾一嵗而熟此名之所以異而實同校庠序皆在鄉三代設學果安所在嘗讀太史公儒林傳謂三代之道鄉里有教夏曰校殷曰序周曰庠蓋繇是以參諸經左氏則曰子産不毁鄉校是校在鄉矣黨正則曰屬民飲酒於序是序在鄉矣鄉飲酒禮則曰拜迎賔於庠門之外內則又曰虞庠在國之西郊是庠在鄉矣先王盛時學校遍於天下故民於是時仰父俯子左詩右禮無非禮義之教學記云家有孰黨有庠術有序此又一證也由是言之太史公得非有所據而云五行先後不同五行一也大禹謨則曰水火金木土榖惟修洪範則曰一水二火三木四金五土月令則曰春木夏火中央土秋金冬水其言先後不同何也曰聖經之言各有攸主大禹謨之所主者養民之政故以五行之相剋者言之剋下為財故也洪範之所主者自然之數故以五行之生數言之舉生數則成數可知矣月令之所主者四時之令故以五行相生之序言之是以不同也問禮樂官名或謂夫子大聖也以生知之資天縱之能當無所不知無所不聞而猶問禮問樂問官名有諸曰於傳有之曽子問曰吾聞諸老聃問禮也樂記曰唯丘之聞諸萇𢎞問樂也昭公十七年傳曰仲尼聞之見於郯子而學之問紀官也曰然則何獨於斯三者是學曰五帝殊時不相㳂樂三王異世不相襲禮至於官制時異事異㳂革尤多不恥下問是以謂之聖也倒文六經或倒其文如易之西南得朋吉凶者失得之象類皆有之唯詩為多如中谷中林中河中路中原中田家室裳衣衡從稷黍瑟琴鼓鐘斯螽西南東南下上羊牛樂豈息偃甥舅孫子女士京周家邦鼐鼎齊音資明不一而盡記雖有吾得坤乾焉書雖有月正元日或四三年又北東入于海皆有說也蓋歸藏易以純坤為首其次第不得不然也書前有正月上日則後不得不以月正元日錯綜言之也此不言三四而曰四三者自多而至少故四言於三之上也又且水之勢北折而東故東言於北之下也然倒此一言不徒其理為長而又且文矣至如祭義云祿爵慶賞祭統云備外內之官閒居云春秋冬夏中庸云設其裳衣大率若此字訓辨皇者大也天曰皇天父曰皇考母曰皇妣王者大也大父曰王父大母曰王母極中也正也至也書曰皇極詩曰四方之極皆中也兒寬傳天子建中和之極師古曰極正也洪範云六極者窮也孟子曰使我至於此極也亦同格至也正也詩曰祖考來格書曰格爾舜皆至也來也書曰格其非心孟子曰格君心之非皆正也學記云扞格者止也格舊音户革切或如字擾亂也馴也書曰俶擾天紀亂也周禮曰以擾萬民馴也亂亂也治也書曰刑暴亂語曰亂大謀謂亂也周官曰亂爾有政語曰武王有亂臣謂治也古文尚書治字作乿與亂相類後人不識古乿字訛以亂訓治耳錫畀賚上豫下也書曰敷錫又曰不畀詩曰賚豫也皆上豫下之謂也如師錫帝納錫大龜此又古者下錫上亦可謂之錫也貢獻供下奉上也書曰任土作貢春秋來獻捷孟子曰無以供粢盛皆下奉上之謂也台卬朕我也書曰以輔台德詩曰人涉卬否皆我也古者上下皆稱朕巽朕位堯自稱也朕德罔克禹自稱也秦始皇方不許臣下稱朕乃而若汝也書曰惟乃之休又曰其害于而家凶于而國項籍傳吾與若北面懷王皆訓汝也覲下見上也覿見也非上非下也周禮秋見曰覲下見上也語曰私覿揚子曰覿君子者問鑄人無所不見也如此往彼也適往也非彼非此也春秋如齊如晉皆之彼也董仲舒曰道者所繇適治之路則無所不往也蕩蕩廣大也又放蕩也語曰蕩蕩乎無能名焉書曰王道蕩蕩皆美辭也詩曰天下蕩蕩無綱紀文章又曰蕩蕩上帝又非美辭也囂囂自得也又愁歎也孟子囂囂然曰又曰人知之亦囂囂皆自得也詩曰讒口囂囂又愁聲也堇堇少也前地理志曰豫章出黃金然堇堇師古曰堇讀作僅少也區區小也禮樂志曰河間區區小國楚元王傳曰豈為區區之禮哉謂小也鞅鞅不滿也髙帝紀曰心常鞅鞅師古音於亮反韓信傳曰居常鞅鞅師古音於兩反拳拳勤謹之意也中庸曰得一善則拳拳弗失之矣胸胸擾擾之意也高帝紀天下胸胸謂喧擾也云云諄諄之意也韓愈詩曰諧笑方云云往往意其必然之謂也仲舒傳王道往往而絶無限之謂不訾蓋寬饒傳用不訾之軀臨不測之險無聊之謂無俚欒布傳其畫無俚之至耳晉灼曰揚雄方言曰俚聊也許慎曰賴也為其計畫無所聊賴不難之謂何有語曰從政乎何有孟子曰於王何有不幸之謂無祿詩曰念我無祿以詞譏之曰刺刺幽王刺厲王皆作詩以刺之如操刀以刺人然以法殺之亦曰刺記曰司寇正刑明辟以聽獄訟必三刺春秋魯殺大夫曰刺言用三刺之法因其世傳而繼之曰襲揚子曰襲堯之爵掩其不備而取之亦曰襲左莊公二十九年夏鄭人侵許凡師有鐘鼓曰伐無曰侵輕曰襲杜曰掩其不備也爾者如此也語曰吾無隱乎爾耳者而已也孟子曰盡心焉耳矣曾字諸經除人姓及曾孫孔安國解詩信南山郭璞注爾雅曾孫之曽並音層之外曾字並無音獨論語曾謂泰山不如林放乎音則登切曾是以為孝乎音增馬融曰承順父母顔色乃為孝也正義亦引是說則是曾訓乃也至於曾由與求之問雖無音孔曰謂子問異事耳則此二人之問安足大乎又訓則也公孫丑上爾何曾比豫於管仲又曰曾比豫於是曾音增趙云何曾猶何乃也丁云則也乃也禮部韵亦訓則也併援曾是以為孝乎為證檀弓上喪三年以為極亡則弗之忘矣鄭曰則之言曾也二說皆通而乃字勝嘗以類推之詩曰曽不容刀曽不崇朝曾是不意曾莫惠我師孟子曾不知以食牛干秦穆公之為汙也荀子榮辱篇偷生淺知之屬曾此而不知也揚子問神篇曾范蔡之不若漢周勃張相如兩人言事曾不出口及近世文集中有曾不聞曾不知之類皆作層字讀更說不通合盡讀如曽是以為孝乎之曾屑字屑之一字先儒於書訓盡於詩於孟子訓潔以今驗之凡物之為屑皆輕故屑之言輕也如多方大淫圖天之命屑有辭則言輕有辭說又曰爾乃屑播天命言輕播棄天命谷風曰宴爾新昏不我屑以言宴安於新昏而於我舊室則不輕用君子偕老曰不屑髢也言婦人髮美不輕用它人之髮為髢公孫丑上是亦不屑就已是亦不屑去已告子上蹴爾而與之乞人不屑也告子下豫不屑之教誨也者是亦教誨之而已矣宜一以輕釋之非潔也不然盡心下有云欲得不屑不潔之士而與之是狷也何以既言不屑又言不潔乎惟唯維字六經有惟唯維三字或從心或從口或從糸皆通作助辭又訓獨但從心者又訓思尚書皆從心乃盡為助辭如我則末惟成德之彥洪惟我幼冲人是也詩皆從糸亦多是助辭至如縶之維之則訓繫四方是維紼纚維之則有維持之義止有一字從心乃作思惟之義曰載謀載惟是也左氏傳亦皆以唯為助語論語乃惟字亦助辭但唯仁者唯上智唯我與爾唯天為大唯堯則之從口而訓獨也孟子亦有此句則作惟故亦訓獨其餘如非惟百乘之家為然之類皆訓獨也蓋字畫不一而所訓有同異學者當隨其文意求之若夫周易之無字周禮之法字雖畫異於他經之無與法而音義同有亡字記曰凡養老五帝憲三王有乞言鄭康成讀有為又內則周禮曰量其力有三均鄭康成讀有三為又參弓人書曰朞三百有六旬有六日東坡讀二有為又堯典詩曰不日有曀蘇黃門云古有又通終風則經意甚明如本字讀則說不通集韵四十九宥韵中又二十七而有字與其一注云復也通作又論語曰有若亡我獨亡亡而為有今亡矣夫焉能為亡不如諸夏之亡也今也或是之亡也以上舊讀作存亡之亡者非當讀為無唯孔子時其亡也自牖執其手曰亡之合如本字讀諸子史以亡作無者甚多未能槩舉當隨意是正之不字世俗語言及文字中所急者惟不字極關利害韵書中如府鳩方久二切者施之於詩與賦押韵無不可者至於市井相與言道塗相與語官吏之指揮民庶將帥之號令士卒鄉校之教訓童蒙凡出諸口而有該此字者非以逋骨反者呼之斷莫能喻陳正敏遁齊閒覽云不字本方鳩切人皆以逋骨反呼之遍檢諸韵並無此音竊謂舉世同詞必有所自始逋骨切殆不可廢按廣韵八物韻中不與弗同則近於逋骨聲然亦庸夫難曉况禮部韵略不出此音徒見於佛經有曰不也世尊乃作弗聲讀亦可一證今以司馬公切韵圖考之明舉一杯字以發聲曰杯貝不即是與逋骨切同音信乎此音不可廢矣是字也本有四音自陳正敏之說興而人始疑自溫公之圖出而音始定苐溫公之圖近行於世知音為希故表而出之示兒編卷一
