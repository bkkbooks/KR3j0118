body:
  text: 示兒編卷十五宋孫奕撰雜記人物通稱父母稱嚴君家人卦樗里子亦號嚴君史記秦封號為嚴君母可稱大人前淮陽王欽傳舅張博云王遇大人益懈是也又范滂稱母為大人叔亦可稱大人前漢䟽受謂廣曰從大人議是也兄為伯氏何人斯詩曰伯氏吹壎狐突亦為伯氏檀弓注伯氏狐突别氏妻父亦可稱舅壻亦可稱甥爾雅妻之父為外舅妻之母為外姑注謂我舅者吾謂之甥然則亦宜呼壻為甥孟子曰帝館甥于貳室是天子可稱鉅公前郊祀志欲見鉅公張晏曰天子為天下父故曰鉅公也可稱縣官前東平王傳今署縣官年少注謂不敢指斥成帝故謂之縣官太后亦稱東宮劉向傳依東宫之尊師古曰東宫太后所居也太子内官稱孺子前漢武五子傳納史良姊韋昭曰良姊太子之内官也太子有妃有良姊有孺子凡此三等妾亦稱良人前漢上官后傳内與父諸良人侍御皆亂師古曰良人謂妾也侍御則兼婢矣嬖幸之舍亦曰玉堂谷永傳仰損椒房玉堂之盛寵師古曰玉堂嬖幸之舍也揚雄傳上玉堂晉灼曰黄圖有大玉堂小玉堂殿人有名青史應劭風俗通曰青史善著書即青史者人姓名也書亦名青史杜甫贈鄭十八曰古人日已逺青史字不泯注云殺青為竹簡之史也觀論語遇丈人荷蓧注曰老者則不特杜甫稱羙丞相為丈人也天下可以為物莊子在宥篇有土者有大物是也人亦可以為物泰誓曰惟人萬物之靈是也樂記食三老五更於太學謂更歴事者則知不惟五夜為五更也李義山云鶯能歌子夜謂晉人有子夜者善歌則知非甲夜乙夜之類也繫辭以天地人為三才而輪人之斬三材謂轂輻牙弓人之合三才謂膠漆絲也王旗曰太常君牙曰紀于太常注王之旌旗畵日月曰太常是也禮官亦曰太常漢百官表云奉常秦官景帝更名太常注謂尊大之義是也車蓋亦得稱屋漢髙紀曰紀信乃乗王車黄屋左纛謂天子車以黄繒為蓋裏車亦得稱路襄公二十六年享子展賜之先路賜子産大路皆車之總名日亦曰東君前郊祀志云晉巫祠東君師古曰東君日也元日亦稱三朝班固東都賦曰春王三朝㑹同漢京注云三朝元日也朝陟遙反謂嵗之朝月之朝日之朝是也四月亦稱正月詩正月繁霜注云正月夏之四月是也曲亦名陽春宋玉對楚王問曰其為陽春白雪屬而和者不過十人曲亦名九秋陸士衡日出東南隅行云丹唇含九秋注九秋曲名矢名㤀歸出劉向新序云楚王載㤀歸之矢以射兕於夢澤草亦名㤀歸出文選陸士衡詩安得㤀歸草言樹背與襟注謂㤀憂草稻亦稱嘉𬞞曲禮云稻曰嘉𬞞是也雉亦稱華蟲益稷篇云山龍華蟲是也山有羊腸酈道元水經注羊腸盤道三十六囘在成州仇池山又見後漢白馬氐傳水之縈廻者亦曰羊腸後漢鄧訓傳所謂羊腸倉是也酒名屠蘇廣韻屠蘇酒元日飲之可除瘟氣是也屋亦名屠蘇劉孝威結客少年塲行云障月錦屠蘇是也竹有名龍鍾杜寄君岑長史云何大龍鍾極于今出處妨薛云按廣韻龍鍾竹名世言龍鍾取此義也謂其年老如竹之枝葉搖曵而不能自禁持也予攷之廣韻玉篇籠籦竹名廣志云可為笛二字皆從竹籠盧紅切籦職容切大宗伯以禽作六摯而羔與其一者是獸亦可謂之禽也攷工記言天下之大獸五而羽與其一者是禽亦可謂之獸也蚊蚋亦名白鳥杜寄劉峽州云江湖多白鳥天地有青蠅杜修可云一謂鷗鷺之類詩言白鳥翯翯是也喻賢者之潔白乃弃江湖之間一謂蛟蚋也以譬小人云賢者處亂世欲隠則為蚊蚋所噆欲出則為青蠅所汚鳥有名竹林杜寓同谷縣云竹林為我啼青晝西清詩話云崇寧間有貢士自同谷來籠一禽大如雀色青善鳴曰竹林鳥也鴝鵒又名𤣥鳥螢火又名丹鳥並出古今注烏反哺亦名慈烏雞反哺亦名孝雉出倦游雜録云吐綬鷄人名飛燕前漢趙飛燕立為皇后注云善舞馬亦名飛燕謝靈運㑹吟行云飛燕躍廣途西京雜記云文帝有馬九匹一名飛燕騮人名飛廉滕文公注云紂之臣風伯亦名飛亷離騷經後飛亷使奔屬是也觀名風亷馮衍顯志賦云草亦名風亷本草羊謂之腔韓愈病中贈張十八云酒壺綴羊腔是也猪亦謂之腔張鷟朝野僉載云按後一腔凍猪肉是也竹謂之个史記貨殖傳云竹竿萬个是也舟與鳥獸亦可謂个杜甫屏迹云漁舟箇箇輕絶句云兩箇黄鸝鳴翠栁夜歸云峽口驚猿聞一箇螢火云却繞井欄添箇箇題栢大山居云蕭蕭千里馬箇箇五花紋是也一説五花紋為箇非謂匹馬為箇也人物異名人物之異名其來尚矣天子曰天辟前五行志天辟惡之如淳曰天辟謂天子也師古曰辟音壁曰鉅公曰縣公並見人物通稱禾絹南北史父曰郎罷子曰囝音蹇閩俗呼父為郎罷呼子為囝出藝苑雌黄舅姑曰尊章漢廣川王傳背尊章師古曰尊章猶言姑舅也兄弟妻相謂曰先後曰娣姒曰妯娌郊祀志見神於先後宛若孟康曰兄弟妻相謂先後宛若字也師古曰先蘇見反後胡構反古謂之娣姒今閩中俗為先後呉楚俗呼為妯娌音軸里長嫂曰邱嫂楚元王傳過其邱嫂食應劭曰邱姓也孟康曰西方亾女壻為邱壻邱空也兄亾空有嫂也張晏曰邱人也長嫂稱也師古曰史記邱字作巨邱巨皆大也張説得之女壻曰邱壻見上曰倩淳于意傳曰黄氏諸倩注齊人呼女壻為倩言可假倩説文曰東齊間壻謂之倩曰甥見前人物通稱太守曰郡長漢髙祖紀懐王以沛公為碭郡長韋昭曰秦名曰守是時改曰長郡将嚴延年傳繡見延年新将師古曰新為郡将也謂郡将者以其兼領武事者也邑長曰落長王温舒傳置伯落長以収司奸師古曰邑落之長帥名曰五百晁錯傳四里一連有假五百服䖍曰五百帥名也公車官曰大誰漢五行志故公車大誰卒師古曰大誰者主問非常之人云姓名是誰也大誰本以誰何稱因用名官有大誰長今此卒者長所領士卒也主餅餌曰湯官漢百官表師古曰湯官主餅餌主鑄錢曰鍾官百官表如淳曰鍾官主鑄錢官也仰塗者曰􅚽人揚雄曰􅚽人亾則匠石輟斤而不敢妄斲師古曰塈即今之仰塗也抆拭也故仰塗者為人音乃髙反又音廼何反操舟曰榜人子虗賦榜人歌聲流喝張楫曰榜船也月令曰命榜人榜人船長也師古曰榜音謗舟師曰長年三老杜詩長年三老遙憐汝注曰舟師也民曰氓隸子虗賦使車曰馹騎六帖軺車馹騎星駕皆使車也夫人車曰魚軒閔二年歸夫人魚軒注云夫人車以魚皮為飾天子旗曰翠華相如上林賦建翠華之旗楚靈王弓名大屈昭七年楚子享公于新䑓好以大屈注云宴好之賜大屈弓名繁弱鉅黍荀子性惡篇繁弱鉅黍古之良弓也宋矢名金僕姑荘十一年乗邱之役公以金僕姑射南宫長萬注云金僕姑矢名箭曰㤀歸見前人物通稱礌石曰藺石城上擂石也紙曰楮先生韓文毛穎傳穎與㑹嵇楮先生友善剡藤舒元輿悲剡溪古藤文烏絲欄朝野僉載宋亳間紙有成道界者謂之烏絲欄筆曰毛錐子五代史𢎞肇曰安朝廷定禍亂直須長槍大劍若毛錐子安足道哉管城子毛穎傳秦皇使䝉恬封諸管城號為管城子中書君又上嘗呼為中書君墨曰陳𤣥又與綘人陳𤣥黑松使者陶家瓶餘事曰𤣥宗御案墨曰龍香劑見墨上有道士如蠅而行叱之即呼萬嵗曰臣黒松使者也見雲仙散録硯曰陶泓毛穎傳與弘農陶泓石鄉侯鳯翔退耕傳薛稷為硯封石鄉侯交牀曰胡牀晉桓伊下馬據胡牀取笛三弄井欄曰銀牀許彦周云嘉祐中漁人網得一石刻曰井梧花落盡一半在銀牀注云井欄也簾曰蝦須蘇易簡越江吟云蝦須半捲天香散席曰龍須唐鳯翔府土貢龍須席鏡曰菱花六帖魏武帝有菱花鏡扇曰六角王羲之書六角扇蒲葵謝安傳鄉人有五萬蒲葵扇安取其中者捉之價數倍白羽杜甫茅齋詩云江蓮揺白羽註扇也輕箑杜詩輕箑頻相向注扇也鞭曰馬箠前婁敬曰周家太王杖馬箠居岐香爐曰博山晉東宫舊事太子納妃有銀博山香爐三古詩博山爐中百和香琴曰綠綺晉傳元琴賦相如之綠綺圍棊曰手談曰坐隠世説王中郎以圍棊為坐隐支道林則又以圍棊為手談也船首曰文鷁子虗賦浮文鷁注云鷁水鳥也畫其象於船首虎皮曰皋比莊十年䝉皋比而先犯之注皋比虎皮也犀角曰黑暗象牙曰白暗酉陽雜俎云波斯諸犀角為黒暗象牙為白暗蚜螺曰紫貝南楚新聞牛曰狂犘桞子厚詩蹊竹闘狂犘音麻牛名出巴中又見爾雅馬曰驚帆古今注云曺真有駿馬名驚帆飛黄淮南子黄帝時飛黄服皂肅爽定公三年唐成公有兩乗肅爽馬注云肅爽駿馬名爽音霜犬曰韓盧宋㹱毛穎傳韓盧與宋㹱㹱音鵲宋國之良犬也黄耳晉陸機有犬名黄耳羊曰羙髯主簿古今注胡須郎幽異記羊名髯参軍古今注猪曰長喙参軍古今注烏金朝野僉載唐人畜猪致富號為烏金豪猪曰帚獂相如長楊賦師古曰豪猪一名帚獂獂音桓猫曰䝉貴又曰烏員酉陽雜俎白老嵇神録建州刺史見新政家有猫兒白老龜曰靈蔡張景陽七命曰兆發靈蔡僂句昭二十五年魯大夫臧氏龜名僂句僂力至反句居具反𤣥衣督郵古今注洞𤣥先生因話録先知君抱朴子鼈曰河伯從事古今注河伯使者同上小魚曰魚婢爾雅注蟹曰蠣奴海物異名記嶺南人呼為蠣奴蠣壳中有小蟹時出取食而又入一名蠏奴又有小蟹附之如榆莢名蠏奴無腸公子抱朴子蝦蟆子為科斗爾雅它釋魚䖝曰白鳥金樓子小蜘蛛為喜子爾雅蠨蛸注云小蜘蛛長脚者俗呼為喜蜘蛛名絡新婦本草蟋蟀名懶婦古今注蟋蟀一名蛬濟南人謂之懶婦莎鷄名促織古今注莎雞名促織一名促機一名絡緯蚯蚓名歌女古今注江東人呼歌女亦名鳴蟬曰齊女董仲舒荅問書蟬名齊女齊后酉陽雜俎世傳蟬化齊后螢火一名耀夜又曰夜光宵燭古今注蠅虎一名蠅狐古今注一名蝇豹蜻蜓名青弁使者同上蛺蝶曰鳯子古今注蛺蝶大者喻鳯子鶴曰丹哥秘閣閒談云道士趙自然詩丹哥時引鳯謂鶴也鴈曰雁奴玉堂閑話鴈宿於江湖渚中動輒千百大者居中令雁奴圍而警捕者霜信古今詩話北方白鴈少白鴈至而霜降河北人謂之霜信殊翁前禮樂志殊翁雜五采文孟康注曰鴻鴈類也言其文采殊異也鴿曰飛奴開元遺事白鷺曰舂鉏爾雅雪客談苑雀曰嘉賔古今注知更開元遺事鷹鶻曰决雲兒同上子􅨼曰催歸玉壺清話退之詩云催歸日去西魯直謂子規也别名姊歸髙唐賦云姊歸思婦爾雅曰巂周郭璞曰子巂鳥或曰即子規一名姊歸嶲胡圭切鶯曰金衣公子開元遺事明皇見鶯呼曰金衣公子鸚鵡曰雪衣娘明皇雜錄天寳中鸚鵡養宫中號雪衣娘緑衣使者開元遺事明皇封隴客談苑鶯曰搏黍博物志雞曰戴冠郎異聞集猿曰野賔野説五分想裏猿名之曰野賔山公因話錄李約養猿名山公巴西侯同上報時猿天寳遺事髙太素構清心亭每一時猿即啼目曰報時猿牡丹曰木芍藥李翰林集序云開元中禁中初重木芍藥即今牡丹也瑞香曰錦薰籠后山叢語俚俗號瑞香芍藥錦熏籠蘭香曰羅勒羅勒北人呼蘭香為石勒諱也芙蓉一名荷花一名水芝水花古今注菱曰水栗武陵記曰兩角曰菱曰角四角曰芰通曰六貫辛夷曰木筆本草新雉甘泉賦列新雉於林薄師古曰新雉即辛夷也支子樹曰鮮支子虗賦鮮支黄礫師古曰鮮支即今梔子樹也桃實自乾不落者名桃奴本草柑曰木奴風土記曰李衡武陵種柑橘十樹號千頭木奴櫻桃曰崖蜜東坡橄欖詩已輸崖蜜十分甜事見鬼谷子崖蜜櫻桃也橄欖曰南威太平廣記石榴甜者曰天漿酉陽雜俎枇杷曰盧橘相如賦盧橘夏熟東坡曰枇杷也龍眼為荔支奴海物異名記嶺南人呼為荔支奴棗曰羊角鄴中記有羊角棗雞心蜀志有雞心細睿之棗龍骨地名志河中府貢龍骨棗草曰書𢃄鄭康成有書𢃄草甘草曰國老大黄曰將軍本草芭蕉曰巴且子虗賦文穎曰巴且草一名芭蕉師古曰且子余反芋曰踆鴟前史蜀卓氏傳㟭山之下沃野有踆鴟上音蹲踆鴟芋也筍曰稚子杜詩竹根稚子無人見唐人食筍詩云稚子脱錦劍是也竹萌爾雅釋草茄子曰落蘇曰崑崙瓜酉陽雜俎蘿蔔曰土穌曰蘆菔杜甫病後歌云金瑞土穌静如練東坡云即今之蘆菔也茗曰酪奴洛陽伽藍記瑞草魁杜牧茶詩云山寔東呉有茶稱瑞草魁栢曰蒼官竹曰青士大唐新語樊宗順園記桐枝曰鳯條酉陽雜俎栁曰天棘杜詩天棘夢青絲王元之謂栁也㯶櫚名蒲葵廣雅魚際曰絲瓜瑣碎録酒曰歡伯酒麴生封氏見聞記般若湯酒譜北僧謂酒為般若湯青州從事世説新語謂好酒為青州從事可以到臍下醋為平原都郵云鬲上住合資而飲曰醵飲集韻盛酒榼曰鴟夷鄒陽傳子胥鴟夷師古曰鴟夷即今之盛酒鴟夷榼小甕為儋蒯通傳守儋石之儲應劭曰齊人名小甕為儋受二斛晉灼曰石斗名也師古曰甕都鑑反或曰儋者一人所肩儋也鐶餅曰寒􅀈事賛又嘉話云鐶餅曰寒具雪為滕六風為㢲二幽怪錄蕭至忠将獵黄冠曰若令滕六降雪㢲二為風即蕭君不復獵矣水津為歩韓愈羅池廟碑言歩有新船注嶺南謂水津為歩村市為虚青緗雜記嶺南謂村市為虚市之所在有人則滿無人則虛也炭火曰活火李約性嗜茶嘗曰茶湏縱火炙活火煎活火謂炭火之熖金釧名金條脱盧氏雜説瑇瑁曰文甲前西域傳賛明珠文甲如淳曰甲即瑇瑁也近身小衫曰厠牏石奮傳取親中帬厠牏師古曰中帬若今言中衣蘇林曰牏音投師古曰厠牏者近身之小衫若今汗衫也不曉事曰褦襶集韻惡言罵詈名僝僽同上獄名若盧漢百官表若盧少府屬官如淳曰藏兵器品令曰若盧郎中二十人主弩射漢儀注有若盧獄令主治庫兵将相大臣王商傳丹等奏請詔商詣若盧詔獄孟康曰若盧獄名屬少府黄門北寺是也北軍劉向傳章交公車人滿北軍如淳曰漢儀注中壘校尉主北軍壘門内校一人主上書者獄上章於公車有不如法者以付北軍尉以法治之聨繫囚徒曰胥靡楚元王傳胥靡之晉楚曰胥相也靡随也師古曰聫繫使相隨而服役也故謂之胥靡猶今之役囚徒以鎻聫綴耳物重名物之名有重言之者鳥曰周周文選阮嗣宗詠懐曰周周尚銜羽又見韓子鶼鶼比翼爾雅秩秩爾雅秩秩海雉如雉在海中山燕燕毛詩燕燕于飛獸曰猩猩曲禮猩猩能言狒狒爾雅狒狒似人被髪費費丈選揚雄羽獵賦云絹嘄陽師古曰嘄陽費費也人面黒耳有毛反踵見人則笑脣蔽其目嘄工聊反費扶味反邛邛爾雅邛邛屯嵯注云比肩蟲曰蝆蝆方言即螳螂蜻蜻爾雅蚻蜻蜻注如蟬而小鸜鵒曰八八兒王虗中勸孝文鯉曰六六魚宋景文詩尺素愁憑六六魚䇿䇿宋齊邱化書云庚氏之魚名䇿䇿堂堂又云辛氏之魚名堂堂因物得名世有所出所嗜所作因以冠名者多矣莫邪作寳劍而名其劍曰莫邪賈誼傳吊屈原賦莫邪為鈍兮應劭曰莫邪呉大夫也作寳劍因以冠名劉白墮善釀酒而名其佳酒曰白墮洛陽伽藍記蕃中畢氏羅氏好食因謂所食者為畢羅資暇録胡人常食餅而名胡餅書宗爰幅胡人常食核桃而名胡桃湘素雜記潘州郭使君療小兒多用此物毉家因名曰使君子本草人牽牛來易藥而名其藥曰牽牛同上食魚張口吹沙青雀喜盗食脂膏而名竊脂並食遶王桑扈藟附於松柏而名寄生陸璣疏櫻桃為含於鳥故名含桃呂氏春秋注王羲之以禽來食林檎之實名林檎曰來禽廣志林檎似赤柰子一名來禽言味甘熟則來禽也尚書故實王内史與蜀郡太守書求櫻桃來禽曰給藤子皆囊盛為佳函封多不生漢中之地有蟲曰朐忍因名縣為胊忍漢祠太一使樂人侯調樂聲坎坎因名樂作坎侯前書阮咸作銅器似琵琶又易以木因名琵琶作阮咸又改為月琴唐元僧傳僂句之地出龜則名龜曰僂句昭二十五年臧㑹竊其寳龜僂句注云僂句龜所出地名蔡地出龜則名龜曰蔡前食貨志元龜名蔡師古曰本以蔡出善龜故因名龜為蔡冀北出良馬則名馬曰驥注曰論語驥不稱其力云冀出良馬之地故良馬因謂之驥衛地出驢則名驢曰衛資暇録云世呼驢為衛衛地出驢其在兹乎巢元修所嗜之菜謂之元修菜房州有異人戴三朶花名之曰三朶花江東記牡丹曰姚黄魏紫歐公牡丹譜荔枝曰十八娘紅狀元紅蔡君謨荔枝譜以至鄭國渠河渠書劉氏冠漢髙祖紀謝公墩晋謝安傳萊公竹言行録皆類此示兒編卷十五
