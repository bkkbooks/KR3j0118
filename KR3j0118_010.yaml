body:
  text: 示兒編卷十宋孫奕撰詩說出奇杜詩只一字出奇便有過人處如二月已破三月來一片花飛减却春朝罷香烟携滿袖生憎柳絮白於綿何用浮名絆此身則下得破字减字携字於字絆字皆不可及以至倒用一字尤見工夫如蜀酒禁愁得無錢何處賒草堂即事客睡何曾著秋天不肯明客愁只作披衣慣長從漉酒生漫成紅稻啄餘鸚鵡粒碧梧棲老鳳凰枝秋興凡倒著字句自爽健也屢用字杜陵翁獨為詩人冠冕者吐辭不凡敻出塵表有受字自字不肯字前輩能言之如過字已經宗工巨儒道破然愈用而愈新者請復拈出所謂龜開萍葉過屏迹蛟龍引子過到村四十明朝過守歲何事炎天過萬丈潭步履宜輕過庭草讀書難字過漫成俊鶻無聲過朝雲裏不聞雙鴈過戲作河廣傳聞一葦過洗兵馬則孰不喜談而樂道若乃用破字如讀書破萬卷上韋左丞相嘗新破旅顏茅堂檢校收稻梅蕊臘前破江梅戀闕丹心破散愁歌長擊樽破屏迹白團為我破湘江悠悠邊月破雨鯨力破滄溟贈張四學士清風破炎暑雨干戈滿地客愁破䕫州歌吾廬獨破受凍死亦足茅屋為秋風所破歌又用一字如乾坤一腐儒江漢天地一沙鷗旅夜書懷江漢一歸舟懷灞上遊長嘯一含情公安懷古防身一長劍投贈哥舒開府每蒙天一笑能畫萬古一長嗟湘南夕望回首一茫茫懷錦水居士社稷一戎衣重經昭陵猶作一飄蓬老病山陰一茅宇遣興悲風方一醒酬薛十二判官見贈一擬問髙天題郭明府屋壁一起轍中鱗蕭二十使君吏呼一何怒婦啼一何苦石壕吏飄然時危一老翁冬狩行江湖滿地一漁翁秋興衮職曾無一字補題省中萬古雲霄一羽毛詠懷浦上童童一青蓋浦樹為風雨所拔歌宿昔一逢無此流寄裴施州先判一飲醉如泥赴成都草堂途中有作又用信字如作客信乾坤刈稻了詠懷吟詩信杖扶徐步冥搜信客旌贈鄭諫議所過信席珍寄薛三郎中信然龜觸網遣悶信知生男惡兵車行信是德業優毒熱太陽信深仁西閣曝日疾惡信如讐除草逸羣絶足信殊傑沙苑行兒童莫信打慈鴉題桃樹春風自信牙檣動城西陂泛舟又用生字如春泥百草生登嶽陽樓春氣晚更生晚登瀼上湍减石稜生西閣望雨衆壑生寒早移牀水生春纜沒登白馬潭欲得淮王術風吹暈已生晚月牛女年年渡何曾風浪生天河二月六夜春水生春水生樓上炎天氷雪生江陵新樓城大小二篆生八分李潮八分歌又用覺字如時危覺凋喪雨無人覺來往西郊詩成覺有神獨酌厨烟覺逺庖題新津北樓未覺村野醜遭田父泥飲飄蕭覺素髮義鶻但覺髙歌有鬼神醉時歌已覺氣與嵩華敵閬山歌不覺前賢畏後生戲為放筯不覺金盤空設鱠長歌取樂喧呼覺船重晚携酒泛江凡此不厭其數用也練字詩人嘲弄萬象每句必須練字子美工巧尤多如春日江村詩云過懶從衣結頻遊任履穿又云經心石鏡月到面雪山風陪王使君晦日泛江云稍知花改岸始驗鳥隨舟漫興云糝徑楊花鋪白氊㸃溪荷葉疊青錢皆練得句首字好也北風云爽携卑濕地聲拔洞庭湖壯遊云氣劘屈賈壘目短曹劉牆泛西湖云豉化蓴絲熟刀鳴鱠縷飛早春云紅入桃花嫩青歸柳葉新秋日䕫府詠懷云峽束滄江起岩排石樹圓建都十二韵云風斷青蒲節霜埋翠竹根柴門云足了垂白年敢居髙士差皆練得第二字好也復愁云野鶻翻窺草村船逆上溪移居東屯云子能渠細石吾亦沼清泉收稻云誰云滑易飽老藉軟俱勻遣悶云暑雨留蒸濕江風借夕凉柴門云石亂上雲氣杉清延月華水宿遣興云髙枕翻新月嚴城疊鼓鞞過津口云和風引桂楫春日漲雲岑春歸云逺鷗浮水靜輕燕受風斜泛江作云風蝶勤依槳春鷗懶避船春日江村云捫蘿澀先登陟巘炫反顧皆練得句腰字好也寫懷云無貴賤不悲無富貧亦足風疾舟中伏枕書懷云烏几重重縛鶉衣寸寸針橋陵詩云王劉美竹潤裴李春蘭馨謁𤣥元皇帝廟云仙李盤根大猗蘭奕葉光贈虞十五司馬云爽氣金天豁清談玉露繁絶句云江碧鳥逾白山青花欲燃寄張十二彪云數篇吟可老一字買堪貧皆練得句尾字好也至於緑垂風折笋紅綻雨肥梅雪嶺界天白錦城曛日黃破柑霜落爪嘗稻雪翻匙霧交才灑地風逆旋隨雲檢書燒燭短看劒引杯長紫崖奔處黑白鳥去邊明皆練得五言全句好也無邊落木蕭蕭下不盡長江滚滚來登髙旁見北斗向江底仰看明星當空大返照入江翻石壁歸雲擁樹失山村影遭碧水潜勾引風妬紅花却倒吹落花皆練得七言全句好也屬對不拘人皆知草堂先生四十明朝過飛騰暮景斜杜位宅守歲羈栖秋見裏二十四回明初月百萬傳深入寰區望匪他散愁戎馬不如歸馬逸千家今有百家存白帝皆為偏對不知近接西南境長懷十九泉秦川雜詩酒債尋常行處有人生七十古來稀曲江不害為正對至於雙雙瞻客上一一背人飛歸鴈蒼茫城七十流落劍三千寄賈司馬十五男兒志三千弟子行示宗武圭竇三千士雲梯七十城送郭中丞秋水才深四五尺野航恰受兩三人南鄰霜皮溜雨四十圍黛色參天二千尺古柏行又未始有一字非的對也先生詞源滚滚不擇地而出無可無不可何拘拘謭謭所可議爾汝爾汝羣物前此未有倡自少陵白鹽山詩云它皆任厚地爾獨近髙天花鴨詩云稻粱占汝在作意莫先鳴落日云濁醪誰造汝一酌散千憂梔子云無情移得汝貴在映江梅病馬云乘爾亦已久天寒關塞深雞詩云充庖爾輩堪問俗人情似瘦馬行云當時歷塊誤一蹶委棄非汝能周防杜䳌行云爾豈摧殘始發憤差帶羽翮傷形愚見螢火云滄江白髮愁看汝來歲如今歸未歸至於有一重一掩吾肺腑山鳥山花吾友于之句嶽麓山道林則於物無異觀如此王荆公梅詩有少陵為汝添詩興可是無心賦海棠亦得公之遺意安得或有以安得二字結尾蓋杜公竊有望於當時天下後世者不淺也故喜雨詩云安得鞭雷公滂沱洗吳越遣興云安得廉頗將三軍同晏眠雪詩云愁邊有江水焉得北之朝三川觀水漲云舉頭向蒼天安得騎鴻鵠晚登瀼上堂云安得隨鳥鴒迫此懼將恐晝夢云安得務農息戰鬬普天無吏橫索錢題韋偃畫馬歌云時危安得真致此與人同生亦同死王兵馬使二角鷹云安得爾輩開其羣驅出六合梟鸞分早秋苦熱云南望青松架短壑安得赤腳踏層氷茆屋為秋風所破歌云安得廣厦千萬間大庇天下寒士俱歡顏洗兵馬云安得壯士挽天河淨洗甲兵長不用石犀行云安得壯士提天綱再平水土犀奔茫石笋行云安得壯士擲天外使人不疑見本根蠶榖行云焉得鑄甲作農器一寸荒田牛得耕大麥行云安得如鳥有羽翅託身白雲還故鄉光祿坂行云安得更似開元中道路即今多擁隔悲青坂云焉得附書與我軍忍待明年莫倉卒畫山水圖歌云焉得并州快剪刀剪取吳淞半江水凡此皆含不盡之意嗚呼歐陽公傷五季之離亂故作五代史也序論則盡以嗚呼冠其篇首杜公傷唐末之離亂故作詩史也於歌行間以嗚呼結其篇末折檻行云嗚呼房魏不復見秦王學士時難羡白馬詩云喪亂死多門嗚呼涕如霰冬狩行云嗚呼得不哀痛塵再蒙茅屋為秋風所破歌云嗚呼何時眼前突兀見此屋吾廬獨破受凍死亦足天育驃騎歌云嗚呼健步無由騁豈無騕裊如驊騮時無王良伯樂死即休乾元中寓居同谷縣作歌七首云嗚呼一歌兮歌已哀悲風為我從天來嗚呼二歌兮歌始放閭里為我色惆悵嗚呼三歌兮歌三發汝歸何處收兄骨嗚呼四歌兮歌四奏林猿為我啼清晝嗚呼五歌兮歌正長魂招不來歸故鄉嗚呼六歌兮歌思遲溪壑為我回春姿嗚呼七歌兮悄終曲仰視皇天白日速今古詩翁以嗚呼二字寓於詩歌者稀公獨有傷今思古之意知見杜工部以知見二字相配橫翔捷出奇絶殊甚觀其碧知湖外草紅見海東雲晴黑知灣澴底清見光炯碎萬丈潭青惜峰巒過黃知橘柚來放船紅取風霜實青看雨露柯梔子紅入桃花嫩青歸柳葉新早春束比青芻色圓齊玉筯頭秋致薤滑憶雕胡飯香聞錦帶羹江湖卧病各隨題著句轉移一字燦然可觀它人未易到用方言子美善以方言里諺㸃化入詩句中詞人墨客口不絶談其曰吾家老孫子質朴古人風吾宗客睡何曾著秋天不肯明夜客汝去迎妻子髙秋念却回舍弟觀歸藍田父母養我時日夜令我藏新婚别棗熟從人打葵荒欲自鋤秋野掉頭紗帽側曝背竹書光同上見耶背面啼垢膩腳不襪北征舊犬喜我歸低徊入衣裾鄰舍喜我歸沽酒携葫蘆草堂牀前兩小女補綻才過膝北征誰能更拘束爛醉是生涯守歲癡女饑咬我啼畏猛虎聞彭衙行家家養烏鬼頓頓食黃魚遣興一夜水髙二尺强數日不可更禁當春水生不分桃花紅勝錦生憎柳絮白於綿送路侍御入朝負鹽出井此溪女打鼓發船何郡郎十二月一日去歲兹辰捧御床五更三㸃入鵷行至日遣興馮陵大呌呼五白袒跣不肯成梟盧今夕行老妻畫紙為棋局稚子敲針作釣鈎江村與兄行年校一歲賢者是兄愚是弟狂歌行八月秋高風怒號捲我屋上三重茆南村羣兒欺我老無力忍能對面為盜賊公然抱茅入竹去脣燋口燥呼不得茅屋為秋風所破歌但使殘年喫飽飯只願無事長相見病後遇王倚飲贈歌詩酒古人吟詠情性不過詩酒老杜一集而以詩酒相配者無慮十數處戲寄漢中王云尚憐詩警䇿猶憶酒顚狂遊何將軍山林云醒酒微風入聽詩靜夜分送懷舍弟潁觀云對酒却疑夢吟詩正憶渠宴王使君宅云自吟詩送老相勸酒開顏北鄰云愛酒晉山簡能詩何水曹徐步云把酒從衣濕吟詩信杖扶泛江送魏倉曹云見酒須相憶將詩莫浪傳可惜云寬心應是酒遣興莫過詩贈盧參謀云說詩能纍夜醉酒或連朝敝廬遣興云把酒宜深酌題詩好細論贈張學士云賦詩拾翠殿佐酒望雲亭不見云敏捷詩千首飄零酒一杯題鄭著作云酒酣懶舞誰相拽詩罷能吟不復聽獨酌成詩云燈花何太喜緑酒正相親醉裏從為客詩成覺有神題鄭監湖上亭云羹煮秋蓴弱杯迎露菊新賦詩分氣象佳句莫頻頻獨步尋花云詩酒尚堪驅使在未須料理白頭人寄岑嘉州云外江三峽且相接斗酒新詩終自疏落英楚辭云夕餐秋菊之落英謂始生之英可以當夕糧也落與訪落周頌及章華臺成則落之昭公六年落同蓋嗣王謀之於始則曰訪落宫室始成而祭則曰落成故菊英始生亦曰落英設或隕落豈復可餐况菊花獨乾死于枝上而不墜所謂秋英不比春花落誠如六一居士之語荆公胡不察此而反誚人為詳見西清詩話花妥杜陵詩花妥鶯捎蝶溪喧獺趂魚釋者謂妥訓落非也蓋妥與墮同聲當作墮字傳寫之誤也一說古字妥墮通用寺殘野寺殘僧少山園細路髙誦此詩者皆疑子美既曰殘僧又曰少意若重復以愚觀之不見其煩復當讀作野寺殘所以僧少也山園細所以路髙也又别常徴君詩曰白髮少新洗寒衣寬總長此皆是二字三字體也亦有二字五字體如宿府曰永夜角聲悲自語中天月色好誰看并石銚煮松花待客地爐燒木葉看書又有三字四字體如盧贊元襄愛蹴踘嫌穿地筍喜鞦韆礙出牆花之句云耳錦宫城閩本杜詩春夜喜雨云曉看經濕處花重錦宫城送假功曹歸廣州云幸君因旅客時寄錦宫城蜀相詩云錦宫城外柏森森又錦宫城西生事微皆作宫字按蜀本杜詩並作錦官城注云成都府城亦呼為錦官城以江山明麗錯雜如錦也趙云或以其有錦官銅官鹽官之類其說亦是不然止取錦而已何以更有官字乎余觀范至能參政為詩每官成一集所著錦官集蓋鎮成都府時作也則身親見成都為錦官城故取以名之况杜子美嘗卜居成都浣花里其用官字必無誤當以蜀本為正緑楊垂手洪駒父詩話云晉公詩緑楊垂手舞黃鳥緩聲歌樂府有大垂手小垂手前緩聲故丁用之其屬對律切如此豫謂美則美矣其如緑楊無手何終不若下句意渾成甜酒三山老人語録曰唐人好甜酒殆不可曉子美云人生幾何春已夏不放香醪如蜜甜退之云一尊春酒甘若飴丈人此樂無人知余嘗味樂天詩有曰量一作户大厭一作嫌甜酒才髙笑小詩則又似不然禽水苕溪叢話曰聖俞云南嶺禽過北嶺呌髙田水入低田流魯直曰野水自添田水滿晴鳩却喚雨鳩歸詩意皆相類然魯直造語又工優於聖俞余謂盧溪先生云民瞻禱雨有應云東嶺雲遮西嶺黑髙田水與低田通石湖居士范至能墊江縣云舊雨已招新雨至髙田水入下田鳴雖皆㳂襲二公語意相屬又過之直與荆公云北澗欲通南澗水南山正繞北山雲樂天題天竺寺云東澗水流西澗水南山雲起北山雲之句無間然矣然合六詩觀之唯招之一字為尤長溪聲山色東坡贈東林總長老云溪聲便是廣長舌山色豈非清淨身以溪山見僧之體以廣長舌清淨身見僧之用誠古今絶唱安城劉升卿有曰溪聲廣聽無邊法山色長存不壞身雖祖述辭意亦亹亹相逼無愧於坡鴨緑鵝黃鴨緑鵝黃經兩詩人道之荆公南浦云含風鴨緑𥻘粼起弄日鵝黃裊裊垂則以鵝黃為柳主柳色黃金嫩而言之東坡過賈收水閣云小舟浮鴨緑大杓瀉鵝黃則以鵝黃為酒主鵝兒黃似酒而言之皆為奇句然辭意雅馴則荆優於坡白雪黃雲詩人喜荆公繅成白雪桑重緑割盡黃雲稻正青之句莫不極口稱誦而不知其有斧鑿痕竊謂雪不成繅雲不可割請易繅為捲易割為收則絲麥自見而非但意語天出用字不露歐公詩話云魏野啄木云千林啄如盡一腹餒何妨宜改作千林蠧如去却不犯題上字又見其有諷去蠧之意雅言新載云李範道旁木云雖當南北路不礙往來人豫謂是道旁石詩不如換當字作生字始見題意也李畋該聞録云有縣令姓張榜云某日知縣生日告示諸色人不得獻送而曹吏各持縑獻一無所拒復告後月縣君生日更莫將來王嵒以鷺鷥詩諷之曰飛來疑是鶴下處却尋魚為易下處為到處則見張何所往而不貪也四印鼂無咎行路難云贈君珊瑚夜光之角枕玳瑁明月之雕牀一蟲秋蟬之麗縠百和更生之寶香黃魯直送王郎云酌君以蒲城桑落之酒泛君以湘纍秋菊之英贈君以黟川㸃漆之墨送君以陽關墮泪之聲酒澆胸次之磊隗菊制短世之頽齡墨以傳千古文章之印歌以寫一家兄弟之情此誠相若然魯直辭雄意婉壓倒無咎原其句法實有來處得非顧况金璫玉珮歌云贈君金璫大霄之玉珮金瑣禹步之流珠五嶽真君之祕籙九天文人之寶書朝黃得奪胎換骨之活法於此者乎意相反李太白俠客行云事了拂衣去深藏身後名元微之俠客行云俠客不怕死怕死事不成不肯藏姓名二人意相反淵明詩云雖留身後名生前亦枯槁死者何所知稱心固為好是不慕身後名也及作擬古乃云生有髙世名既沒傳無窮是欲名彰不朽也一人意自相反風雅不繼六一居士云盧同韓愈不在世彈壓百怪無雄文文濳題磨崖碑云元結髙名誰與紀風雅不繼騷人死魯直過桂林云李成不生郭熙死奈此百嶂千峰何與退之石鼓歌云少陵無人謫仙死才薄將奈石鼓何老杜雙松歌云天下幾人畫古松畢宏已老韋偃少殆一律也殺風景或謂背山起樓燒琴煮鶴之類為殺風景以詩觀之雖杜韓老仙亦或未免退之若要添風月應除數百竿直與王子猷背馳借曰得人嫌處只緣多猶云可也如子美砍卻月中桂清光應更多無乃太甚乎曰非也此足以見詩人意到處便有焚山者不改菽粟手假向上人陳舍人君舉未第時作省題詩極一時之妙如羲皇向上人之句嘗愛其下得向字好及閲晏元獻弔劉蘇歌曰蘇歌風味逼天真恐是文君向上人亦有所自云花竹無香花竹亦有無香者世所共知櫻桃初無香退之云香隨翠籠擎初重則以香言之竹與枇杷本無香子美云風吹細細香枇杷樹樹香則皆以香稱之至於太白又以柳為有香其曰風吹柳花滿店香是也若夫荆公梅詩有云少陵為爾添詩興可是無心賦海棠豈謂海棠無香而不賦乎老而詩工客有曰詩人之工於詩初不必以少壯老成較優劣余曰殆不然也醉翁在夷陵後詩涪翁到黔南後詩比興益明用事益精短章雅而偉大篇豪而古如少陵到䕫州後詩昌黎在潮陽後詩愈見光焰也不然少游何以謂元和聖德詩於韓文為下與淮西碑如出兩手蓋其少作也周益公評余紹熙丁巳三月既望侍宴春華樓時聞大丞相益國周公議論灑灑終日不倦至論詩則謂須要有警䇿就題著句不可泛泛因拱而請曰如相公一丁昌火運三合瑞皇家謂光堯生于丁亥夀皇丁未夀康丁卯其干既為一丁其支又為三合學士䇿詢學士䇿公自注云館職亦合呼學士祕書官試祕書官時公以祕書少監直翰苑發䇿試王仲衡而寄程同年閣老詩也前後顧瞻羞倚玉支干引從偶連珠此三老圖詩也公自注云乘成兄生于乙巳而豫丙午誠齊丁未無一字虛語其盡之矣公笑曰是也如挽詩亦難作復請曰願聞之公曰髙宗皇帝丁亥生與藝祖齊年一則為開基之主一則為中興之君天之生此二帝功德兼隆豈偶然哉髙宗慶八十聖夀後未幾上仙去唯慈寧太后亦然故作挽髙宗詩曰生年同藝祖慶夀比慈寧人憶庚庚兆天傾九九齡正謂是也若徽廟挽詞尤難命意亦難措辭獨是湯丞相進之思退一聮云虞姬從梧野啓母祔箕山最紀其實蓋用舜事以狀徽宗巡狩不返意及梓宫歸葬會稽又用禹事以形容之皆婉而有直體此真得詩人三昧賀生日黃耕叟夫人三月十四日生吳叔經代人作夀詩曰天邊將滿一輪月世上還鍾百歲人識者謂將滿一輪之句若是十三日亦使得不若云猶缺一分便見直是十四日也豫謂猶缺一分非祝夀底語終未若魏仲先夀萊公詩云何時生上相明日是中元形容得七月十四日坦然明白矣周益公生於丙午七月十五日嘗夀以詩曰年與潞公同丙午日鄰萊國占中元公覽而笑曰賢此聮已道盡了豫生年月日只缺說出一箇生時便是一本好建生也公齊年友歐陽伯威適在坐亦曰實道得著省題詩更須留意山谷與洪駒父云更須留意作五言六韵詩若能此物取青紫如拾芥耳大體作省題詩尤當用老杜句法若有鼻孔者便知是好詩也近年許琮以聖圖天廣大對王度日清夷乃用老杜全句與傅咸全句配遂魁南省其有鼻孔可知此味不必全句但能著意㸃化深造詩仙句法則亦必壓倒元白突過黃初矣廬陵董克正以其父參政當國避親就别院考官周孟覺因以二月一日試出中和節詩董上請云何謂中和節周答曰上元已過上己未至今日所以為中和也董即體其意曰上巳時將近元宵節已過仲春方駘蕩今日是中和遂髙中又嘗聞艮齊謝尚書云每考校賦卷子必先看第一第二韵即以詩看有何好句有好句則遍看徹定去留不爾便斥下則詩斷不可輕視又聞西昌談髙立一飛臨汝考試歸云省題詩不宜押協韵有堅守貢舉條制者謂限五言六韵成是並不容取協韵之詩矣春猿秋鶴六一先生跋羅池廟碑云今世傳昌黎集載此碑文多同惟集本以步有新船為涉荔子丹兮蕉黃蕉下加子當以碑為是而碑亦云春與猿吟而秋合與鶴飛則疑碑之誤也今觀張子韶九成書解如舜攝位時則曰正月上日禹攝位則曰正月朔旦今曰月正元日上日元日朔旦皆一也而或謂之上或謂之元或謂之朔豈作書者欲偹衆體而使無餘藴乎如離騷東皇太乙歌曰吉日兮辰良而韓愈羅池廟記曰春與猿吟兮秋鶴與飛其鏗鏘參差之法當有所祖述矣即此而推則知有所祖述而得作文之體者在此嗚呼歐陽公文章橫被六合可謂筆補造化其平章千古勘破萬卷於此何疑之有韵書脫字杜甫送張參軍赴蜀云好去張公子通家别恨添兩行秦樹直萬㸃蜀山尖張祜骰子詩云骰子巡巡裹手拈無因得見玉纖纖但知報道金叉落髣佛還應露指尖東坡雪夜詩云試掃北臺看馬耳未隨埋沒有雙尖皆押尖字韵遍閲近世刋行韵略無此尖字當是禮部韵略脫文康節詩無施不可康節先生六言四賢吟云彥國之言鋪陳晦叔之言簡當君實之言優游伯淳之言條暢四賢洛陽之望是以在人之上有宋熙寧之間大為一時之壯今盡去其之字為五言亦可乃見有不為剩無不為缺至如前日之事今日不行今日之事後來必更此是又有韵散文也施之文卷中人將罔覺前輩於詩得三百篇微㫖蓋如此示兒編卷十
