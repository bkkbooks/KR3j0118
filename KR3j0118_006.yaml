body:
  text: 示兒編卷六宋孫奕撰經説作者七人藝苑雌黄記作者七人不取包氏鄭氏之説固是獨取王弼之説亦非至謂伊川語録云伏羲神農黄帝堯舜禹湯制法興王之道非有述於人者也此説亦不敢從予謂雌黄未可信也作即作者之謂聖之作伊川所言葢有所本此而不從將焉從哉嘗讀易大傳見夫伏羲之畫八卦無非具天地人物之理而神農於耒耜則取諸益日中為市則取諸噬嗑與黄帝堯舜衣裳之制凡舟楫杵臼弧矢宫室之制皆天理人事之不可廢者是以夫子推其所從始而云伏羲氏作神農氏作黄帝堯舜氏作豈無謂歟後乎堯舜而九疇之義未著於是夏后氏作而叙九疇後乎禹而夏桀之惡方熾於是殷湯氏作而伐夏弔民此賢聖之君六七作要皆開端創始者之為也信乎孔子之言作者為萬世之公論而伊川之取作者之名為萬世之至當云友便辟按前漢佞幸傳賛曰咎在親便嬖所任非仁賢故仲尼著損者三友正引此語嬖字從女與孟子便嬖不足使令於前同則辟讀為寵嬖之嬖亦通舊音婢亦切其為東周乎子曰如有用我者吾其為東周乎乎反辭也言公山氏如用孔子則必興起西周之盛而肯復為東周之衰乎揚子雲擬論語直謂如其好問仲尼則魯作東周矣釋者便謂使魯能好問仲尼則魯亦可使復興西周之盛於東周之地爾此特愛揚子而為之説曽不知夫子之所謂乎與揚子之所謂矣二字大相遼絶學者宜辨之患得患失其未得之也患得之既得之患失之按家語其未得之也患不得之既得之患失之比論語多一不字辭意甚眀在人子貢曰文武之道未墜於地在人賢者識其大者不賢者識其小者莫不有文武之道焉在人二字為一句謂文王武王之道未墜猶在於人言人皆有之也故賢者則能識文武之道之大者雖不賢亦能識文武之道之小者所以無不有文武之道也非在人而何仕優學優子夏曰仕而優則學學而優則仕仕優而不劣則仕盡善矣仕盡善則雖曰未學吾必謂之學也學優而不劣則學盡善矣學盡善則是亦為政奚其為政也君子不施其親按開元五經文字君子不弛其親弛音始易也棄忘也舊音昌移切非予謂即孔子云親者毋失其為親是也舉逸民舉逸民天下之民歸心焉何晏謂逸民者節行超逸也林少潁亦謂逸為俊逸之逸如俊民之義非隠逸也其義可取孟子篇目前漢藝文志曰儒家有孟子十一篇以今攷之篇目少於前何也曰合今之七篇與外書四篇即十一篇矣昔嘗聞前軰有曰親見館閣中有外書四篇曰性善辯曰文説曰孝經曰為政則時人以性善辯文為一句説孝經為正為一句甚乖㫖趣古文辯正政通用見梁惠王孟子見梁惠王與孟子見梁襄王皆下見上之見並當與㬥見於王他日見於王同音現孫宣公奭説前見字無音學者相承如字讀非也按史記列傳孟子游事齊宣王不能用去齊適梁是以古史亦謂孟子先事齊宣王後乃見梁惠王及攷司馬温公年譜孟子見惠王時乃當梁惠王之三十四年齊威王之四十三年是時宣王尚未即位故七篇之書以孟子見梁惠王冠其首以齊宣王之問繼其後則先後有序可見矣故列傳為難信而年譜有所據云耳智足以知聖人汙宰我子貢有若智足以知聖人汙不至阿其所好當以智足以知聖人汙七字為句汙小也三子之智可以知聖人之小者不至阿私所愛而空譽之四端惻然而傷隠然而痛也羞耻己之惡惡憎人之惡也辭郤以舍己讓推以與人也是曰是非曰非也端始也有惻隠羞惡辭讓是非之心即為仁義禮智之始也龍斷龍音壟斷如字龍斷者岡壟斷而崛起之小山也四顧無碍可左右望而見其商旅負販之來者以羅取一市之利故曰必求龍斷而登之以左右望而㒺市利草尚之風必偃尚謂加也加之風則草必偃伏尚與論語上字亦通行辟人可也歳十一月徒杠成十二月輿梁成民未病涉也君子平其政行辟人可也焉得人人而濟之杠梁皆橋也通徒行者曰徒杠通車輿者曰輿梁辟法也言君子平其政則行所謂徒杠成輿梁成之法於人可矣安能盡以所乘之車載而渡之哉詩亡然後春秋作孟子曰詩亡然後春秋作文中子曰小雅廢春秋作一言詩亡一言雅廢何也自平王黍離之詩降為國風則天下無復有雅而春秋始於平王矣按平王之孫桓王兎爰刺桓王失信曾孫莊王邱中有麻刺莊王不明猶有風二詩皆見王國風則是王者之雅亡而春秋作王通之言良以此夫戎狄是膺魯頌曰戎狄是膺荆舒是懲周公方且膺之滕文公上此僖公之詩也孟子以為周公方且膺之人皆疑焉按春秋書公子遂如楚乞師則僖公之畏楚甚矣僖二十六年書公㑹齊侯于淮則僖公之服齊乆矣僖十六年寕有膺之之勢及即明堂位禮記質之周公踐阼朝諸侯而九夷八蠻六戎五狄之國隨方各至則知孟子所謂膺之良以此夫然詩人獨以頌僖公何邪曰史克知僖公之心在於尊祖之功業乃為之作頌一以推尊周公併以美僖公蓋詩人之意也説者直以為僖公時事不當其義此孟子所以兩言周公膺之也則枉尋直尺而利且夫枉尺而直尋者以利言也如以利則枉尋直尺而利亦可為與當以枉尋直尺而利為句以眀有計利之心則雖枉多伸少而有所利亦可為之耶甚言其不可也小徳役大徳天下有道小徳役大徳小賢役大賢天下無道小役大弱役强斯二者天也有道之世人以徳勝故徳賢之小者為徳賢之大者役無道之世人以力勝皆不修徳故小而弱者役於大而强此天理之必然者也故者以利為本天下之言性也則故而已矣故者以利為本此孟子以水喻性乃指其迹以示人也故者即故道也有迹可見者也利猶順也謂自然之勢也勢有二自然與使然也人性之善也猶水之就下也人無有不善水無有不下此自然也今夫水搏而躍之可使過顙激而行之可使在山是豈水之性哉其勢則然也此使然也今之所謂故如禹之行水亦因其故道而導之未嘗有一毫之拂逆所以無横流之害也少艾人少則慕父母知好色則慕少艾嘗徧攷載籍艾字並無美好之説曲禮五十曰艾服官政魯頌俾爾耆而艾荀子耆艾而信可以為師皆謂老也初無一言以為幼而美殆因流俗承誤為此説陳晉之又改艾字為少女孟子知言之要豈不經如此之甚原孟子之意即荀子所謂妻子具而孝衰於親之義人少當音去聲慕少當音上聲艾讀如夜未艾之艾艾之為言止也謂人知好色則慕親之心稍止也鬱陶象曰鬱陶思君爾忸怩謂象思之甚而氣不伸猶陶瓦處烟氣鬱而不散也故來見而有忸怩之慙色舜為法於天下舜為法於天下可傳於後世舜遭人倫之變而不失天理之常故事頑嚚之親而盡子道封傲狠之弟而盡兄道刑于二女而盡夫道厯試諸艱而盡臣道凡人倫之至者舜無一之不善也宜乎可為天下後世之法也不屑之教誨教亦多術矣予不屑之教誨也者是亦教誨之而已矣多術言非一端也屑輕也不憤不啓不悱不發舉一隅不以三隅反則不復也即孔子不輕之教誨也謂輕易以教之其學則不固使其人若能因此退自修省則是亦我教誨之也聖人然後踐形形色天性也惟聖人然後可以踐形形色外也天性内也有諸内必形諸外則外即内也人肖天地之貌懐五常之性則發見於形色之間皆天性也此之謂能踐人之形一為情欲所汨以亂其天性則雖有人之形而不能踐其形矣故惟聖人然後可過化存神君子在上之君子也所過者化所存者神謂所過於人者化所存於己者神故其徳與天地同流可謂其益無方矣性之反之孟子曰堯舜性之也湯武反之也安而行之者性也勉強而復者反之也堯舜存其天性湯武還其天性及其成功一也奮乎百世之上聞柳下惠之風者薄夫敦鄙夫寛奮乎百世之上為斷句百世之下連下句聞者莫不興起也讀之孝經景行序有曰朕嘗三復斯言景行先哲按景行二字他無所見實本於車舝景行行止之語此若依舊音去聲讀則景行先哲一句亦難強通今質之東萊讀詩紀於景行下注云釋文下孟反當不音又引晦庵朱氏曰景行大道也則行字平讀無疑葢詩人以髙山對大道而言皆取喻之辭若徳行則不類然晦庵於詩則以景訓大行訓道乃謂大路之可行此序則當以景訓明行訓踐而謂明踐先聖之訓則辭意曉然或者不審景行之音訓徃徃泥此一句便隨聲是非倡為景慕之説博攷經傳景之為言大也明也景慕二字徃徃因孝經叙而言之近世尺牘中間有用之者殊未聞有以景一字訓慕也或有以景顔景蘇命名已無謂矣甚者有景賢之稱則是自名曰大賢可乎嗚呼音訓之不講其弊至此斷章取義聖人之於六經造理髙逺去取隨意無溺於本文無泥於一句故孟子有不以文害辭不以辭害志之説如曰一人有慶兆民頼之本非愛敬事孔子則取以證天子之孝如臨深淵如履薄氷本非諸侯事孔子則取以證諸侯之孝或以赫赫師尹民具爾瞻證三才或以有覺徳行四國順之證孝治夫如是然後見夫子於孝經之書斷章取義無所不可而孝經之道通矣若乃自天子至于卿士每章或引書或引詩獨於庻人章無之此又見聖人之於貴賤有别焉哭不偯偯舊音哀觀禮記閒傳曰大功之哭三曲而偯釋文於起反聲餘從容也許氏説文作㥋云痛聲廣韻玉篇集韵皆音於豈反舊音不攷諸家而誤為之音示兒編卷六
