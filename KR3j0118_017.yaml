body:
  text: 示兒編卷十七宋孫奕撰雜記事同堯秀眉魯僖馬卿亦秀眉舜重瞳項羽王莽朱友敬亦重瞳漢髙祖龍顔晉元帝嵇康亦龍顔光武日角唐髙祖亦日角尼父面如蒙魌陽虎亦如蒙魌竇憲鳶肩馬周亦鳶肩晉文駢脇張儀亦駢脇禹扇暍史記武王亦扇暍世紀禹一沐三握髮呂氏春秋周公亦一沐三握髮魯世家成湯以六事自責後漢鍾離意傳魯僖公亦以六事自責後漢黄瓊傳髙祖規模宏逺漢紀太宗亦規模宏逺張行成傳髙帝無可無不可馬援傳孔子無可無不可語㣲子唐太宗作魏徴碑髙宗作李勣碑明皇作張說碑徳宗作叚秀實碑宋朝太宗作趙普碑仁宗作李用和碑神宗作韓琦碑石林燕語張說歐陽永叔自為其父碑陶淵明秦少虚皆自作挽詞樗里子史記鼂錯前漢皆號智囊周勃周昌尹齊酷吏前漢韓愈魏元忠唐公孫𢎞祭遵王良後皆布被趙廣漢前裴延齡唐皆鉤距東方朔前喬琳唐皆詼諧陽城欲壞裴延齡白麻徳宗時李甘欲壞鄭注白麻敬宗時蕭何為民請苑髙祖時貢禹亦為民請苑元帝時子文見越椒狼子野心張九齡見安禄山狼子野心唐劉仁本諫不聽而置笏褚遂良太宗時崔元亮文宗時諫不聽而置笏祁奚襄三年狄仁傑皆舉其子鄭當時田蚡灌夫皆推轂漢王衍知石勒有反相晉張九齡知安禄山有反相唐劉寛為南陽太守用蒲鞭後崔景真為平昌太守用蒲鞭南史許商四至九卿汲黯傳梁劉凝之為人認所著履即予之沈麟士為鄰人認所著履即予之東坡新說韓退之為送窮文本集叚成式為送窮文文粹盧仝有月蝕詩韓愈有月蝕詩各本集項羽學萬人敵本紀張飛闗侯咸稱萬人敵三國志崔子美為座右銘白樂天為座右銘李至徳座右銘序邉韶稱五經笥後任彦昇亦五經笥唐守素傳李繁聚書萬卷時人號為李公書樓唐張昭逺積書萬卷時人號為張家書樓五代公孫𢎞本傳東平王蒼班固傳皆開東閣馮衍後葛洪晉皆閉門却埽郡國因革周有天下封兄弟之國十五人姬姓之國四十人列諸名城班五等爵逮至周末諸侯流為十二國東遷之地僅有七城而已通典平王時洛邑與宗周通東西長南北短相覆為千里後為諸侯所侵比周之亡七城而已嬴秦失道𤓰分天下削去五爵罷諸侯之制分為三十六郡郡置一守又使御史監郡務弱其權守權既輕孤立於上莫制其民民苦賦役相率而為盜故二世而亡漢室龍興監秦之弊加置郡國分内史為三部三内史者河上渭南中地也地理志云武帝改河上渭南中地以為京兆馮翊扶風是為三輔光武中興海内凋敝郡國併省者八建武十一年省州牧復為刺史員人掌一州和順省朔方刺史合之於司隸凡十三部置司隸校尉晉武帝太康元年省司隸置司州其後立州仍郡立梁㤗寧平四州仍三國之郡一百七十三紛紛不一降及南北既為州又立郡廢置靡常自隋文一天下乃廢諸郡以州治人名則因仍職事同於郡守未幾煬帝又易州為郡置司隸刺史分部巡察唐興高祖改郡為州太守為刺史又置都督府以治之太宗始命併省分天下為十道明皇又因十道而析為十五道置十五採訪使檢察如漢刺史天寶之際盜賊蠭起因假方鎮以平羣盜自僖昭而後疆土日蹙陵夷至于五季天下紛裂增損因革徒以自擾求欲不亡得乎卦配十二月易大傳曰立天之道曰陰與陽又曰一陰一陽之謂道道在於天陰得其一則一陰生陽得其一則一陽生盖陰極而生生於子則冬至矣今之十一月是也其卦為復為其一陽生在下而五陰在上也二陽而四陰則為十二月其卦為臨三陽而三陰則為正月其卦為泰四陽而二陰則為二月其卦為大壯五陽而一陰則為三月其卦為夬六畫而皆陽則為四月其卦為乾陽極而陰生於午則夏至矣今之五月是也其卦為姤為其一隂在下而五陽在上也二陰而四陽則為六月其卦為遯三陰而三陽則為七月其卦為否四陰而二陽則為八月其卦為觀五陰而一陽則為九月其卦為剥六畫而皆陰則為十月其卦為坤自一陽生而為復進進不已至於純陽之乾而終焉至一陰生而為姤進進不已至純陰之坤而終焉以此見天數之運周而復始者也漢將相起㣲賤傅說舉於版築之間膠鬲舉於魚鹽之中管夷吾舉於士孫叔敖舉於海百里奚舉於市告子下嘗觀孟軻氏皆以苦其心志勞其筋骨以至動心忍性曾益其所不能乃天之將降大任於是人是常人付天於不可柰何而聖賢止以人事為天命而已其深矣哉然則有志之士其遇患難嘗險阻行貧賤皆安之若自然此乃天之降大任也至於西漢之初高祖所用將相亦莫不然蕭曹起於刀筆韓信起於賤隸梅福書云㧞於行陳陳平起於亡命梅福書周勃起於吹簫叔孫通起於枹皷解嘲黥布起於黥徒彭越起於狗盜樊噲起於屠狗灌嬰起於販繒夏侯嬰起於廐御史記云廐御叙傳云廐騶酈商起於農夫吳芮起於江湖各見本傳并叙傳皆能攀龍附鳳依乗風雲化為侯王勒功帝籍流慶後昆孰謂漢將相名臣可以㣲賤而少之漢兵唐兵後漢匈奴傳云漢兵若雷風唐髙昌傳云唐兵如日月雖一以威勝一以明勝然終未若堯舜不戰而屈人兵也唐興亡以女禍唐髙祖乗隋季荒亂因晉陽宫女之侍而見劫於子以成起義之志而得天下故太宗有妻嫂之醜髙宗有妻武昭儀之醜明皇有妻楊太真之醜盖不謹於初世有女禍始以是而成之亦終以是而敗之太宗戒官吏太宗皇帝御書爾俸爾禄民膏民脂下民易虐上天難欺四句以戒監司守令民到于今受其賜徳至渥也盖本蜀後主孟氏昶攽令箴以箴誡宗人之詞凡十二韻二十四句九十六字而帝實摘取之始見夫詞簡而意嚴詳畧有體故併録之於左朕念赤子肝食宵衣託之令長撫養恵綏政在三異道在七絲驅雞為理留犢為規寛猛得所風俗可移無令侵削無使瘡痍下民易虐上天難欺賦役是切軍國是資朕之賞罰固不踰時爾俸爾禄民膏民脂為民父母莫不仁慈勉爾為誡體朕無私宋乾徳三年景煥野人閑話死生以義為重古人䖏死生之際必以義而權其輕重不然生為徒生死為徒死耳顔杲卿罵安禄山顔真卿抗李希烈叚秀實擊朱泚此以死為輕也而人重之王衍拜石勒哥舒翰拜安禄山李元平拜李希烈此以死為重也而人輕之㣲子箕子為義而生者也比干為義而死者也夷齊之死其諸愧後之臣懷二心者與屈平之死其諸愧後之君好讒佞者與申生伋夀之死其諸愧後之父母有憎愛者與左儒之死其諸愧後之友不相救者與劉恕周宣王外紀貫髙之死其諸愧後之客反咎主者與前漢陳餘傳學貴通古今了翁陳瑩中自云予元豐乙丑為禮部貢院㸃檢官適與校書郎范公淳夫同舎公嘗論顔子之不遷不貳唯伯醇有之予問公曰伯醇誰也公黙然乆之曰不知有程伯醇耶予謝曰生長東南實未知也時予年二十有九矣自是以來嘗以寡陋自愧乃作責沈文張欽夫為之跋曰公壯嵗未聞前軰先覺之名遂終身以為歉至引葉公之事自責葉公沈諸梁故名其文曰責沈葉公姓沈名諸梁字子髙食邑於葉僣稱為公不知孔子之為人故問於子路子路以為彼何足以知吾夫子故不對了翁乃引此以自責故曰責沈見述而篇注非夫尊徳樂道不自滿假何以臻此其視唐張由古以班孟堅文章為何闗班固事大唐新語云張由古素無學術厯官䑓省嘗於众中歎班固文章不入選或謂之曰兩都賦燕山銘典引等並在文選中何云無由古曰此並班孟堅文章何干班固事聞者莫不絶倒宋朝楊大年知貢舉舉子問堯舜是㡬事異矣雜志云楊大年主文舉子上請堯舜是一事是兩事荅云如此疑事不須使也得盖程伯醇今人也不知猶不可堯舜班固不知可乎學者可不懋戒之㢤塗注乙今進士書試卷末云塗注乙共計若干字唐時已有此語韓愈讀鶡冠子有曰余三讀其詞而悲之文字脫謬為之正三十有七字乙者三减者二十有二注者十有二字云劉蛻文塚銘序云實得二千一百八十紙有塗者乙者有注揩者有覆背者有朱墨圏者癖性癖之不同如人面焉阮籍有酒癖晉陸羽有茶癖唐和嶠有錢癖王濟有馬癖並晋李憕有地癖杜牧有睡癖王福畤有譽兒癖並唐蔡師魯有勇癖杜甫送師魯詩蔡子勇成癖張遼養勇銳成癖東坡說皆無足貴者惟杜預有左傳癖晉簡文帝有詩癖梁楊欽有文癖唐白樂天云我癖在章句山中吟杜子美云為人性癖躭佳句李建中云我亦生來有書癖李西䑓建中師楊凝式書而作此詩至于今稱之唐相中崔郎中以三癖詩寄劉禹錫自言癖于詩典琴酒禹錫以詩荅云祖來書屏中自稱三癖翁癡王湛為癡叔顧凱之有癡絶並晉竇威書癡唐許褚虎癡魏許褚如虎之痴任育長有情癡任育長從棺底下流涕悲哀王丞相聞之曰此是有情痴楊冄思癡宰相唐張方回癡漢子天寳遺事馮道癡頑老子聖董貝易聖唐張芝鍾繇衛恊張墨書聖張旭草聖唐楊子華畵聖北齊阮簡嚴子卿馬浮明枹朴子棋聖晉李白醉聖唐張衡馬忠木聖抱朴子云善木刺之巧故曰木聖仙白居易詩仙唐夏侯隠者睡仙王績酒仙唐杜牧之茶仙牧之春日樂山病詩云誰對病太守猶得作茶仙老杜歌飲中八仙本集李成水墨仙李成北海營邱人能画山水東坡云公名為水墨仙崔㣲之蓬萊最後仙白居易寄崔十八曹長兼寄崔㣲之詩云吳興卑小君應屈為是蓬萊最後仙注云貞元間登科者八人崔之名居末自詠云人間不㑹雲間事應笑蓬萊最後仙故今有落句戱之李白自號酒仙翁李白為金陵與諸賢送莊十一序自號酒仙翁又號謫仙殺妻食子吳起之殺其妻易牙之殺其子樂羊之食其子是皆忘其所甚愛而貪其所不必為也真忍人哉西施乳舌江淮有河豚吳人目其腹腴為西施乳雌黄福州嶺口有蛤閩人號其甘脆為西施舌詩說雋永東坡居常州頗嗜河豚而里中士大夫家有妙於烹是魚者招東坡享之婦子傾室闖於屏間冀一語品題東坡下箸大嚼寂如喑者闖者失望相顧東坡忽下箸云也直一死於是合舍大悅噫東坡誠有味其言使嗜色如嗜河豚者而不知戒皆不免於死噫東坡誠有味其言託名齊魯大臣史失其名孟獻子五友孟子忘其三彼女子者獨何幸歟黄四娘以花公孫大娘李十二娘以舞劒而託名於杜詩並見杜詩十八娘以荔枝而託名於蔡君謨之譜荔枝譜杜秋娘以寵幸而託名於杜牧之詩余媚娘以介潔能詩而得名栁枝娘以喜誦燕䑓詩而得名泰娘以善琵琶而見取於韋尚書並麗情集杳娘又因拆字而取重於隋煬帝南部烟花記煬帝㑹飲為拆字令謂杳娘曰我取杳字為十八日以至窈娘本事詩唐喬知之婢窈娘武承嗣留之喬作詩以逹窈娘結詩裙帯遂赴井而死踏揺娘隋唐嘉話云隋末河間有人使酒自號郎中醉必毆其妻妻美而善歌好事者呼為踏揺娘今轉為踏容娘也教坊記作踏娘譙顔大娘教坊記顔大娘善能歌舞玉巵娘幽怪錄崔書見一女娘娶之胡僧曰君所納妻王母苐二女玉巵娘子可住一年家必仙矣盧睂娘杜揚雜編順宗時南海貢竒女盧睂娘能於一尺綰上繡法華經如粟米王大娘明皇雜錄明皇御勤政樓大張音樂教坊王大娘善戴竿於百尺上為木山狀杜韋娘本事詩李司空邀劉禹錫飲命妓樂以送酒劉賦詩曰踈鬂雲鬟宫様粧春風一曲杜韋娘司空見慣渾閑事斷盡蘇州刺史腸李以妓贈之謝秋娘樂府雜録云李衛公為亡妓謝秋娘撰望江南隠娘漁樵閑話云唐大將聶鋒有女名隠娘忽為乞丐携至岩洞中與教習擊刺之法真娘雲溪友議云吳門女郎真娘死葬虎邱山時人比之蘇小小舉子韓銖題墓云虎邱山下塚纍纍松栢蕭條即可悲何事世人惟重色真娘墓塚獨留詩皆以其一技一能稱况有節義而鳴於世者得不大書特書屢書於青史者哉然則為男子者可不勉諸若夫廣州酒名甜娘東海酒名二娘荔枝名綘衣娘鸚鵡名雪衣娘則物亦有借重耳草木冬青古今詞人多以草木冬青而寓之言如班固西都賦云靈草冬榮神木叢生又東京賦云修竹冬青左思蜀都賦云寒卉冬馥宋玉髙唐賦云𤣥木冬榮曹子建朔風詩云桂樹冬榮陶濳四時詩云冬嶺秀孤松杜甫成都府詩云季冬樹木蒼盖當時而盛者不必言也非時而盛者為可言也屏風兒今人表記小錄謂之屏風兒何也予按周文忠公玉堂雜記云内制名色不一故凡詞頭之小者院吏必以片紙錄舊作於前謂之屏風兒祭之明日祭之明日又祭殷曰肜髙宗肜日是也周曰繹絲衣繹賔尸是也示兒編卷十七
