body:
  text: 示兒編卷二十三宋孫奕撰字說集字三謝𤣥暉銅雀臺詩云繐帷飄井幹尊酒若平生五臣注銅雀臺一名井幹樓學林按幹音翰史記始皇幽母於咸陽宫諫者殺之於井幹闕下又漢武帝立井幹樓髙五十丈漢郊祀志亦云師古注曰井幹樓積木而髙於樓若井幹之形也井幹者井上木欄也其形或四角或八角又謂之銀牀皆井欄也揚子重黎篇或問茅焦厯井幹之死司馬曰幹音韓井幹謂始皇殺諌者二十七人積尸闕下如井幹之狀魯直詩云君家氷茄白銀色殊勝埧裏紫彭亨注云埧必駕切蜀人謂平川曰埧劉器之元城語録云襄公三十年所謂亥二首六身者注云亥字二畫在上併三六為身如算之六蓋古之亥字如此寫故曰二首六身其下六畫如算子三個六數也所謂下二如身是其日數者注云下亥上二畫立置身傍蓋如者往也移下亥上二畫往于亥字身反則當如此寫其左竪者二畫乃二萬也其右重者六畫乃三箇算字六數則六千六百六旬也故曰是其日數也且四百四十五甲子合得二萬六千七百今乃差四十日者則前所謂其季於今三之一謂其末甲子才得二十日故少四十日也孔毅父珩璜論云王弼注易鼎折足其形渥凶以為沾濡之形也新唐史元載贊以為刑剭廣韻剭音屋又音握鄭𤣥周禮注剭誅謂所殺不於市而以適甸師氏邵氏聞見録云王弼注鼎折足覆公餗其形渥凶以為沾濡之形也蓋弼不知古易形作刑渥作剭剭音屋故新唐史元載贊用刑剭亦周禮剭注云珩璜論云朝請音才性反非請託之請也見成帝紀注又云古字通用後人草則加草木則加木遂相承而不知也如倚卓遂作椅桐之椅棹船之棹㕔者於此聽事也只作聽字後人以為屋也加廣冝檢切如庭廡之類今訛遂作廠字玉篇廠呼旦切者山石之崖岩人可居也今禮部韻亦訛也學林云古篆五字為義象隂陽交乂之義午字亦取此義周禮壺涿氏掌除水蟲以牡橭午貫象齒而沉之則其神死鄭氏注曰午故書為五杜子春曰五貫當為午蓋用象齒交五貫於橭木之上也故書别本周禮也故書作五則午五通用明矣史書旁午者四通八逹皆通亦縱橫交互之義也端五或作端午亦見通用資暇録云者非也李文正資暇集云周處風土記仲夏端五烹鶩角黍端始也謂五月初五日也今書端午其義無取豫家元和中端五詔書並無作端午字雌黃云江南有小栗謂之茅栗音草茅之􅀢沈存中云正所謂茅莊子云狙公賦芧者音嶼本草有羊蹄一名葍陶隱居云今人呼為禿菜蓋葍音之訛詩曰言采其葍茅與芧其文相近葍與秃其聲相近故其訛如此竊怪杜詩有皂鵰寒始急白樂天詩有千呼萬唤始出來二者似涉語病司馬溫公云始字皆作去聲讀若從上聲尤可怪笑故李希聲云始有二音終始之始則音上聲萬物資始是也有所宿留而今甫然者則音去聲蟬始鳴是也寒始急始出來亦蟬始鳴之類乎同上古今詩話云詩人用也字本皆音夜杜云青袍也自公元稹云也向慈恩寺裏逰今人讀如字非也程大昌演繁露云周禮廉能之類諸家雖訓廉為察常疑理不相附因閲漢髙帝紀詔廉問有不如吾詔者以重論之顔氏曰廉字本作覝其音同乃知廉之為察本覝字也有覘視之義後漢馮衍傳說鮑永曰然而諸將虜掠饑者毛食寒者裸跣注云毛草也太子賢按衍傳毛作無今俗語猶然或古亦通用乎耗矣哀哉注以耗為毛毛無也唐黃翻綽諧語以賜緋毛魚袋借毛為無則知閩人之語亦有本古字不拘偏旁多借同聲用之漢志疇人疑籌人也從算歷言之比疇列之疇於義為徑並演繁露馬大年懶真子録云俗諺云一鉤絲能得幾時絡以諭小人之逐目前之樂也然鉤字合作緰太𤣥經務之次五曰蜘蛛之務不如蠶一緰之利緰音七侯切與鉤同音今以太𤣥經證之故鉤當作緰又云二十八宿今韻略所呼與世俗所呼往往不同韻略宿音繡亢音剛氐音低觜音訾皆非也何以言之二十八宿謂之二十八舍又謂之二十八次次也舍也皆有止宿之意今乃音繡此何理也爾雅云夀星角亢也注云數起角亢列宿之長故有髙亢之義今乃音剛非也爾雅天根氐也注云角亢下繫於氐若木之有根其義如周禮四圭有邸漢書諸侯王邸之邸音低誤矣西方白虎而參觜為虎首故有觜之義音訾誤矣彼韻略不知但欲異於俗不知害於義也學者當如其字呼之洪景盧容齊隨筆云二十八宿宿音秀若考其義則止當讀如本音書記前人有說如此說苑卞恨篇吳之晉生運氣於五行所謂宿者日月五星之所宿也其義昭然魯臧武仲名紇孔子父鄹人紇乃叔梁紇也皆音恨發切而世人多呼為核有一小說唐蕭潁士輕薄有同人誤呼武仲名因曰汝紇字也不識或以為瞎字也不識誤矣今之士人簡尺中或以薢茩易邂逅字非也離騷經云制芰荷以為衣兮王逸注云芰菱也秦人曰薢茩薢音皆茩音茍僕仕於關陜之間不聞此呼正恐王逸别有義爾文房四物見於傳記者若紙筆墨皆有據至於硯即不見之獨前漢張彭祖少與上同研席書又薛宣思省吏職下至筆研皆為設方略蓋古無硯字古人諸事簡易凡研墨處不必硯但可研處即為之爾矛楯螭坳載於前世不若今世事事冗長故只謂之研不謂之硯然伍緝之北征記孔子廟中有石硯一枚乃夫子平生物非經史不足信前漢百官表少府之屬官凡五十餘人有導官掌米穀以奉至尊然學者多疑導字之義僕考唐百官志䆃官令掌䆃擇米麥凡九榖皆隨精粗考其耗損而供然導字下從寸唐䆃字下從禾今按韻略瑞禾一莖六穗謂之䆃恐唐以瑞禾名官也僕嘗以此問僕舅氏笑云此蓋讀司馬長卿封禪書誤耳書云䆃一莖六穗於庖注云䆃擇也一莖六穗謂嘉禾之米也後人誤以瑞禾為䆃遂併官名失之可一笑也並懶真通鑑釋文云晉惠帝永熙七年寧馨晉書音義寧而以寧音之寧馨猶言阿堵阿堵之義蓋指物之稱演繁露云山濤見王衍曰何物老嫗生寧馨兒寧作去聲馨音亨今南人尚言之猶言恁地也宋前廢帝悖逆太后怒語侍者曰將刀來割我腹那得生寧馨兒此兩寧馨同為一意雌黃云晉書寧馨兒寧字相傳多作去聲如唐人詩云家無阿堵物門有寧馨兒是也而劉夢得詩為問中華學道者幾人雄猛得寧馨則又作平聲南部新書云天寶四載改尚書無頗作陂顔氏家訓云太史公曰寧為雞口無為牛後此是刪戰國䇿耳按延䔍音義曰尸雞中之主從牛子然則口當為尸後當為從俗寫誤也甫者男子之美稱古書多假借為父字北人遂無一人呼為甫者唯管仲范增之號須依字讀耳談苑云千字文題云㩽員外散騎侍郎周興嗣次韻㩽字乃梁字傳寫誤耳時帝王命令尚未稱㩽至唐顯慶中始云不經鳳閣鸞臺不得稱㩽㩽之名始定於此筆談云王聖美治字學以為右文古之字書皆從左文凡字其類在左其義在右如木類其左皆從木所謂右文者皆戔小也水之小者曰淺金之小者曰錢貝之小者曰賤如此之類皆以戔為義也遁齊閒覽曰今士俗同訛者豈唯打字如不字本方鳩切人皆以逋骨反呼之遍檢諸韻並無此音歸田録云世俗語訛君子小人同其謬者惟打字打音丁雅其義本謂考擊故人相毆以物相擊皆謂之打而工造金銀器亦謂之打可矣蓋有捶擊之義也至於造舟車曰打船打車網魚曰打魚汲水曰打水役夫餉飯曰打飰兵士給衣糧曰打衣糧從者執傘曰打傘以糊粘紙曰打粘以丈尺量地曰打量舉手試眼之昏明曰打試遍檢字書了無此字音丁雅者其義主考擊之打自音謫耿以字學言之打字從手從丁丁又擊物之聲故音謫耿為是不知因何轉為丁雅也又云京師食店賣酸䭑者皆大出牌榜而俚俗昧於字法轉酸從食䭑從臽有滑稽子謂人曰彼家賣餕餡音俊切不知何物也飲食四方異宜而名號亦隨時俗言語不同至或傳者轉失其本湯餅唐人謂之不托今俗謂之餺飥晉束晳餅賦有饅頭薄持起溲牢丸之號惟饅頭至今名存而起溲牢丸莫曉何物薄持荀氏又謂薄夜亦莫知何物也集古録跋云漢北海相景君碑銘有云不永麋夀余家集録三代古器銘有云眉夀者皆為麋蓋古字簡少通用至漢猶然也又漢樊毅華嶽碑云周禮識方氏華謂之西嶽其字畫頗定惟以周禮職方為識方氏其字畫分明非訛缺疑當時周禮之學自如此蓋識志其義皆通也又漢張表碑云有畔桓利正之語畔桓疑是盤桓文字簡少假借爾又鄧乂碑考其事迹即魏鄧艾碑也艾於三國時為名將史與兖州人皆不應誤而艾乂二名不同如此余謂古人艾乂常通用漢書曰黎民艾安與懲艾創艾注皆讀為乂豈非鄧侯名艾音乂而書碑者從省歟後人讀史無音注乃直以為蒿艾之艾而流俗轉失程大昌考古編云史記堯本紀載書欽哉惟刑之靜哉徐廣曰今文尚書云惟刑之謐哉司馬貞索隱曰按古文作恤哉今文是伏生口誦恤謐相近遂作謐也又云孟子孝子之心為不若是恝徐鍇曰說文無恝字至心部􅢚字引孟子為釋乃用􅢚字從心從介其義為忽與今孟子文不同凡說文引六經論孟多異今文不獨㸃畫偏旁雖其語意皆不同也貢父詩話云前世所稱駔儈駔子黨切今人謂之牙韓文公贈玉川詩曰水北山人得名聲去年去作幕下士水南山人又繼往鞍馬僕從塞閭里少室山人索賈髙兩以諫官徴不起又云先生有才須大用宰相未許終不仕王向子直謂韓公與處士作牙人商度物賈也駔儈謂牙者世不曉所謂道源云本謂之互即互市事爾唐人書互字作㸦㸦字似互字因轉讀為牙其理如可信或云何得舉世同詞蓋不足怪今人以万為力以千為丿亦人人道之也雌黃云嘗考韋曜博奕論曰所志不出一枰之上所務不過方罫之間方言曰投博謂之枰皮兵切今俗讀作北萌切爾雅曰孫之子為曾孫又曰王父之考為曾祖郭璞注曾猶重也當音層今俗多讀作曾酒缸謂之缸其字從缶罌也下江切今俗多與釭字相亂讀作古雙切殊不知釭乃車轂中鐵又燈也與酒缸不同顧眄謂之眄其字從丏斜視也芙甸切今俗多與盼字相亂讀作匹莧切殊不知盼乃美目與顧眄不同是皆俗學訛呼字如此又云古人制字皆有意義後世有因忌諱而妄為之改易者有以私意而撰成俗字者如秦始皇以罪字似皇字因改作罪宋明帝以騧字似禍字因改作􅀈文帝以隨去辵而為隋光武以洛去水而為雒此類以朴音俗以朴為朴爾豫謂唐韻朴朴二字並匹角切惟韻略止有朴字孫諤曰按漢文紀示敦朴為天下先今韻無朴字乞附入覺字韻押由此觀之則朴與朴同集韻乃景文撰定凡字訓悉本許慎說文去聲既出朴字蒲候切入聲又出朴字與朴字同匹角切則與筆記所謂朴無朴音者不同矣豈景文而自為矛盾乎顔氏家訓云世稱匆匆不知所由按說文云匆者州里所建之旗象其柄及三遊之形所以趣民事故匆遽者稱為匆匆蔡襄茶録云茶色貴白而餅茶多以珍膏油去聲其面故有青黃紫黑之異又云茶碾以銀或鐵為之黃金性柔銅及鍮石皆能生鯹音星不入用邵氏聞見後録云宋景文公納子婦三日其婦家饋食物書云以食物暖女公曰暖字錯用從食從而從大其子退檢字書博雅中出餪字注云女嫁三日餉食為餪女幕府燕居録云唐韻䖍字部有揠字經字部有蟫字揠苖本以軋為音訛作乾字遂入䖍部爾雅蟫白魚本以淫為音訛作涇字遂入經部韻中似此甚多元結惡曲云鳴呼曲為之小為大之漸曲為之也有何不可姦邪凶惡其關音由乎關子明易傳十一篇率多竒字以生為坐以象為烏以一為以三為弎亢倉子多古文書以事為以其為下貢父詩話云司馬君實常論九旗之名旗與旗相近緩急何以區别小雅庭燎夜向晨言觀其旗左傳龍尾伏辰取虢之旗當為芹音耳閩中人言清濁之音則不改言丹青之青為萋又以中為蒸蟲為塵不知旗本是芹亦閩中人語轉青中為萋蒸也珩璜論云詩思樂泮水薄采其芹魯侯戾止言觀其旗左傳丙之辰龍尾伏辰均服振振取虢之旗鶉之賁賁天策焞焞火中成軍虢公其奔旗字從斤以詩與左傳驗之合音芹字芹畿聲相近故後人相承呼之訛矣古今詩話云樂天詩云請錢不早朝請作平聲唐人語也今人不用厮字唐人作斯音五代時作入聲陶穀詩云尖簷帽子卑凡厮是也樂天又云金屑琵琶槽雪擺胡勝厮胡語與今人同章聖朝試天德清明賦有閩士破題云天道如何仰之彌髙讀作歌㑹考試者亦閩人遂中選又荆南士人云吟雪詩用先字韻其末句云十二峰前漸漸添讀添為天曲禮曰以足蹙路馬芻者有誅陸音蹙又作蹴徐采六反又子六反禮器云不然則已蹙子六反又音促韻語陽秋云近世作文者多以紫荷槖作侍從使不知其誤晉輿服志云八座尚書則荷紫以生紫為夾槖綴之服外加於左肩所謂荷紫者非芰荷之荷乃負荷之荷也人徒見南史著荷葉槖四字遂作一句讀之殊不知晉書荷紫之義史記韓安國傳臣以三萬人衆不敵褆取辱耳徐廣曰褆一作祗也南史王筠傳沈約製郊居賦締思積時尤未都畢示筠草筠讀至雌霓五的反連蜷約撫掌欣忭曰僕常恐人呼為霓五兮反學林云南史沈約作郊居賦以章草示王筠讀之至雌霓連蜷撫掌恐人讀作雌霓平聲郊居賦注五結反與齧同音本朝范蜀公鎮召試學士院用彩霓字作平聲考試者判郊居賦霓為入聲景仁為失韻除館閣校勘學者皆為景仁憤鬱按霓字雖有兩音然文士用霓倪音多而齧者少若専用雌霓則當音齧若泛用霓字則倪音可通用杜甫石龕詩驅車石龕下仲冬見虹霓於迷字押韻又滕王亭子詩尚思鼓吹入千騎把霓旌凡此以霓作平聲押何傷並學林明皇雜録云劉晏以神童為祕書省正字上問汝為正字正得幾字晏曰天下字皆正唯朋字未正侯鯖録云海物異名云江珧柱其甲美如玉肉柱膚寸郭景純江賦云玉珧海月土肉石華世人不用此珧字乃是未知此耳楊億說苑云徐鍇仕江左至中書舍人校祕書時吳淑為校理古樂府中有槮字淑多改為操蓋章草之變鍇曰非可以一例若漁陽摻者音七鑒反三撾鼓也禰衡作漁陽參撾古歌云邉城晏開漁陽摻黃塵蕭蕭白日暗淑歎伏之示兒編卷二十三
