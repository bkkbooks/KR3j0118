body:
  text: 示兒編卷二宋孫奕撰經說易有象數易之為書也潔浄精㣲有象焉有數焉不可偏廢也夫天地雷風水火山澤為易之象木上有水曰井頥中有物曰噬嗑為卦之象坤之黃裳困之赤紱剝之牀渙之杌為爻之象人皆知之也五十有五為天地之數五十為大衍之數二篇之策當萬物之數人皆知之也然釋鳴鶴在隂其子和之則論君子之言行釋同人先號咷而後笑則論君子之出處語黙以㡬事當宻釋不出户庭以藏器待時釋射隼于髙墉則人不知之也盖夫子之於易又未始屑屑以象數泥者也乾元坤元乾坤獨備四徳屯隨臨无妄革卦間亦有之惟六子之卦俱不以元稱何哉盖乾父坤母也六子者皆其所生也父母既稱元六子不復謂之元是以乾元曰大坤元曰至坤且不得以擬乾之尊况六子乎用九用六諸卦惟乾爻純乎九乃専用陽剛之道故曰用九惟坤元純乎六乃専用隂柔之道故曰用六富以鄰不以鄰易在小畜則曰富以其鄰在泰與謙皆曰不富以其鄰何邪夫小畜則徳之小也泰謙則徳之大也故左右相比謂之鄰人君之與萬民九重之與四海中國之與四夷無非隣也人君之所以撫萬民綏四海御四夷徳有餘者不假於富徳不足者非富莫行也六五童蒙吉六五以柔順之才居聖君之位居聖君之位而猶以童蒙自處盖以人視我則聖君也以我自視則童蒙耳其不自居其聖而求師於其臣養其正性以冀聖學之髙妙非聖益聖明益明者不能也古之聖帝明王有志於聖學者初不以形迹拘故箕子為武王陳洪範反覆以汝稱周公為成王作洛誥作立政終始以孺子呼而無嫌也七日來復七日来復者昔之計月非其正嵗則以日數之即豳詩一之日二之日是也謂隂自姤而遯而否而觀而剥而坤盖六日耳及陽受之而復乃七日焉其来也剥而至復已歷七日是天數之運也先甲先庚蠱之卦曰先甲三日後甲三日㢲之卦曰先庚三日後庚三日夫先甲三日者辛也後甲三日者丁也言聖賢當事之蠱壞必有飭蠱之道既更新於其先又丁寧於其後則天下復歸於治矣故於蠱言甲先庚三日者丁也後庚三日者癸也言聖人當令之申行必有發施之道既丁寧於其先又揆度於其後則天下無不順矣故於巽言庚一說甲木主仁以示其令之寛也庚金主義以示其令之嚴也屨校滅趾噬嗑初九曰屨校滅趾无咎盖噬嗑用刑之卦也用刑之卦不絶於其初其終必難制故此卦於初爻言之盖慮罪小之時不為之懲戒則必至於大惡故滅趾使不得行則其惡不能肆也已頥取龜虎易之有頥所以觀其養也作易聖人初九既取於龜六四又取於虎二者之不相侔何哉盖古之制簠簋刻龜於盖以龜之為性不嗜食也仲冬之月虎始交則虎之為性其交有時者也大凡飲食男女人之大欲存焉有一溺其所欲則必伐其良心戕其正性烏有所謂自養哉故聖人斷斷乎有取於不嗜食之龜交有時之虎以明君子之自養者如此夬五陽一隂夫以五陽而决一隂猶衆君子而去小人之象也以常人處之則必健而暴决而剛今也不然健而濟之以說决而乘之以和則君子之待小人以忠厚欲具改過如此麗澤兑麗澤兌君子以朋友講習此言兌之為卦兌上兌下是澤鄰於澤瀦蓄者深交相灌溉互相流通此深有益於彼彼深有益於此誠得朋友之象也夫同門合志之友以善相資以文相接有過相箴有難相濟兩有所利而無寡陋之患此所謂以附麗為悅而有朋友之義也衍字誤字人有常言易以卜筮獨免秦火之戹得為全書然讀其書繹其義不無可疑者繫辭曰能說諸心能研諸侯之慮侯之二字是必傳寫之誤嘗求之於明爻有曰能說諸心能研諸慮乃知去是二字則辭切意明雜卦曰晉晝也明夷誅也先儒以為誅夷之誅然以晝與誅對則非反對之卦矣嘗求之象則曰明入地中明夷又求之於明卦有曰明夷務闇卦畧又曰明夷為闇之主則知明出地上為晝明入地中為昧當作明夷昧也若以為誅豈聖人雜卦之㫖耶汝作士帝曰臯陶蠻夷猾夏㓂賊姦宄汝作士爾雅曰士察也周禮士師注曰士察也主察獄訟之事也孔安國曰士理官也理盖獄官也欲得其曲直之理故謂之理其謂之士者則欲致其察故也月令曰命理瞻傷察創視折審斷决獄訟必端平得此之意也鄭康成曰有虞曰士夏曰大理周曰大司冦今士曹改為司理其源盖本此九共九共九篇九共者即九州之志謂之九丘之丘孔安國為𨽻古定書於序言則是於此復以為共非是九州異土殊俗故有九篇一篇言一州之事也無教逸欲臯陶謨曰無教逸欲有邦考之前漢王嘉上封事云咎繇戒帝舜曰亡敖佚欲有國兢兢業業一日二日萬機顔曰言有國之人不可傲慢逸欲但當戒謹危懼以理萬事之機也敖讀曰傲則以教字為敖其理尤長盖自古未有人君教臣下佚欲者也按㡬字尚書作㡬訓㣲也漢作機則非九官相遜不相遜舜命九官濟濟相遜和之至也劉向此言古今以為真得九官之用心然禹垂益伯夷固相遜矣若稷契臯陶䕫龍皆不見其相遜之辭何耶且以此之遜是則彼之不遜非以彼之不遜是則此之遜非曰皆是也夫舜之命禹垂益伯夷也皆出於僉言惟其出於僉言故不容於不相遜至於稷契臯陶之與䕫龍也則不待於僉言惟其不待於僉言故不用於相遜然則相遜者所當然其不相遜者亦所當然皆無一毫之偽者也所以衆賢和於朝獨為稱首冀州不言山川禹貢皆言山川示其域民以封疆之界也如濟河惟兖海岱惟青之類八州莫不皆然獨冀州不言山川之界何耶禹之意若曰天子以四海為家以中國為室一民莫非其臣也尺地莫非其有也且祭則天下名山大川咸與焉饗則四海九州之美味咸有焉無此疆爾界之限無内夏外夷之辯豈容以一山一川局之如餘州者哉禹之意㣲妙如此要蔡五百里要服薛肇明云要讀如要約久要之要則約之而已非治之也孔安國云要束以文教亦此意陸音一遥反非是二百里蔡當讀如左氏蔡蔡叔之蔡音素葛反杜預曰蔡放也薛肇明云放罪人於此故謂之蔡則讀如本字非要荒五百里要服三百里夷二百里蔡五百里荒服三百里蠻二百里流盖要荒皆在九州之外曰夷者以夷禮待之若春秋之杞鄫也曰蠻者以蠻俗待之若春秋之楚越也輕罪則蔡於要服重罪則流於荒服蔡近於夷流近於蠻則知中國之罪人尚可變蠻夷之俗也兼弱攻昧仲虺之誥曰兼弱攻昧取亂侮亡推亡固存邦乃其昌載之於書不過如此襄公十四年中行獻子曰仲虺有言曰亡者侮之亂者取之推亡固存國之道也又三十年子皮曰仲虺之志云亂者取之亡者侮之推亡固存國之利也此言一唱其汨亂聖經為甚孔安國從而和之曰弱則兼之闇則攻之亂則取之有亡形則侮之有亡道則推之有存道則輔而固之嗚呼信斯言也則仲虺是誠何心哉幸災樂禍之人也焉有佐克仁之君可出是言乎竊謂兼人則自弱攻人則自昧取人則自亂侮人則自亡推人則益自亡惟能保固人則所以自存徳至於此國乃昌盛也不然引君於非道豈告戒之辭哉放諸桐太甲既立不明伊尹放諸桐甚哉放字流傳之誤有以淈經㫖也今夷攷於書並無放之之文自太甲既立不明也乃舉湯顧諟天命以訓之及其罔念聞也又舉湯之坐以待旦以訓之至于未克變也乃始營於桐宫宻邇先王其訓其終始告戒啟廸之意無非訓之而已孰謂伊尹而肯為放君之醜耶原伊尹之意不處太甲於亳而處於桐使近先王之墓以終其喪故曰王徂桐宫居憂而已惟其克終允徳所以惟三祀十有二月朔以冕服奉王歸于亳乃即吉服也故獨止於三年之久焉雖復辟之後猶以終始惟一之說反復訓戒之未始少忘而曰伊尹為放君吾不信也况書曰宻邇先王其訓孟子亦曰太甲悔過以聽伊尹之訓已則知書序為教諸桐也明矣且舜放驩兠則驩兠之罪不可赦湯放桀則桀之惡不可揜太甲不明初無大過何放之有則知書序為非放諸桐也益明矣放教字相近以𨽻古字者遂從而譌乆矣當讀作伊尹教諸桐且書序之譌不寧惟是泰誓曰惟十有三年春大㑹於孟津序則曰惟十有一年武王伐殷一日戊午師渡孟津四為字臣為上為徳為下為民孔氏王荆公為上字去聲為徳字平聲下句同東坡解為上字平聲為徳字去聲下句同皆有義今四為字皆作去聲理尤明或謂上句二為字當上仄下平下句二為字當上平下仄君子所其無逸周公曰嗚呼君子所其無逸至則知小人之依所與曲禮拜受於尊所之所同依猶歸也君子所在皆無逸其先知者則稼穡艱難之事乃若自暇自逸則知其為小人之歸也必矣文王卑服文王卑服即康功田功文王知君臣之分不可犯也故卑躬以服事殷而已惟其卑以事殷則安時處順而得以日勤於民田之事是故既就其安民之功又就其力田之功然則卑服之効其大如此豈先儒所謂卑其衣服者所得而盡焉誥毖誥教厥誥毖庶邦至祀茲酒誥教小子至無彛酒此見文王之於臣民處之各盡其道其戒飲酒也於庶邦則曰誥毖於小子則曰誥教庶邦指士大夫而言故以毖戒之毖之為辭嚴小子指民而言故以教戒之教之為辭寛嚴以責士大夫寛以責民各當其用者也其勿誤于庶獄周公作立政初稱庶言庶獄庶慎者一中則畧庶言而稱庶獄庶慎者三終乃畧庶慎而獨以庶獄告何哉周公之意謂庶言庶慎皆不可誤而獄乃人之司命尤為當謹茍殺一不辜則不仁甚矣此周公所以惓惓再三特舉庶獄一事戒之至於卒章復以式敬爾由獄以長我王國歸美於司宼蘇公謂典獄在於克用常人嗚呼孰謂愛君愛民之心猶有切至如周公者哉執鋭顧命一人冕執鋭陸音以稅反孔氏云銳矛屬考之韵畧集韻十七凖出一鈗字注云侍臣所執引周書冕執鈗為證從金從允其義為當乃讀作允亦是而陸音非然今文尚書及孔傳陸音從兊皆非凡一時所執兵器如惠刅劉鉞戣瞿皆芒銳犀利何獨於此執矛為銳哉韵畧指侍臣所執曰鈗按許氏說文曰一人冕執鈗盖有所據而玉篇廣韻不收又何耶費誓秦誓上世帝王之書終之以文侯之命何升費誓秦誓而殿焉夫子之意為平王設也平王東遷之初有犬戎弑父之讐當卧薪嘗膽無湏㬰寧廼彊顔茍安五十一年而恬不知報在位時惟以王子攜余並立之患未除為己憂今得文侯為我殺之當思厚報故錫文侯惟恐不及曾未聞有一言及於不共戴天夫子見其如此知其無討賊之心又無撥亂之才而泰然有自安之意深痛王室於此衰矣王道於此絶矣故序其書曰平王錫晉文侯秬鬯圭瓉非褒也盖傷之也今也幸而有能治戎如魯侯悔過如秦穆公使平王幡然而改以魯秦之心為心則君父之讐庶㡬可復王轍之東庶㡬可興夫魯秦諸侯耳其眂堂堂三代未易續貂特因其治戎有備悔過有素東周以來僅有此爾雖欲不升烏得而不升夫子之定書豈茍然哉示兒編卷二
