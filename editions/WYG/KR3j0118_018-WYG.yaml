  text: 示兒編卷十八宋孫奕撰字說畫譌夫止戈之為武門王之為閏皿蟲之為蠱反正之為乏日月之為明欠土之為坎人言之為信如心之為恕具載經傳炳炳如丹則古人制字之謹嚴不可一毫加損也自俗書淈亂失其本真後學縁譌襲舛不可勝紀今畧是正之鍊近錬音東卬近邛音蛩鉛近鈆音鍾肜近彤音􅕣逢近逄音龎趨近趍音摛羨近羡音夷佳近隹音錐雎近睢音錐蛇近音迤朽近杇音烏母近毋音無椓近㭬音猪切近切音勤窘近宭音羣紙近紙音底第近苐音題巡近廵音沿簡近蕳音姦禪近襌音單屆近屇音田次近㳄音涎淖近音潮祅近袄音妖本近夲音淊諂近謟音韜美近羙音羔余近佘音奢段近叚音遐秏近耗音毛惕近慯音觴横近撗音􅀢􅄳近餳音唐易近昜音陽滴近滳音傷錫近鍚音陽船近舡音航􅀈近蚢音剛芃近芁音交芄近艽音求杯近抔音裒㢟近延音征鵬近䳟音明卯近夘音卿麥近夌音陵斛近觓音求䍘近突音深苓近芩音琹負近􅀢音裴以上平聲㨂近揀音堇芊近芈音敉肺近音滓駃近駛音史苐近第音滓沘近泚音此改近音巳豐近豊音禮疊近斖音尾秬近梠音舉茅近芧音序鬻近䰞音煮瘦近瘐音愈􅅃近欵音靄亾近亡音隠東近柬音簡篇近萹音扁諛近謏音小芍近音突近穾音天匹近疋音雅段近叚音假哂近啞音亞邛近卬音仰四近音儁近雋音吮丐近丏音免寀近宷音審傒近徯音喜以上上聲隸近肄音異糸近系音係遲近遟音棲扉近屝音翡謚近諡音示无近旡音既昇近异音忌團近圑音附伏近㐲音大戾近戻音大須近湏音頮闗近閞音飯清近凊音倩杓近枃音丐近丏音眄縛近縳音裸近祼音貫菟近免音問由近凷音塊勵近勱即同上又音邁其義一也沫近沬音昧涷近湅音練涸近凅音固孝近􅍿音教叱近叱音化突近穾音要西近音亞受近音到福近褔音副袖近䄂音溜棟近楝音練恨近悢音諒廷近迋音旺炙近灸音宄裏近衰音袖以上去聲角近甪音禄玉近玊音笛近苖音蓄朴近扑音撲教刑澤近凙音鐸洛近􅏖音涸筆近茟音律劒近釰音日鈍也僭近僣音銑首近苜音蔑商近啇音滴􅢎近析音昔愁近悐音惕衇近脈皆音脉伯近佰音陌霸近􅀢此即音􅅎取近耴音輒愡近惚音忽沐近沭音术水也押近柙音狎祫近袷音夾昧近昩音末味近昩音末戊近戉音越臼近􅍫音匊束近朿朿音刺近魔音厯以上入聲凡此皆畫之相近而訛也如虡䖍虎虞虚虐慮虜盧廬臚罏櫨纑艫籚蘆顱㯫據噱劇鐻遽皆從虍而俗皆從虎決減滅況涼沍沖淒準梁盜粱潔羨渠皆從水而俗皆從冫隨筆云書字有俗體一律不可復改者如沖涼流減決五字悉以水為冫筆陵切與氷同玉篇正收入於水部中而冫部之末亦存之而皆注云俗與氷同具􅀈縣懸殖植埴禃犆皆從直而俗從且堯嘵驍燒曉鐃澆僥橈撓饒皆從堯而俗從命卻俗作却印卯卸卿節即抑陵隂陽陸阿陂阪隅阻險限隗陋陜陟陷隰降隉阬防隄隘隔障隩附隈阮陳陶除阼陛隙際陪隖陲院隆陀陞阡陌隧隋墮隮陣陻皆從阜而俗從邑郤去㦸切姓也邑也邦鄢酇鄰郊鄙都鄭郡郵郛邰郁􅔛邠鄠郝酆􅀈鄏鄆邙郗鄩􅆁邘邵邑也鄍邲邡郇鄴祁邯鄲鄃郅鄧郢鄂䢵鄘鄖郫那鄱部郎􅀈邾􅀈皆從邑而俗從阜廛瀍躔纏廳廚廨廥廁庤龐厚也廝廕廈廜􅂒庁座皆從广而俗從厂曷葛謁竭歇揭褐偈喝愒皆從曷而俗從􅂚偏徧遍編篇扁褊皆從戸而俗從尸眞寘顚塡縝皆從眞而俗從真㬱譖濳簪皆從兟贊鑽纘酇皆從兟而俗皆從㚘參繆謬醪膠廖瘳皆從㐱而俗從􅈛宜寫富宼蔲皆從宀而俗從冖吳誤悞娛皆從吳而俗從吴瞻贍澹甔檐擔襜儋皆從詹而俗從􅉟船􅆓􅉢皆從㕣而俗從公曼冒冕皆從曰而俗從曰諍浄靜皆從爭而俗從争跨洿誇侉皆從夸而俗從夸睿叡濬皆從此而俗從睿㫖脂詣嘗皆從㫖而俗從旨效傚皆從攴而俗從力羈羇皆從四而俗從西協博皆從十而俗從小補褊裕裸裎袒裼皆從衣而俗從示兆朕之联眼瞼之瞼皆從目而俗從月亂臣十人之亂從從乚正音治而俗從乃音亂㩽天之命之敇從束從支正音飭而俗從來從力乃音賚壻坼皆從士而俗上從女下從手左傳忨嵗愒日之忨吾官切從小而俗從習凡此皆偏旁之譌也穀榖並音谷上禾實下楮名籠蘢並音礲上竹器下草名鐘鍾並音終上樂器下酒器伶彾並音零上伶人下彾㣔箴葴並音針上箴誡下草名肇肈並音兆上肇始下肈擊泮冸並音判上泮宫下氷釋邵卲並音紹上姓也下髙也胄並音宙上裔也下兜鍪祓袚並音拂上除惡下蠻衣籥蘥並音約上管籥下草名袪祛並音墟上衣袂下攘却奕弈並音亦上大也下圍棋況况並音貺上矧也譬也下寒冰觴並音商上觶也下煑也登登並音灯上升車下禮器昏昬並音婚上暝也下目暗凡此皆聲同而畫異也聲譌字音之譌甚於樂音之譌久矣學者之病乎此也如厎定之厎致也至也平也上無㸃與旨同音俗呼無底見十一薺韻上有㸃止也下也滯也福祉之祉與耻同音俗呼為止懈怠之懈音廨俗讀為邂怱遽之遽為詎俗讀為據芥蔕之蔕當讀曰蠆俗曰帝旱暵之暵當讀曰漢俗曰歎寅􅣧之寅音夷俗以為寅畏之寅伏臘之臘音蠟俗以為田獵之獵芒合音亾而以為茫沛合音貝而以為佩恒合音行而為常挫合音佐而為坐槁合音考乃以為稿旰合音幹乃以為汗平聲有以恫通為同以娀崧為戎以跫凶為蛩以逄龐為逢以髳蒙為矛以鱅墉為庸以彸鍾為充以榰技為耆以廝斯為廁以萁為箕以澌斯為西以鄑貲為晉以郫皮為卑以裨為皮以裨為卑以椸移為衣以椅猗為倚以媯圭為揮以濉雖為睢以泜墀為低以黟伊為移以邿詩為寺以腓肥為非以痱肥為扉以磯機為岐以褘揮為韋以﨑祈為欹以璩渠為遽以砠趄為徂以滁儲為塗以臚閭為盧以娛愚