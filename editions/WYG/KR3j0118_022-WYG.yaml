body:
  text: 示兒編卷二十二宋孫奕撰字說集字二胡仔苕溪叢話曰元次山集自釋曰帶笭箵而盡船注上郎下切下桑荒切竹器也故唐書音訓云讀作郎桑見結本集音訓又音上力丁切下息拯切取魚籠也盖有平仄兩音字釋又云能帶笭箵全獨保生其語雖恊韻然廣韻於庚清青三韻中不收此箵字並於上聲迥字韻中收之又曰退之與崔立之詩云四坐各低面不敢捩眼窺捩音麗琵琶撥也謂左右窺又荷池云未諳鳴槭槭那似卷翻翻又有摵摵井梧踈更殞摵音縮又音蹙並到也摵又音索殞落貎後漢趙壹詩云伊優北堂上骯髒倚門邉音亢葬盖髙抗倖直貎見東坡詩注東坡和陳履常雪中詩老檜作花真彊項趙次公云潁州多檜而花白指檜為言檜老矣而假雪以為花猶人之彊項不伏其老矣强項字如董宣不屈於公主帝目之强項令東坡次韻滕大夫詩云朅來城下作飛石一礮驚落天驕䰟次公云礮匹貎反今之砲石也又送鮮于都曹歸蜀云籋盡霜湏照碧銅次公云籋讀如鑷禮部韻亦作籋山谷筍詩寄東坡云大和諸生窘於用韻又伯時畵揩蛘虎詩云猛虎肉醉初醒時揩摩苛蛘風助威蛘與痒同神宗御製通鑑序云斷之以邪正要之以治忽注云要伊消切若要膂之要盖要者衆體之所㑹也凡㑹其宗者為要之又云此亦古人述作造端立意之所繇也繇夷周切與由同古由字從由從丂書曰若顛木之有甹孽者也後人省丂字故徐鍇曰說文無由字南史劉杳傳杳在任昉坐有人餉昉􅙢酒而作桭字昉問杳此字是否荅曰葛洪字苑作木旁集韻陣桭􅙢木名汁可為酒或作􅙢學林云天保為一大人口八十甄仲舒為予舎西土瓦中人董為千里草趙為小月走亨為二口了卓為十日卜李為十八子昌為二日運為軍走隆化為􅑙賈三刀為州破田為刄凡此皆象形取義非字書偏旁之法也藝苑雌黄云食品有畢羅者蕃中畢氏羅氏好食此味因以名之今俗乃從食而為饆饠䔫品有頗陵者昔人自頗陵國將其子來因以為名今俗乃從艸而為菠薐嗚呼字書之不講久矣以對為對以辠為罪自秦漢以來則然熈豐間嘗有成書是正譌謬學者不能深攷類以穿鑿訾之至乃妄有增損如㸃玉之㸃去井之一以􅀥為來來以劉為丣金刀以貨泉為白水真人以裴為非衣小兒以松為十八公以董為千里草以安為兩角女以春為一日夫幽為山上挂絲吴為天上有口朱為斗下木蘭為門柬草州為三刀羅為天維杳為十八日吉為十一口火為八人昌為兩日合為人一口徳為人十四心甄仲舒為予舍西土瓦中人天保為一大人口八十趙為小月走亨為二口了卓為十日卜李為十八子運為軍走岳為邱山隆為降化業為苦末以破田為刃以召刀為劭狃於習俗恬不為非甚者果加草而為菓湏加髟而為鬚景加彡而為影凖去十而為准鳳鳥之皇為皇王之皇一也必加凡而為凰燕雀之燕與燕安之燕一也必加鳥而為鷰㬥加日而為􅤱然加火而為燃岡加山而為崗莫加日而為暮若是之類豈非俗學之謬歟皇朝類苑云古文自變隸其法已錯亂後轉為楷字愈訛舛殆不可攷如言有口為吳無口為天按字書吳字本從口從音抳非天字也此因近世謬從楷法言之至如兩漢篆文尚未廢亦有可疑者如漢武帝以隱語召東方朔云先生來來解云來來􅀥也按棗字從朿音刺不從來此或是漢人所傳非當時語如丣金為劉貨泉為白水真人此則出於緯書乃漢人之語按劉字從丣音酉從金如桺留駵皆從丣非卯字也貨從貝真乃從具亦非一體不知縁何如此字書與本史所記必有一誤也學林云沈約傳曰約譔四聲譜以謂在昔詞人累千載而不悟而獨得於胸襟窮其妙㫖自謂入神陸法言論聲韻曰吳楚則傷輕清燕趙則傷重濁秦隴則去聲為入梁益則平聲似去固有即音切而知其義如之于切為諸而已切為耳如是切為爾何不切為盍不可切為叵至於閭里鄙俗亦有以音切為呼者突鸞為團屈陸為曲鶻崙為渾鶻盧為壺忒㬠為大咳洛為殻初非有師學教授之也天成自然莫知所以約所謂入神殆此類耶皇朝類苑云切韻之學出于西域漢人訓字止曰讀如某字未用反切然古語已有二聲合為一字者如不可為叵何不為盍如是為爾而已為耳之于為諸之類從西域二合之音盖切字之原也筆談緗素雜記云古語有二聲合為一字者如不可為叵何不為盍而大為耍酷寵為孔從西域二合之音盖切字之原也學者不曉龍鍾潦倒之義正如二合之音是也龍鍾切為癃字潦倒切為老字謂人之老羸癃疾者即以龍鍾潦倒目之其義取此宋子京筆記云孫炎作反切語本出於俚俗常言故謂就為鯽溜凡人不慧者即曰不鯽溜謂團曰突欒謂精曰鯽令謂孔曰窟龍不可勝舉而盧仝詩云不鯽溜鈍漢林逋詩云團欒空繞百千回是不曉俚人反語逋雖變突為團亦其繆也容齋隨筆云切脚語世人語音有以切脚而稱者亦間具之於書史中如以􅅫為勃籠槃為勃閒鐸為突落叵為不可團為突欒鉦為丁寧頂為滴􅗞角為矻落蒲為敕盧精為即零螳為突郎旁為歩郎茨為蒺藜錮為骨露窠為窟䭾是也容齋隨筆云今人書二十字為廿三十字為四十為􅕊皆說文本字也廿音入二十并也音先合反三十之省便古文也􅕊音先立反數名今直以為四十字按秦始皇凡刻石頌徳之辭皆四字一句泰山詞曰皇帝臨位二十有六年琅琊臺頌曰維二十六年皇帝作始之罘頌曰維二十九年時在中春東觀頌曰維二十九年皇帝春逰㑹稽頌曰徳愈修長三十有七年此史記所載每稱年者輒五字一句嘗得泰山詞石本乃書為廿有六年想其餘皆如是而太史公誤易之或後人傳寫之訛耳其實四字句也世說云皕音袐二百為皕廿音入二十為廿丗先合切三十為丗􅕊先入切四十為􅕊雌黄云重疊之疊古從三日至亡新以三日大盛遂改作三田戰陣之陣古用陳至羲之字篇變為陣字遂改為車字畫之變因循若此者甚多如蠶字作蚕不知蚕乃音腆船字作舡不知舡乃音工書闗作閞閞乃音弁書商作啇啇乃音的書須作湏湏乃音潰書簡作蕳蕳乃音艱書本作夲夲乃音淊書體作􅕐􅕐乃音􅀈書美惡字為羙不知羙字從火乃羔羊之羔也書肺腑字為胏不知胏字從􅙻乃乾胏之胏也以紙為紙不知紙字都奚切以券為劵不知劵字逵眷切以夌為麥不知夌字力升切以筆為茟不知茟字兵苖切塲音傷乃以為埸字受音到多以為受字徘徊之徘或用俳字俳乃音排角里之角或用角字角乃音覺以無為旡旡則音既以耒為則音劣或以毆擊之毆為敺逐或以邉徼之徼為徼字先合切乃以為芔木之芔盻字下計切乃以為盼視之盼陜州之陜與陜隘之陜形似同而義不同甲胄之胄與世胄之冑音雖同而字不同邵公奭之邵異乎徳彌卲之卲郤獻子之郤異乎以心卻之卻車䈆之䈆音朁有類乎笑言之笑地名之㐲音大有類乎伏藏之伏以進趨之趨為趍趍乃音馳以圖牒之圖為啚啚乃音鄙束與朿不分舀與臽無辯甚者以著為着以乾為乹以畵為􅀞以華為花而制字之法埽地矣字譜總論訛字云久矣倍書字體分毫㸃劃訛失後學相承遂成即真今攷訂其訛謬䟽于後且如蟲之䖝䖝音虺字須之湏湏古頮字闗之閞閞音弁字又扶邁反船之舡舡音航商之啇啇音的蠶之蚕蚕音腆鹽之盬盬音古美之羙羙音羔體之􅕐􅕐音坋本之夲夲音淊匹之疋疋音雅又音所麥之夌夌音陵凡此非為訛失是全不識字也又如顧之頋霸之覇喬之獻之献國之囯廟之庿亂之乱殺之煞趨之趍虧之􅃜錢之齊之斉齋之斎學之斈臺之䑓寳之宝驅之駈棲之栖甕之瓮兔之兎遲之遅著之着㮚之栗繩之䋲飯之飰備之偹豬之猪鄒之邹若之若肅之襄之㐮繼之継斷之断嬭之妳獮之狝軫之診珍之珎參之叅泰之㤗之恭醉之酔凡此皆俗書也又有暴字之類者上有日矣旁又加日焉類如莫之暮基之􅀈然之燃岡之崗凡此皆偏旁之贅者也又有尊墫字只一字耳而旁又加木焉如昏之婚女之汝匊之掬與之歟回之廻園之薗果之菓席之蓆凡此皆偏旁又贅者如宜㝠富宼皆從宀而俗書冝冥冨冦而從冖沖況梁涼皆從水而俗書冲况梁凉而從冫冫音氷字􅌮廳皆從广而俗皆從厂博協皆從十俗皆從小又有偏旁相錯者如舀臽相似取耴相亂束朿不分奕弈無辨鳥隹通用月月同體凡此皆俗書之訛也近時以來用字之的當以監本省韻及廣韻玉篇集韻為正韻非不正也其如鋟木匠士何皆不可攷訂况廣韻雖分明注為俗字而集韻所載則真俗相亂耳學者可不審諸雌黄云晉宋以來多能書者至梁大變蕭子雲改易字體邵陵王頗行偽字前上為草能傍作長之類是也至為一字唯見數㸃或妄斟酌遂使轉移北朝喪亂之餘書迹猥陋専輒造字猥拙甚於江南乃以百念為憂言反為變不用為罷追來為歸更生為蘇先人為老如此非一徧滿經傳又云李濟翁資暇錄云俗之誤談何限呼郡刺史為刺史謂官渉為官陟振為噴涕呿口為愛富斗為煴剪刀為箭㡌為幕禮為里予攷字書煴於問切以火伸物則知呼斗為煴當用此字濟翁不攷一槩謂之誤談非也無亦作亡自古只用此二字秦時始以無字為有無之字說文曰無文甫切今借為有無字玉篇云文甫切繁英豐盛也今為有無字古之經書皆篆文秦變篆為隸多改其字形詩書周禮春秋禮記論語皆用無字乃變篆為隸者改之惟周易首尾盡用无字蓋變隸時不曾改易不在焚之數亦不得而改至於亡字亦有存而不改者論語曰有若亡亡而為有人皆有兄弟我獨亡焉能為亡不如諸夏之亡也以上亡字獨不改者盖變隸時誤讀為存亡之亡故存而不改也史書亦多用之為無漢書曰内亡骨肉本根之輔外亡尺土藩翊之衛又曰朝亡廢官邑亡敖民地亡曠土國亡捐瘠司馬相如賦曰亡是翁者賈山曰錢者亡用器也翟方進士茍能亡恥漢書用亡字甚多敕字亦作勅字此詔敇之字也敕不若勑也從力則順於行草書而美看故古今寫敕字惟用從力之勅然世俗寫束字並作來形寫敕為􅃯者盖俗書變束為來也說文玉篇廣韻勑字並音賚惟集韻來字韻中有勑字又於㩽字下收勑注曰相承用作勑字盖言相承用則無用勑字雌黄云勞勑之勑洛代反詔敕之敕蓄力切世俗多以勑為敕縁敕字古從力是以因循致誤集韻既於去聲代字韻出勑字又於入聲職字韻列一勑字於敕字之下注云勑本音賚世以為敕字行之久矣夫勑既非敕字實出於世習之誤敕字下自不當收此字亦集韻之誤邵氏聞見後錄云文彦博本姓敬其曾大父避石晉髙祖諱更姓文至漢復姓敬入本朝其大父避翼祖諱又更姓文初敬氏避諱各用其一偏或為文氏或為茍氏然敬字從音棘非茍也從攴非文也俱非其一偏也呂氏家塾記太宗欲相正恵公左右或曰呂端之為人糊塗讀為鶻突帝曰端小事糊塗大事不糊塗决意相之栁子厚詩云善幻迷氷火齊諧笑栢塗注云東方朔傳老栢塗塗音茶又云猶訝雉為鷨音華雉也即孔安國注益稷篇華蟲之義東坡和劉景文雪詩童子愁氷硯佳人苦膠杯次公云膠字去聲與白樂天一堞膠牙餳之膠同膠杯雖出莊子置杯焉則膠而此所謂膠杯乃是酒凍也又次韻子由栁湖感物詩胡為譏評去聲不少借生意凌挫難為繁又謝陳季常恵一揞巾於感反藏也又次韻周種惠石棹詩皆鼎鐺之意想與銚同山谷云能奴登切獸名熊屬足似塵鹿絶有力故有絶人之才者謂之能能奴來切三足鱉也今徐季海於來字韻用法士多壞能乃是僧似鱉耳然魏晉人作詩多如此借韻潘子真云曾子固言阿房宫賦鼎鐺玊石珠瑰金礫弃擲邐迤秦人視之亦不甚惜瑰當作塊盖言秦人視珠玉如土塊瓦礫也洪駒父云牧之云未雩何龍鮑欽止謂予言古本是未雲何龍當以此為是摭言云李相讀春秋誤以叔孫婼敕畧呼為敕晷有小吏曰某緣師受誤呼文字今聞相公呼婼為婼方悟之耳公曰不然因撿釋文果敕畧反公大慚號小吏為一字師李陽冰上李大夫古篆書云常痛孔壁遺文汲冢簡年代浸逺謬誤滋多蔡中郎邕以豐同豊李丞相斯将束為宋魚魯一惑涇渭同流抱朴子云書三寫魚成魯帝成虎劉歆七畧云古文或誤以見為典以陶為隂蔡邕撰郭有道碑文先生諱泰字林宗其先出自有周王季之穆有虢叔者實有懿徳文王咨焉建國命氏或謂之郭即其後也李善曰髙誘戰國䇿注曰郭古文虢字也嵇康養生論云内懷殷憂則逹旦不瞑李善曰瞑古眠字劉良曰閉目曰眠學林云格亦音閣前漢文三王傳太后欲以梁王為嗣大臣及袁盎等有所闗說太后議格蘇林注曰格音閣義縱傳楊可方受告緍縱以為此亂民捕其可使者天子聞以為廢格沮事漢書音義曰廢格詔書沮已成之事師古曰格音閣凡此皆讀為閣禮記發然後禁則扞格而不勝注讀曰凍􅏖之􅏖陸徳明釋文云恪胡格反一音户各反格胡客反又户隔反凡此讀為胡客反又史記楊㒒傳云置伯格長胡廣曰格古村落字街陌屯落皆設督長也前漢楊僕傳云置伯落長師古曰置伯及邑落之長予考前漢落長之語乃在王温舒傳非楊僕傳也則知史記讀格為落凡此格讀為落學林云孟子曰士未可以言而言是以言餂之也趙岐注曰餂取也郭璞注曰方言音忝謂取物也其字從金亦作奴兼切玉篇食部有餂字注曰逹兼切古甜字廣韻曰餂他㸃切取也義與孟子合孫奭音義餂奴兼切禮部韻奴㢘切公羊傳昭公二十年惡惡止其身善善及子孫惡惡並如字一讀上烏路反又定公八年睋而鋟其板睋五多反鋟本又作鑯七㢘反又且審反以爪刻鏤歛板也古汲髙元之茶甘錄云杜子美哀貶台州鄭司户䖍詩云薈蕞何技癢薈烏外切草多貌蕞在最切又徂外切小也䖍自謂著書雖多而皆碎小之事也後人傳寫誤為㑹粹謂㑹集其純粹失之逺矣癢以兩切痒也謂人有藝技不能自忍如人之癢也甫謂䖍私著國史者不能自忍也爾唐史氏謂䖍集當世事著書八十篇目其書為㑹粹亦承襲之誤矣邵氏聞見後錄云前漢叙傳外博四荒按書外薄四海博字為誤魏髙堂隆傳是用大簡按詩是用大諌簡字為誤後漢書方術傳懷協道藝當作挾字胡廣傳議者剥異當作駮字朱浮傳保宥生人當作祐字王允乳藥求死當作茹字珩璜論此一叚並同但王允作充字史官失於是正類此者不一王荆公晚喜說字客曰覇字何以從西荆公以西在方域主殺伐累言數百不休或曰霸從雨不從西荆公輒曰如時雨化之耳其學務鑿無定論類此劉器之與東坡元祐初同朝東坡勇於為義或失之過則器之必約以典故東坡至發怒曰何處把上把去聲農人乗以事田之具獲得一劉正言來知得許多典故䕫州古名朐䏰朐音蠢又音劬䏰如尹反又音忍蚯蚓也崔偓佺淳化中判國子監有字學太宗問曰李覺嘗言四皓中一人姓或云用上加一撇或云用上加一㸃果何音偓佺曰臣聞刀下用𣙜音兩㸃下用鹿音用上一撇一㸃俱不成字四皓中一人甪里先生也予謂今書甪里用上加撇者非是俗語借與人書為一癡還書與人為一癡予每疑此語近薄借書還書理也何癡云後見王樂道與前穆四書出師頌書函中最妙絶古語借書一瓻還書一瓻欲以酒二尊徃知却例外物不敢因撿說文瓻抽遅反亦音絺注云酒器古以借書葢俗誤以為癡也並邵氏聞見後録顔氏家訓云文字者墳籍根本世之學徒多不曉字讀五經者是徐邈而非許慎習賦誦者信褚詮而忽呂忱明史記者専皮鄒而廢篆籀學漢書者恱應蘇而畧蒼雅不知書音是其枝葉小學乃其宗系晉宋以來所以部帙楷正可觀不無俗字非其大損至梁天監之間斯風未變大同之末訛替滋生蕭子雲改易字體邵陵王頗行偽字前上為草能傍作長之類是也朝野翕然以為楷式畵虎不成多所傷敗爾後墳籍畧不可看北朝喪亂之餘書迹鄙陋加以専輒造字猥拙甚於江南乃以百念為憂言反為變不用為罷追來為歸更生為蘇先人為老如此非一徧滿經傳或曰今經典子皆謂非說文所言子皆云是然則許慎勝孔子乎曰今之經典皆孔子手迹耶客曰今之說文皆許慎乎荅曰許慎撿以六文貫以部分使不得誤誤則覺之孔子存其義而不論其文也先儒尚得改文從意何况書寫流傳耶必如左傳止戈為武反正為乏皿蟲為蠱亥有二首六身之類後人自不得輒改也安敢以說文校其是非哉且余亦不専以說文為是也其有援引經傳與今乖者未之敢從大抵服其為書櫽括有條例剖㭊窮根源鄭𤣥注書往往引其為證若不信其說則㝠㝠不知一㸃一畫有何意焉世間小學者不通古今必依小篆是正書記及爾雅三蒼說文豈能悉得蒼頡本指哉亦是隨代損益各有同異西晉已徃字書何可全非但令體例成就不為専輒耳古字多假借以中為仲以說為恱以召為邵以間為閑如此之徒亦不勞改自有訛謬過成鄙俗亂旁為舌揖下無耳席中加帯惡上安西鼔外設皮鑿頭生毁獵化為獦音葛獸名出山海經竉變成寵竉音郎動反孔也故從宂如此之類不可不治吾昔初看說文嗤薄世字從正則懼人不識隨俗則意嫌其非畧是不得下筆也所見漸廣更知通變救前之執將欲半焉若文章著述猶擇㣲相影響者行之官曹文書世間尺牘不違俗也楊文公談苑云今之姓胥姓雍者皆平聲春秋胥臣漢雍齒唐雍陶皆是也蜀中作上聲去聲呼之盖蜀人率以平為去陳曄𤨏碎錄云南粤志載嶺南字􅀢音匾􅀢音矮􅀢音穩似此有十數字皆以意為之又云數之大字皆是借用専壹疑貳相參放肆軍伍水陸膠㭍把捌瓊玖收拾叔伯阡陌萬舞又云善字從口惡字從心喜怒字亦然示兒編卷二十二
