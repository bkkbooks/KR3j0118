body:
  text: 示兒編卷二十一宋孫奕撰字説集字凡諸家小説奥篇隐袠有字音異同皆裒集左方以便考閲庶急於肄業者免泛觀之勞也許慎説文觧字所引六經與今六經字多不同如説文於逑字引書曰旁逑孱功今書作方鳩草木蘄苞今作漸璪火粉米今作藻有能俾䢃今作乂宅堣夷今作嵎五品不愻今作遜娶于余山今作塗弼成五服今作弼三苖今作竄稘三百有六旬今作期元首叢脞哉今作挫譒告之修今作播至于岱宗祡今作柴髙宗夢得説使百工夐求諸野今作營庶草繁無今作廡鳥獸􅀈毛今作氄若藥不眄眩今作瞑彛倫攸殬今作斁西伯戡􅧰今作黎􅀢誓今作費誓若顛木之甹枿今作由我之不壁今作辟焯見三友今作灼今汝懖懖今作􅀈左杖黄戉今作鉞與紂戰于坶野今作牧一人冕執鈗今作銳堋滛于家今作朋平豒東作今作秩武王惟􅀈今作冐􅀈于我艱今作扞常皈常任今作伯陳宲赤刀今作寳刖劓􅢴黥今作椓乃惟孺子今作頒又於玼字引詩曰新臺有泚乃作泚陶覆陶穴今作復瓶之􅀢矣今作罄譬彼瘣木今作壊􅀈􅀈彼有屋今作佌痑痑駱馬今作嘽衣裳今作楚墫墫舞我今作蹲邛有㫖今作鷊彼薾維何今作爾葛藟榮之今作縈墻有薺今作茨顔如蕣華今作舜􅣛􅣛山川今作滌食鬱及藿今作薁菉竹猗猗今作緑克岐克㘈今作嶷大夷呬矣今作喙無然呭呭今作泄咠咠幡幡今作㨗振旅嗔嗔今作闐民之方唸吚今作殿屎謂地蓋厚不敢不趚今作蹐詞之􅀈矣今作輯誐以溢我今作假我埶黍稷今作蓺謍謍青蠅今作營􅠭兮達兮今作挑無我兮今作魗國歩斯矉今作頻又於犕字引易曰犕牛乗馬今作服百榖草木䕻於地今作麗乎土新而不􅫝今作越其牛觢今作掣夫乾寉然今作確􅴓之離今作昊寷其屋今作豐為馰顙今作的冄三黷今作瀆忼龍有悔今作亢天地今作氤氲升大吉今作允包㐬今作荒又於削字引周禮曰任削地今作稍廟門容大鼏七个今作扃赤魃今作茇煣牙外不熑今作兼又於磒字引春秋曰磒石于宋五今作隕癹夷藴崇之今作芟又於㥋字引孝經曰哭不㥋今作偯案古之治經者各有師承各尊其師之所傳而成一家之學故字有不同者各因其所傳之本而已許氏説文所引乃雜舉諸家之本故用字有不同今諸家訓注多云故本者乃别本也許氏訓字之義而為説文其引經皆不悖於義徐鉉稍為之粉飾遂成一家之學後世訓釋字義者皆以此為宗可謂博矣至於俗字訛謬増損偏旁者亦皆明出於本字之下吝者惜也俗作恡赴者告也俗作訃祚者祭福也俗作胙蹇者蹇蹇也俗作謇緥者襁緥也俗作褓澂者清也俗作澄者水厓也俗作濵閔者弔也俗作憫尊者酒尊也俗作罇埶者種也俗作蓺雅烏加反楚鳥也俗作鴉創楚良反傷也俗作瘡汻呼古反水厓也俗作滸鮏桑經反魚臭也俗作鯹捼奴禾反兩手摩也俗作挼虚邱如反大邱也俗作墟㨔胡感反揺手也俗作撼已上俗作字皆非是賡者古文續也俗作古行反草者自保反櫟實也一曰象斗子可染墨今俗人以為􅀈又作皂皁二字皆無意義充耳者塞耳也俗加玉為珫差池後人加足為蹉跎儋何俗作擔荷槖佗俗作駱駝裴囘俗作俳佪結環俗作髻鬟滂沛俗作􅗈霈劈歴俗作霹靂蝄蜽俗作魍魎秋千俗作鞦韆嵇字非古也奚氏避難造之低債價停僦伺皆從人後人所加又有它語訓字逴敇角反逺也讀為棹㯔此芮反數祭也讀為舂夌為㯔之㯔啄琢從豕蟸從彘皆從其聲徐鉉皆曰今無此語謂逴字下數字按五方之俗言語不同歴時既久則有不相通曉者毋足怪也許慎說文之後又有玉篇廣韻類篇集韻等字書愈廣率皆兼載俗書讀其書者徃徃不知本始惟觀許慎説文解字可以槩見秦昌朝字譜東觀餘論云隋經籍志唐藝文志何遜集皆八㢧晉天福本但詩兩㢧今世傳本是也獨春明宋氏有舊本八㢧特完因借傳之又云小宋太一宮詩瑞木千尋聳仙圖幾弔開注云真誥謂一卷為一弔殊不知真誥所謂㢧即卷字盖從省文真誥音亦爾非弔字也碧虛子陳景元據真誥以此字即篇字亦誤也東皋雜録云嘗見人讀冐頓音墨突徧閲漢書無此音後出晉書音義又曲逆音句遇事出文選注功臣贊予以李善文選陸士衡髙祖功臣賛頌撿之无此音俟别借五臣本参攷史炤通鑑釋文冐頓劉伯莊音墨特或讀如本字程大昌演繁露云陳平封曲逆侯或讀如去遇非也地理志中山國曲逆縣得名因濡乃官反水至城北曲而西流故曰曲逆章帝醜其名改曰蒲隂則曲逆之讀當如本字不當借因孔殷父珩璜論曰陳平封曲逆侯漢書無别音文選載陸士衡髙祖功臣頌曲逆宏逹好謀能深注曲區句反逆音遇見五臣文選章貢本同學林新編云前漢地理志上郡有龜兹應劭注曰龜兹音邱慈按字書龜居逵反又居求切蓋居求者音鳩亦收在鳩字韵中然則龜兹當音鳩慈而應劭音龜作邱者於字書居求切誤調入邱音也其餘史書並音龜兹作邱慈實應劭唱其誤耳通鑑釋文云光武二十二年龜兹前書邱慈今龜音勾邱切兹音沮惟切蓋急言耳章懐説通鑑釋文安帝義熈二年契丹音乞徼外國名新唐書契丹音欺訖切又直音乞演繁露云蕃語以華言譯之皆得其近似耳天竺語轉而為捐篤身毒唐有吐蕃本秃髪孤秃髪語轉遂為吐蕃唃厮羅之父名籛逋乃贊普也達怛乃靺鞨也契丹之契讀如喫惟新唐書有音冐頓讀如黒突惟晉書音義有之漢音義無也不知其何所本然嘗怪蕃語入中國其元無本字而以華語記之如捐篤身毒固無所柰何至如龜兹既知其為邱慈何不徑以邱慈書之廼借用龜兹以待飜字者而後音讀乃明是必有説也華戎語異雖借華字記之尚與本語不全諧恊其必宛轉於兩字之間如龜近邱而不全為邱必龜邱聲合然後相近故不得以一字正命也新唐書音靺莫著切鞨何莫反又直音末曷反學林新編云蕃夷名號有他音不讀作本字故可汗音榼寒閼支音烟支谷蠡音禄棃狋氏音權精浩舋音閣名番汗音盤寒允吾音鈆牙先零音銑䗲凡此皆為它音書亦不載者舊唐書回紇傳云元和四年里迦可汗遣使請改為囘鶻義取囘旋輕㨗如鶻新囘鶻傳貞元四年七月可汗上表請改紇字為鶻通鑑釋文敦煌音屯皇康居下音渠月氏下音支于寘與闐同樂浪音洛郎浩舋音誥門顯宗咸康五年羯部居列切永和二十年索頭昔各􅋀西北之人以服飾為别號元興三年番禺音潘愚南海邑屬廣州又宋明帝秦始二年番禺上蒲何切下魚容切南海邑光武紀牂牁上兹郎切下古何切牂牁者係舩栰也楚伐夜郎椓船於且蘭岸因以名其地漢髙帝元年殽函上何交切下胡讒切殽山名函谷名或作崤崡乂景帝前三年函谷闗音咸齊和帝紀瀏陽力久切長沙邑予按毛詩瀏其清兮音留又力久切今長沙亦呼劉陽為留陽魏世祖黄初六年番陽音婆或作鄱漢豫章邑吳芮所封號番君以此至三國鄱陽郡明帝景初元年山荏任之切漢太山郡有荏縣荏山在縣東北或音淄東海為荏侯國又三國屬魏晉恵帝永熈元年繆莫六切姓也廣韻一屋韻莫六切禮記有繆公又姓也元寧元年郄隆上抽遲切姓也愍帝建興元年郄鑒綺鑒切姓也又元帝大興二年郄鑒丑之切姓也鑒其名古銜切又見明帝大寧元年懐帝永嘉六年郝詵上呵各切姓也下所臻切大興二年應詹於陵切姓也詹其名應本自周武王後左傳曰邘晉應韓武之穆也顯宗咸康四年鮮于屈鮮于覆姓風俗通曰武王封箕子于朝鮮其子食采於于因氏焉元興元年朝鮮上音潮直驕切下音仙顯宗元和三年昝堅上子感切姓也宋太祖元嘉二十八年惡來哀都切商紂之臣史記曰惡來善讒毁諸侯梁武帝普通六年万俟醜奴音墨棋虜複姓醜奴其名前漢成帝永始五年翟方進上徒歴切姓也王莽傳二年翟義徒歴切亦音澤翟方進之子又曰姓譜徒歴切方進之子五年侯芭音葩晉愍帝建興元年刁勰音協傖子助耕切楚人别種周赧王三十六年夫音扶差初加切檀弓下夫差謂行人儀曰是夫也多言夫音扶差音初佳反前漢陸賈傳呉王夫差智伯極武而亡師古曰夫音扶差楚宜反蒼梧王元徽二年蠻蜑蕩旱切蠻屬元帝大興二年左衛率所類切與帥同掾俞絹切官屬魏元帝景元四年閹官衣亷切又於檢切宮中官門者通作奄晉恵帝永熈八年賨人徂東切南蠻賦稱賨人者乃税賦之家永熈二年蔕芥上丑邁切下居拜切蔕芥刺鯁也愍帝建興二年聼事他丁切古者治官謂之聼事後語省直曰听故加广堂􅀢堂無四壁曰􅀢見漢胡建傳注袠直一切書帙謂之書衣魏嘉平三年造次七到切急遽也邵陵厲公嘉平五年蟣蝨上舉豈切蝨之子也下色櫛切齧人蟲張設知亮切陳設也元帝景元二年比屋毗必切比次也晉武帝大元十四年浮屠同都切袁宏漢紀浮屠佛也佛者漢言覺也将以覺悟羣生宋武帝元年浮圖圖或作屠與前浮屠同五誡音戒釋家有五誡二十一年曖昩於代切晻曖暗昩也安帝隆安二年肺附無他音肺腑者如肝肺之總附著也前漢劉向傳臣託肺附師古曰舊觧云肺附謂肝肺相附着猶言心膂一説謂斫木之肺札也自言於帝室猶肺札附於大材木也宋文帝元嘉二十六年偵候丑正切謂覘偵而伺候之也元徽四年青繖蘇旱切葢也梁武帝天監四年迢遰上田聊切下徒計切謂去相逺也中大通㝃乳羙辨切生子免娠也漢宣帝地節三年繡絪馮絪亦作茵馮讀曰憑茵蓐也謂以繡為絪馮秦十四年説林説難説式拙切難乃旦切説林者廣説諸事其多若林故曰説林難者説前人行事與之不同而詰難之按商君傳云其事有十餘萬言又按劉伯荘云説難自是一書非史記所云韓非囚秦説難之篇所謂説難者説音游説之説難音難易之難韓非子傳索隐曰説音税難奴干反言游説之道為難故曰説難揚子問明篇韓非作説難之書而卒死乎説難司馬曰説音税漢宣帝二年耳孫耳音仍昆孫之子為耳孫藝苑雌黄曰學林云漢書在紀言耳孫在表言曾孫當從漢書以耳孫為曾孫若音仍則誤予謂不然耳字正當作仍音以世數言之曾孫為四世𤣥孫為五世仍孫為八世所謂仍孫者即𤣥孫之曾孫也晉灼之言當矣彦賔謂耳孫為曾孫非也綜核上子宋切讀若總下夏革切讀若覈孝元永光三年舛午上尺兖切下五故切舛錯也午逆也孝成永始五年弟弟徒計切弟弟者言弟能順理也王莽傳駱驛音洛懌言不絶也屈彊上其勿切下其兩切梗戾也更始元年屈起渠勿切如山之崛起魏明帝太和三年於邑上汪胡切呼也通作嗚下於及切憂也通作悒前漢中山靖王勝傳師古曰於邑短氣貎於音嗚邑一合反或讀如本字周赧王二十九年􅀈劉向説苑作鸇字林鷂屬始皇二十五年蛛蝥之靡上音朱下音矛蜘蛛也靡羙為切與糜同謂糜爛也以上多見史炤通鑑釋文上項羽傅楊喜追羽羽吒之喜人馬俱驚辟易師古曰辟易謂開張而易其本處辟音壁易音亦左傳襄公二十一年未知見時不敢輸幣亦不敢暴露暴普卜反史記張儀賛曰世惡蘇秦者以其先死而儀振暴其短以扶其説索隐曰暴歩卜反退之南海廟碑云不為表襮音博又逋沃切又云蜿蜿蜒蜒上音鴛下音延歐公集古錄䟦云以集本校之皆同惟集本云蜿蜿蜒蜒而碑云蜒蜒蜿蜿小異當以碑本為正揚子君子篇蠢廸撿押温公曰當作撿押押户夾切重黎篇六國蚩蚩為嬴弱姬卒之屏營温公曰屏音并謂屏營猶旁皇失據之貎予謂今世士大夫表牋結尾有激切屏營之語正用是也故特附于此周禮地官大司徒注若今度支經用内宰正嵗均其稍食注均調度也上徒弔反下待洛反或如字通鑑釋文前哀帝二年調徒弔反調賦也度徒故反用度也詩何彼穠矣王姬之車釋文曰車聲如居今尺奢反韋昭曰古皆音尺奢反從漢以來始有居音史記燕王劉澤世家張卿田生子説曰今呂氏雅故本推轂髙帝就天下索隠曰推昌誰反通鑑前孝文十四年推轂上通囘反通也下古録反輻所輳也左傳成公二年鄭邱緩曰自始合茍有險余必下推車陸音昌誰反又他囘反前漢鄭當時其推轂上推字無音澹庵先生胡忠簡䟦保静庵記云静古文作靚攷經史有數義韓奕詩傳云祁祁徐也靚也許氏説文云靚召也賈誼鵩賦云澹乎若深澗之靚則取淡泊之義相如上林賦云靚荘刻飭郭璞云靚荘粉白黛黑則取刻飭之義閻朝隐之文如麗服靚荘則取文章靡麗之義然又有以為名者周顯王四十八年子謹靚王定立是也按陸徳明靚音静又一音才性反則靚非惟數義亦自兩音然祁祁之義一也徳明於風則云舒遲於雅則云徐也此又不可不辯近世學者不精音訓如上庠魁選夫子之道忠恕於恕字押誰毁誰譽不知譽字乃在平聲故予讀保静菴記表而出之貴學者以根經為本忠簡公諱銓洪景盧欵乃齋記云二字本書為欵乃見元次山栁子厚集中其音如襖靄涪翁始以欵為􅍁雖字異音則同栁元相去久逺流傳或譌翁當有所據栁别本或并二字為襖音又别出一靄字非也又蠙州記云淮蠙書於禹貢今番江漁者采蚌蛤或得琲如芡實有光熖不愧合浦珠字書又出琕玭二字皆與蠙音義同梁馬仙琕唐栁玭所名者也馬大年云元城先生嘗論漢髙帝功臣曰屠狗販繒之徒呼繒字與餳相近後撿漢灌嬰傳注但云帛之總名而已今按韻畧慈陵切注云帛也增咨登切則世人以繒為增誠非也尚書厥篚元纎縞注云元黒繒也縞白繒也釋音云似陵反禮運云瘞繒注云幣帛曰繒釋音似仍反左氏衛文公大帛之冠注云大白厚繒繒疾陵切晉書地理志繒才陵反以諸音義攷之當以疾陵為正見嬾真子説文元成語録曰然韵切為慈陵又若似陵之近也餳字乃在耕字韵中徐盈切則與似陵不相類但聲相近示兒編卷二十一
