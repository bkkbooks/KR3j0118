body:
  text: 示兒編卷七宋孫奕撰文説史重復書有意異而言同者有意同而言異者如矜而不爭羣而不黨言同而意異者也足食足兵民信之矣言異而意同者也然前之言人皆知之後之言無子貢三者之問孰知其兵食之外又有信也古人之立言深嚴如此若夫後世則不然良史之才古今莫不以遷固為稱首史記孟嘗君傳言馮公形容狀貌乃四字而一意西漢張禹傳言後堂理絲竹管絃乃四字而二物昭帝贊言周成有管蔡四國流言之變夫舉四國則管蔡已在其中矣乃四字而駢文南史恩幸傳序云謀於管仲齊桓有召陵之師邇於易牙小白掩陽門之善小白即齊桓也不亦重復乎獨韓退之作王仲舒碑又作志蘇子瞻作司馬君實行狀又作碑其事雖同其辭則異雖然左氏此患亦或不免文公五年臧文仲聞六與蓼滅曰臯陶庭堅不祀忽諸六蓼二國皆臯陶之後椘滅之按文公十八年才子八人注云庭堅臯陶字也則此既言臯陶又言庭堅何耶文重復漢人文章最為近古然文之重復亦自漢儒倡之賈生過秦論曰席卷天下包舉宇內囊括四海之意并吞八荒之心四句而一意也至於陸士衡文賦序曰妍媸好惡四字而二意也張景陽之七命既曰煢嫠為之劈摽又曰孀老為之嗚咽豈煢嫠孀老果二義乎既曰按以商王之箸又曰承以帝辛之杯豈商王帝辛果二人乎既曰蹙封豨又曰僨馮豕豈封豨馮豕果二物乎承舛襲訛絲竹管絃均二物耳班孟堅既不之審遽書此以為張禹後堂之盛王羲之又拾以序蘭亭則承舛襲訛而不自知也祖述文意歐陽文忠公初得昌黎文嘗曰茍得祿矣當盡力於斯文以償其素志居無幾何公以文章獨步當世而於昌黎不無所得觀其詞語豐潤意緒婉曲俯仰揖遜步驟馳騁皆得韓子之體故本論似原道上范司諌書似諍臣論書梅聖俞詩稿似送孟東野序縱囚論怪竹辨斷句皆似原人蓋有橫翔捷出不減韓作而平淡詳贍過之若夫羅池碑曰春與猿吟兮秋鶴與飛則退之又自深得離騷東皇太一歌吉日兮辰良之句法寄崔立之詩曰歡華不滿眼咎責塞兩儀則又深造乎班固賔戲福不盈眥禍溢於世魏人章疏亦云福不盈眥禍將溢世之遺意其前輩各相祖述類如此祖意而勝東坡喜雨亭記云使天而雨珠則寒者不得以為𥜗使天而雨玉則飢者不得以為粟即劉陶改鑄大錢議有曰就使當今沙礫化為南金瓦石變為和玉使百姓飢無所食渴無所飲之遺意然不如東坡辭婉意明所謂出藍更青者也擬聖作經作經以擬聖者其後儒之僣者乎自非僣者則揚雄不作太玄經以擬易漢王長文亦不作通元經以擬易晉劉向不作洪範五行傳以擬書漢陳黯亦不作禹誥以擬書唐而虞卿春秋趙相呂氏春秋秦相呂不韋楚漢春秋陸賈吳越春秋趙曄晉春秋檀道鸞唐春秋吳競之類無聞焉漢尚書孔衍隋尚書王劭後漢尚書漢魏尚書並孔衍續書王通續尚書唐陳正卿之類無有焉揚雄不作法言以擬論語之精微王通不作中説以擬論語之緼奧嗚呼孝經孔子所論也孰知郭良輔又變為武孝經唐鄭氏又易為女孝經唐侯莫陳邈妻以至農孝經皇朝賈元道酒孝經不著撰人名氏紛紛而出爾雅周公所記也孔鮒又轉為小爾雅不著撰人名氏擬為楚孔鮒撰後乃别行張楫又衍為廣雅魏以至博雅張楫埤雅陸農師譊譊而起與配孝經者又有馬融之忠經林少潁羣經辨惑云馬融作忠經崇文總目又載海鵬撰忠經失其姓氏凖論語者又有宋尚宮之女論語唐內人宋若莘著見唐書宋若昭傳皆其僣之尤者乎史體因革自編年變為紀為書為表為世家為列傳也司馬遷躋項羽於紀與帝王並則失史體遷固列呂后於紀不沒其實則合春秋法史記始制八書前漢改為十志東觀漢書曰記華嶠後漢曰典張勃曰録吳録何法盛曰説晉中興書五代史曰考司天考其實一也如遷曰平凖固曰食貨前曰地理後曰郡國書曰河渠志曰溝洫書曰封禪志曰郊祀班易天官為天文范易禮樂為禮儀律與厯禮與樂兵與刑或分或合百官輿服固所無曄增之五行藝文馬所闕班補之隋獨著經籍唐特出選舉沿革紛如也自太史公效周譜以為表桓談説何法盛改表為注以至諸侯稍卑當别於天子故稱世家然陳勝吳廣起自羣盜遷不應特舉而列之唯三國以吳蜀儕之列國為當傳之為體大抵記公卿之行事遷始傳循吏晉曰良吏三國則闕曄始傳文苑隋曰文學唐曰文藝後漢為獨行唐為卓行五代一行焉後漢為方術魏為方伎晉藝術焉自晉至唐改東都逸民為隱逸自唐以來改南史孝義為孝友列女不見於西漢義兒獨見於五代遷固皆作佞幸南北曰恩幸魏晉俱作后妃五季曰家人稱號雖異體制不殊也古今之言詳略聖人之言丈約而意已盡自然不可易而非若後世君子好自立論也觀孔子之言性曰相近而已而孟子曰善荀子曰惡揚子曰混何其彰彰也觀孔子之言三代相因曰損益可知而已而董仲舒曰上敬上忠上文太史公曰忠以野敬以鬼文以僿何其紛紛也至於行夏之時一語而已後世乃有建子建丑建寅三正三統之擾擾禮記大傳改正朔疏云周子商丑夏寅是改正也周夜半商雞鳴夏平旦是易朔也三正三統見前漢侓厯志篇春秋之書一編年而已後世遂變而為紀書世家列傳甚者書變而為志為表志又變而為考五代史列傳又衍而為敘傳前漢河出圖洛出書論語與易大傳兩言之而已春秋緯乃言河以通乾出天苞洛以流坤吐地符河龍圖發洛龜書感河圖有九篇洛書有六篇中人以上中人以下曰可與不可語上而已語六芋尹無宇辭曰人有十等昭公七年班固古今人表分九等前司馬遷儒之外五家孟堅儒之外八流盧景亮撰于敻神道碑或增或損或因或革紛紛籍籍殆有不可勝言者矣句法同伊尹有不被堯舜之澤若己推而納之溝中張平子得之於賦曰人或不得其所若己納之於湟范雎一飰之德必償睚眥之怨必報孔融得之於書曰睚眥之怨必讎一餐之惠必報黃魯直學優齋銘曰學哉身哉身哉學哉句法使班孟堅典引曰唐哉皇哉皇哉唐哉其祖出益稷曰臣哉鄰哉鄰哉臣哉杜子美南郊賦曰九五之後人人自以為遭唐虞四十年來家家自以為稷卨句法使曹子建與楊德祖書曰人人自謂握靈蛇之珠家家自謂抱荆山之玉其源出崔駰逹旨曰家家有以和樂人人有以自優及揚雄解嘲曰家家自以為稷卨人人自以為臯陶退之進學解曰口不絶吟於六藝之文手不停披於百家之篇句法使夏侯湛抵疑曰志不輟著述之業口不釋雅頌之音李白上裴長史書曰何王公大人之門不可揮長劍乎句法用鄒陽上吳王書曰何王之門不可曵長裾乎唐啖助曰設教於本其敝且末設教於末敝將奈何句法使唐太宗帝範曰取法於上僅得其中取法於中不免為下並正觀二十二年徐惠上疏曰作法於儉尤恐其奢作法於奢何以示後其祖出渾罕曰作法於涼其敝猶貪作法於貪敝將若之何昭四年文意同孟子不教民而用之謂殃民告子下即孔子以不教民戰是謂棄之論語十三之遺意孟子分人以財謂之惠教人以善謂之忠滕文上即孔子愛之能勿勞乎忠焉能勿誨乎憲問之遺意孟子曰子産惠而不知為政離婁下即孔子曰子産惠人也憲問之遺意孟子曰大人者言不必信行不必果離婁下即孔子曰言必信行必果硜硜然小人哉子路之遺意孟子詖辭知其所蔽淫辭知其所陷邪辭知其所離遁辭知其所窮公孫上即易大傳將叛者其辭慙中心疑者其辭枝吉人之辭寡躁人之辭多誣善之人其辭遊失其守者其辭屈之遺意祭統云飬則觀其順也喪則觀其哀也祭則觀其敬而時也盡此三道者孝子之行也即孝經居則致其敬飬則致其樂病則致其憂喪則致其哀祭則致其嚴五者備矣然後能事親之遺意左傳序學者優而柔之使自求之厭而飫之使自趨之即與東方朔答客難枉而直之使自得之優而柔之使自求之揆而度之使自索之同中庸曰施諸己而不願亦勿施於人即子曰己所不欲勿施於人論語十五之遺意荀子曰勞苦之事則爭先之饒樂之事則能讓即子曰仁者先難而後獲之遺意論語六經同文舜告禹曰衆非元后何戴后非衆罔與守邦伊尹告太甲曰民非后罔克胥匡以生后非民罔以辟四方曲禮愛而知其惡憎而知其善大學好而知其惡惡而知其美儒行禮之以和為貴有子曰禮之用和為貴禮器曰經禮三百曲禮三千中庸曰禮儀三百威儀三千少儀曰士依於德遊於藝子曰依於仁遊於藝語七仲尼燕居曰眀乎郊社之義禘嘗之禮治國其如示諸掌而已乎中庸曰明乎郊社之禮禘嘗之義治國其猶示諸掌乎子産曰夫禮天之經也地之義也民之行也天地之經而民是則之昭二十五子曰夫孝天之經也地之義也民之行也天地之經而民是則之三才章孔文子之將攻大叔也訪於仲尼仲尼曰胡簋之事則嘗學之矣甲兵之事未之聞也哀十一年衛靈公問陳於孔子孔子對曰爼豆之事則嘗聞之矣軍旅之事未之學也語十五經異文周官曰唐虞百官夏商官倍明堂位曰有虞氏官五十夏后氏官百殷二百周三百孟子曰夏曰校殷曰序明堂位曰序夏后氏之學也禮記曰五十不從力征周禮曰國中六十野則六十有五皆征之記曰天子有世婦有嬪周禮天官所序先見九嬪次則見世婦王制孟子皆載公侯地方百里伯七十里子男五十里周禮大司徒云諸公之地封疆方五百里諸侯之地封疆方四百里諸伯之地三百里諸子之地二百里諸男之地方百里地官遂人凡治野夫間有遂十夫有溝百夫有洫千夫有澮萬夫有川冬官匠人為溝洫田首謂之遂井間謂之溝成間謂之洫同間謂之澮孟子言有布縷之征粟米之征力役之征周禮載師言宅不毛者有里布田不耕者出屋粟凡民無職事者出夫家之征語曰夫子之道忠恕而已矣里仁中庸曰忠恕違道不逺子曰夏禮吾能言之杞不足徴也殷禮吾能言之宋不足徴也文獻不足故也足則吾能徴之矣八佾孔子曰吾欲觀夏道是故之杞而不足徴也吾得夏時焉吾欲觀殷道是故之宋而不足徴也吾得坤乾焉坤乾之義夏時之等吾以是觀之禮運子曰夫民教之以德齊之以禮則民有格心教之以政齊之以刑則民有遁心緇衣子曰道之以政齊之以刑則民免而無耻道之以德齊之以禮有耻且格為政檀弓曰兄弟吾哭諸廟父之友吾哭諸廟門之外師吾哭諸寢朋友吾哭諸寢門之外所知吾哭諸野奔喪曰哭父之黨於廟母妻之黨於寢師於廟門外朋友於寢門外所識於野張帷曲禮曰父之讎弗與共戴天兄弟之讎不反兵交遊之讎不同國檀弓曰子夏問於孔子曰居父母之仇如之何夫子曰寢苫枕干不仕弗與共天下也遇諸市朝不反兵而鬬曰請問居昆弟之仇如之何曰仕弗與共國銜君命而使雖遇之不鬬曰請問居從父昆弟之仇如之何曰不為魁主人能則執兵陪其後調人曰凡和難父之仇辟諸海外兄弟之仇避諸千里之外從父兄弟之讎不同國揚子曰子遊子夏得其書矣未得其所以書也宰我子貢得其言矣未得其所以言也顔淵閔子得其行矣未得其所以行也君子篇與論語德行政事言語文學之説大異左氏曰禆諶謀於野則獲謀於邑則否襄三十一年與論語為命禆諶草創之之説大異史同文蒯通為漢言之則曰秦失其鹿天下共逐蘇世長為唐言之則曰隋失其鹿天下共逐狄仁傑為張光輔言之則曰一越王死百越王生房琯為第五琦言之則曰一國忠死百國忠生衛青在位淮南寢謀何武上封事之語也漢辛慶忌傳汲黯在朝淮南寢謀韋處厚上疏之語也唐裴度傳富貴不歸故鄉如衣錦夜行項籍思歸之語也前富貴不歸故鄉如衣繡夜行漢武為朱買臣言也前蘇章曰今夕蘇孺文與故人飲者私恩也明日冀州刺史按事者公法也遂舉正其罪後漢源懷曰今日源懷與故人飲酒之座非鞫獄之所也明日公庭始為使人檢鎮將元尼須罪狀之處既而懷欲劾尼須後魏文帝勞軍細柳先驅至不得入都尉曰軍中聞將軍令不聞天子詔上至使使持節詔將軍乃開壁門後戒太子曰周亞夫真可任亞夫傳太宗使宦官至假志玄所志玄謂軍門不可夜開手敕不辨真偽留之至明太宗曰真將軍唐貢禹曰冠一免可復冠乎前司馬騰曰門一杜其可開乎晉叔孫通曰本一搖天下震動狄仁傑曰本一搖天下危矣張釋之曰廷尉天下之平也一傾民安所措手足李素立諌髙祖曰三尺之法一搖則民無所措手足堯朝有進善之旌漢文紀舜有告善之旌管子威公問畫地為牢藝不入削木為吏議不對司馬子長報任少卿書畫地為獄議不入刻木為吏期不對路溫舒傳敢於殺人而不敢於飬人前刑法志忍於殺人而不忍於刑人仲長統昌言死諸葛走生仲逹晉宣帝紀死姚崇算生張説唐明皇録死劉楨芘生顧總幽怪録寧我薄人無人薄我宣十二年寧我負卿無卿負我魏氏春秋寧我負人無人負我孫盛雜記野禽殫走犬烹前蒯通傳狡兔死良狗烹韓信傳無異使羊將狼皆不肯為用張良傳其治如狼牧羊不可令治民義縱傳示兒編卷七
