  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3j0118_WYG_005-1a, image: WYG0864/WYG0864-0443c.png}
body:
  text: 示兒編卷五宋孫奕撰經說論語哀公問社哀公問社於宰我至既往不咎按哀公患三桓之侈也欲以諸侯去之公遇孟武伯問曰余及死乎三問不對公欲以越伐魯而去三桓哀公二十七年則哀公懷去三桓之心久矣而患其彊故假古人弗用命則戮于社之意甘誓以問焉宰我謂周人以栗使民戰栗勸之以誅也聖人警之以成事不說遂事不諌既往不咎之三語謂三桓自宣公以來至於今勢逼公室積威五世莫能制之也一旦而欲誅之則昭公之事可鑒矣昭公二十三年季平子作亂昭公奔齊哀公茍知自治則三桓之禍自息無事於誅也不以其道得之子曰富與貴是人之所欲也至不去也蓋富貴人之大欲存焉善處富貴者必以其道苟不以其道而得處富貴則不處之也貧賤人之大惡存焉善去貧賤者必以其道茍不以其道而得去貧賤則不去之也觀過斯知仁矣子曰人之過也各於其黨觀過斯知仁矣黨謂偏也偏則過之所由起也觀吾有偏而不正之處於此乎識之則過不得著見矣非仁者能之乎朝聞道夕死可矣孔子豈尚未聞道者茍聞天下之有道則死亦無遺恨矣蓋憂天下如此其急孰謂微生髙直此言微生髙於乞醯之際盡其委曲之道先儒泥於孰謂微生髙直之句乃解乞諸其鄰為不直是直情徑行而無委曲周旋之義豈善與人交者哉嗚呼聖人之意决不如是故曰孰謂微生髙為直情徑行之直先難後獲子曰仁者先難而後獲此章救樊遲之失也自其學稼學圃觀之則遲避害趨利之心勝故夫子於問仁則對以先難後獲問崇德則對以先事後得蓋抑其利欲之心而勉之義理當為之事茍能先義後利非仁者之用心乎南子說者皆引史記以謂孔子見衛靈公之寵姬南子仲尼弟子傳以愚觀之必非衛之南子蓋嘗考家語曰孔子適衛子驕為僕顔刻字子驕史記作顔髙衛靈公與夫人南子同車出而令宦者雍梁驂乘使孔子為次乘遊過市孔子耻之且聖人方以季桓子受齊女樂而去魯適衛至衛而又耻為靈公南子次乘豈肯輕身以先於匹婦哉又且六經以至魯論家語皆無見衛南子之文不知子長何所本而云然則南子者為誰是必魯之南蒯也何以知之以佛肸召子欲往而知之也佛肸以中牟畔子路不欲子往而夫子有豈匏瓜之喻南蒯以費畔子路亦不悅其見昭公十二年南蒯以費畔遂奔齊十三年費人畔南氏即南蒯也蓋昭公十四年南蒯之奔齊也侍飲於景公公曰叛夫對曰臣欲張公室也杜預曰張强也南蒯欲弱季氏而強公室此夫子所以見之將以興魯也與佛肸事不約而同故知其必非見衛之南子而見魯之南子也昭昭矣民鮮久矣子曰中庸之為德也其至矣乎民鮮久矣言中庸之德其極至難能之事斯民之所日用常行者也然行之者能暫而不能久故曰民鮮久矣老彭竊比於我老彭按大有卦匪其彭陸音步郎反子夏作旁老彭當讀如匪其彭之彭者音旁旁側也欲自比於老子之側蓋謙辭也老子古之好道者宜孔子之所自比嘗考諸曽子問有記孔子聞諸老聃者屢矣家語亦曰孔子問禮於老聃此誠孔子欲自附於老子之側之驗也舊說以老彭為彭祖然六經所不載聖人所不道非夫子之願比者今不取束修漢儒說自行束修以上皆以十段脯為束修蓋因禮記束修之問不出竟及束修一犬以誤之也觀鄭𤣥注論語謂年十五以上也後漢杜詩薦伏湛曰自行束修訖無毁玷注云謂年十五以上然以經意詳之初非此意聖人設教雖互鄉闕黨童子所不拒長少何擇焉惟延篤傳吾自束修以求為人臣不陷於不忠為人子不陷於不孝注云束修謂束𢃄修飭此說稍通然以修為修飭則是以束為束𢃄則非不若以檢束修飭為正如鄭均傳曰均束修安貧太守薦劉般束修至行皆同一意方性夫解禮記束修之問以為與論語名同而實異其說謂約治其身則無不誨之真得所謂人潔己以進與其潔也之意聞韶人皆以聞韶不知肉味為喜之之詞吾獨以為怒之之辭何也曰食㫖不甘者悲而不知也曰發憤忘食者怒而不知也曰在齊聞韶者亦怒而不知也未聞有人喜而不知者矣蓋韶帝樂也齊侯國也夫子在齊忽聞侯國僭作帝樂又至三月之久是以怒而不知肉味故曰不圖為樂之至於斯也非怒辭而何一說以子在齊絶句韓退之改三月為音字亦穿鑿聞韶三月絶句文莫吾猶人也欒肇曰按燕齊之間謂勉強為文莫今語猶然肇深於論語此說必有所授杜詩有久拚野鶴同雙鬢遮莫鄰雞下五更遮莫二字殆不可曉嚴有翼以儘教之說發明之其㫖逺顯豫喜其文相若故併有取焉耳草堂詩箋云遮音之夜反無間然子曰禹吾無間然矣間隙也猶玷缺也孔子謂禹之所為我無以見其玷缺之可議也由其菲飲食惡衣服卑宫室言之似儉不中禮也由其致孝乎鬼神致美乎黻冕盡力乎溝洫言之則誠無玷缺之可議是以始終言其無間然矣食不厭精厭讀如厭飫之厭言食與膾雖精而細亦不厭飫而食之蓋夫子嘗曰食無求飽又曰謀道不謀食故知其於精細猶不求其厭飫况饐餲餒敗臭惡失飪則不食也必矣先進後進子曰先進於禮樂至吾從先進先進指三代而上後進指三代而下也謂三代而上教行俗美而禮樂逹天下雖野人亦能之况君子乎三代而下政異俗殊而禮樂有壞闕惟君子能之野人則莫之能行也所以夫子必欲從三代之盛時也皆不及門也子曰從我於陳蔡者至子游子夏門非門庭之門乃門目之門夫子歎其從陳蔡之徒其同患難如此茍不幸不保首領以沒皆不及門目之側無以表於後世是有遺恨也可不念歟遂舉四科之目以歸於顔閔而下十人焉子樂閔子侍側誾誾如也子路行行如也冉有子貢侃侃如也此三句非夫子之言乃當時記事者之言也繼之以子樂若由也不得其死然云者乃是夫子因子路行行遂指其胸中之病而為是言則子樂當作子曰聲之誤也曰悅聲相近寫者既誤以為悅又轉悅為樂故也既以由也為不得其死又何樂之有論篤是與子曰論篤是與君子者乎色莊者乎與如吾與㸃也之與論其篤厚則所與者君子之人乎色莊之人乎君子則躬行者色莊則色厲而內荏者不可則止所謂大臣者以道事君不可則止大臣以道格君心之非則無復有發於政害於事者此所謂不可則止也忠告而善道之子貢問友子曰忠告而善道之不可則止毋自辱焉言忠告即不可則止也言善道之即毋自辱焉也自非自取自求之自乃訓從也凡有不可處即止之豈非忠告乎毋從取辱之事以導之豈非善道之乎何謂從耻辱之事以導之凡非禮非義之事一或導之則辱身也不忠不孝之事一或導之則辱君親也既辱身又辱君親非朋友之罪而誰罪必也狂狷乎子曰不得中行而與之必也狂狷乎狂者進取狷者有所不為也此章嘆無中道之可與也聖門之學不容有一偏之失太過之偏流為狂不及之偏流為狷故子張之病在太過子夏之病在不及聖人皆稱其偏以拒之焉有狂狷而尚與之者乎乃知此言乎者疑辭也疑則不與可知與狂者乎則狂者進取即太過也與狷者乎則狷者有所不為即不及也中道安在哉聖人深歎無中行之可與故發是言也禹稷躬稼南宫適曰禹稷躬稼而有天下初夫子雖不之答終也必曰君子哉若人且禹盡力於溝洫而有天下則然矣稷播種百榖不過一諸侯耳而云有天下何哉得非積功纍仁至文武而興乎桓公殺公子糾子路曰桓公殺公子紏召忽死之管仲不死曰未仁乎至如其仁子貢曰管仲非仁者與桓公殺公子紏不能死又相之至經於溝瀆而莫之知也桓公齊襄公之弟也初襄公之立也政令無常故公子小白奔莒齊地公子糾奔魯公孫無知弒襄公齊人殺無知大夫髙傒先有以隂召小白故小白自莒先入而得齊是為桓公非取諸子紏之手也乃殺子紏小白誠惡矣然齊實納小白也春秋莊公九年書公伐齊納紏齊小白入於齊左氏誤多子字公榖皆無子字是也何稱紏而不稱子言小白而又言齊是紏不當立而小白當立者也九月又書齊人取子紏殺之以紏謂之取傷紏之在魯魯不能覆護齊得而殺之所以甚齊之惡而譏魯之不競也以子繫之紏蓋子紏兄也弟其可殺乎所以重小白之不弟也管仲雖嘗為子紏之傅然子紏未嘗為世子不當爭立是以管仲明此之義終身不讐桓公而得相之以霸也嘗觀伊川之說以桓公為兄子紏為弟往往因薄昭與淮南厲王書曰齊桓殺其弟以反國遂誤之晦庵又附㑹而援其說蓋不之審也按史記齊世家云襄公立殺誅數不當羣弟恐禍及故次弟紏奔魯小白之莒十二年公孫無知弒襄公而自立髙國隂召小白於莒髙傒立之為桓公左氏莊公八年注云子紏小白庶兄鄧驥左氏指縱云桓公襄公之季弟也世家既云次弟紏左氏注又云紏為小白庶兄指縱又云桓公為季弟則子紏兄也小白弟也無疑矣故荀子亦曰齊桓殺兄而爭國仲尼篇伊川之說誠為誤矣鄉原鄉原德之賊晦庵先生云原與願同非也願之為言慤也願慤則為謹厚之人必不肯同流合汚所謂鄉原即推原人之情意隨波逐流佞僞馳騁茍合求媚於世故曰一鄉之原人是以為德之賊也司馬溫公解揚子賊仁近鄉原謂所至之鄉狥衆隨俗求媚於人者其說盡之示兒編卷五
