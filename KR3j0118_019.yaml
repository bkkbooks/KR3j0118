body:
  text: 示兒編巻十九宋孫奕撰字說字異而義同天地一也濳虛温公作䒶墬古天地字雷風一也周禮作靁飌古雷風字左傳九扈毛詩桑扈扈字爾雅用鳸字說文用雇字又或作􅀈其實一也萱草毛詩用諼字韓詩外傳嵇康養生論用萱字阮籍詠懐詩用諠字說文用藼蕿萱三字其實一也衮者衣之别名詩謂之衮禮記謂之巻荀子謂之棬其為衣一也敔者止樂之器二禮尚書謂之敔詩謂之圄其為樂一也獄一也在詩則有宜岸宜獄在揚子則有狴犴使人多禮在漢刑法志則有獄豻不平韶一也書謂之簫韶左傳謂之㲈箾周禮謂之大㲈史記謂之九招孟子謂之徵招角招樂記曰建櫜建讀為鍵僖二十三年作櫜鞬九言反其為弓矢之衣一也公劉鞸琫容刀桓公二年作鞸鞛上浦頂反下布孔反其為容刀之飾一也樂記何人斯作壎篪笙師文中子皆作塤禮記周禮皆作八蜡字林獨作八禇詩神祇祖考以安樂之周禮作天地神示音祇禮器有繁纓巾車作樊纓繁樊並歩干反禮記裨冕荀子禮論作卑􅀈與裨冕同祭統共齊盛甸師作齍盛太宰以八柄詔王天官内史作八枋兵病反繫詞天地絪縕班固東都賦作烟熅書至治馨香郊特牲作羶薌羶當作馨谷風匍匐救之檀弓作扶服詩綿蠻黄鳥大學作緡蠻書云耄期射義作旄期語云齊衰昏義作資衰周書哀矜折獄于定國傳作哀鰥哲獄子張篇君子之道焉可誣也薛宣傳作焉可憮也論語申申如也漢書作伸伸又侃侃如也唐張嘉貞傳作偘偘又鄉人儺郊特牲作鄉人禓音傷又為儺月令又作難乃多反又必也狂狷孟子作狂獧莊子齊物篇罔兩問景孔子世家木石之怪䕫罔閬注魍魎閬音兩龜䇿傳序伏靈者千歳松根也本草作茯苓祭義君子頃歩而弗敢忘孝荀子勸學不積蹞歩孟子夫蚓上食槁壤下飲黄泉荀子勸學螾無爪牙之利螾與蚓同魯頌能修泮宫禮器王制並作頖宫堯典南訛馮相氏作南譌五和反又毛毨司裘作㲝毨上音毛崧髙不畏彊禦陳咸傳作疆圉甘棠勿翦韋𤣥成傳作勿鬋學記夏楚二物舜典注作榎楚詩和鸞雍雍東都賦作龢鑾夬卦其行次且與趦趄同韓愈盤谷序足將進而趦趄進學解佶屈聱牙唐元結傳作聱齖姤卦羸豕孚蹢躅三年問柳宗元貞作躑躅困卦于臲卼秦誓邦之杌隉說命亮隂三祀喪服四制作諒闇儒行篳門圭窬音竇襄公十五年作閨竇縱叟王謀反事縱子勇反臾音勇柳子厚貞符敺脅縱踴宋玉九辯鉏鋙而難入陸士衡文賦或岨峿而不安白居易無可奈何歌齟齬其心胸曲禮定猶與嵇康養生論内懷猶豫馬援傳計尤豫未决光武紀冘豫冘音滛說文曰冘冘行貌東觀記狐疑未决也亦音由不定也太史公六家要指論語者以六蓺為法孟子序作藝僖二十四年狄固貪惏屈子離騷作貪婪經曰嗚呼一也漢五行志作烏滹孔光傳作嗚呼王貢作惡虖董賢傳禮記大學並作於戲詩烈文作於乎詩云委蛇一也後儒林傳序作委它韓詩外傳任光傳贊楊秉傳並作逶迤楚詞離騷九辯皆作委蛇九章作委移九歎作逶移列子作猗移烽燧一也韓安國傳作􅀢􅀢子虛賦作㷭􅥂田獵一也五子之歌作畋無逸作于田繫詞作以佃小宗伯作大甸並音田禹貢雲土夢作乂職方作雲瞢亾貢反又滎波職方氏注作滎播音波又被孟豬職方氏作望諸左傳爾雅宋玉對楚王問皆作孟諸孔氏曰豬尚書作盟豬即爾雅東有孟豬是也孟子封之有庳漢昌邑王傳作有鼻鄒陽傳有卑並毗至反梁惠王下大王事薰鬻史記匈奴傳葷粥居于北蠻外紀黄帝北逐薰鬻禮記晉人先有事於惡池呼池揚子知江河之惡沲音烏􅀈職方氏其川虖池光武紀渡滹沲又鰥寡孤獨得其飬詩至于矜寡矜音鰥詩彷徨不忍去荀子禮論方皇㒺挾讀作彷徨西都賦降周流以彷徨荀子正論坎井之鼃莊子作壇井詩唐風云采苓采苓爾雅云霝大苦釋曰蘦一名大苦郭璞云苦草也孟子云啜粥飲水荀子冨國篇嚽菽飲水嚽與啜同書湯居亳荀子彊國作薄詩王居鎬京荀子正論作滈又作鄗淮南子云屈商囚於羑里子長報任少卿書作牖里詩岐有夷之行前地理志太王徒􅑢古岐字又即有邰家室前地理志后稷封斄讀曰邰禹貢至於陪尾前地理志作倍尾又析支渠捜前地理志作渠叟檀弓自敗於臺音胡駘春秋作狐鮐繫詞世紀作包犧漢律厯志作炮犧通厯作庖犧左昭公十七年注莊子大宗師揚子問道班固東都賦皆作伏羲揚雄傳作宓犧後蔡邕張衡傳作羲皇荀子成相作伏戲前漢作宓戲書有臯陶鼂錯傳作咎繇荀子成相篇湯讓於牟光荘子作務光牟與務同荀子曰堯學於君疇新序子貢對哀公作君疇史或作尹夀書仲虺之誥荀子法行篇作中蘬與仲虺同書說命學記作兌命論語周任有言季氏盤庚作遲任又子貢樂記荀子董仲舒贊作子贛又曾㸃史記作曾蒧音㸃又仲弓荀子作子弓又孟之反哀公十一年作孟之側又作孟子反莊子作孟子反何論云孟之反或云字反孟子云宋牼荀子作宋鈃與牼同又逢蒙荀子王伯篇作蠭門音逢蒙淮南子王褒頌作逢門七畧作蠭門又離婁莊子作離朱左傳納公孫寜于陳公羊作寗禮運注亦作寗過秦論六國之士有寧越即寗越也史記有寗成傳前漢作寗成書君牙緇衣作君雅書咸有一徳禮記作尹吉吉音告盤庚翼奉傳作般庚又吕刑緇衣孝經作甫刑說者謂吕刑後封甫東坡本孔頴達之說君奭曰割申勸寧王之徳緇衣作周田觀文王之徳詩小雅學記作宵雅宵之言小也音消宣王之臣有南仲班固人物表博古圖作南中中仲古字通用前漢鼂錯荆王劉賈贊及叙傳作朝錯書鯀陻洪水國語作鮌列子名禦宼前藝文志作圄宼圄音禦賈誼弔屈原賦云莫邪崔駰達㫖辭作鏌鎁詩顯顯令徳中庸作憲憲又鵲之疆疆表記作姜姜又脊令在原左傳爾雅東方朔荅客難作鶺鴒又樂爾妻孥中庸作妻帑又氓之蚩蚩過秦論甿隸之人劉向傳民萌何以勸勉三氓字皆民也又倉庚喈喈宋玉好色賦作鶬鶊信南山云原隰邍師作邍隰古原字書云天難諶詩天難忱斯又虎賁綴衣沈約宋志作虎賁班固西都賦作贅衣大禹謨洚水儆予滕文公下洚水警余舜典云姦宄司刑作姦軌舜典法言曰殂落萬章作徂落又洪範有八政前藝文志作鴻範又王道平平史記作王道便便又敷納以言文帝紀作傅納以言又隨山刋木地理志作栞書在璿璣易畧例處璇璣以觀大運又縲絏之中太史公傳作累紲之辱與縲紲同孟子雖有鎡基樊酈等贊作兹基今病小愈前郊祀志上病瘉讀作愈又伊尹在畎畆之中劉向傳雖在甽畆鼂錯傳中國之所以離南畮也與畆同子虛賦下崢嶸而無地兮甘泉賦似紫宫之崢嶸音宏過秦論遁廵而不敢進遁千旬反趙后傳逡循固讓霍光傳使者旁午猶言交横也劉向傳水旱饑蝝螽螟蠭午並起蠭午猶雜遝也悼李夫人賦惟幼眇之相羊猶逍遙也宋玉風賦徜中庭音常羊一本作倘劉向傳惓惓之義與拳同中庸得一善則拳拳服膺司馬遷傳拳拳之忠王商傳商言有固疾讀作痼賈誼傳䟽曰必為錮疾杜鄴傳報睚眦睚音厓舉目也眦即眥字目厓也孔光傳厓眥莫不中傷厓五懈反眥杜懈反郊祀志毒冒毒音代冒莫佩反西域傳贊睹犀象瑇瑁則連珠厓七郡瑇瑁古代妹武帝紀單于待命加嫚音曼董仲舒傳桀㬥謾音慢鼂錯傳在俛卬之間卬讀作仰王章傳今不自激卭讀作昻仰頭為卬揚雄傳横江潭以南􅐹兮􅐹往也子放反又甘泉賦􅉨􅉨離宫般以相燭兮􅉨古往字髙帝紀旗幟皆赤式志反字或作識作志音義同食貨志旗織加其上織作熾叔孫通傳設兵張旗志與幟同式志反五行志劉屈氂復坐祝謯要斬謯側據反古詛字上官后傳祝謯後宫謯古詛字律厯志黄帝使泠淪音倫外紀黄帝紀命伶倫造律吕揚雄解嘲縹縹有凌雲之志縹匹昭反揚雄作飄飄相如子虛賦封彊畫界彊讀作疆王子侯表畺土過制畺與疆同趙廣漢傳廋索私屠沽廋與捜同王莾傳摉索城中摉與捜同藝文志易之嗛又與謙同五行志岷山崩癰讀作雍王莾傳長王館兩岸崩邕讀作壅蒯通傳天下匈匈翟方進傳羣下兇兇匈匈二字雖無音皆當作上聲讀項羽贊頫首延頸頫古俯字韓信傳俛出跨下俛亦俯字鄭宗傳皞天罔極皞與昊同相如封禪書肇自顥穹生民顥與昊同蘓武傳霍光寑其奏趙充國傳夜不寢至旦論語終夜不寢寑與寢同書曰若疇圻父即詩云祈父孔氏曰司馬掌封畿兵甲古者祈圻畿同字得通用故詩作祈書作圻字同而義異一大禹謨降水儆予即孟子謂洚水者洪水也禹貢北過降水水名伊訓臣下不匡其刑墨祭統草艾則墨田蚡傳竇嬰墨墨不得志讀作黙家語在厄篇有埃墨墮飯中顔回取而食之昭十四年貪以敗官為墨冏命侍御僕從萬章下使之僕僕爾亟拜也大禹謨汝惟不伐既濟卦髙宗伐鬼方車千秋傳千秋無伐閱伐讀作閥詩伐木丁丁堯典厥民夷平也草蟲我心則夷悅也舜典蠻夷夷狄猾夏繫辭夷者傷也玉藻灌尊夏后以雞夷讀作彛孟子引詩民之秉夷讀曰彛韓愈羅池廟碑不鄙夷其民堯典以殷仲春殷正也詩憂心殷殷憂貌漢文帝贊海内殷冨盛也語殷因於夏禮國名相如傳文君侍者通殷勤與慇同大禹謨皋陶矢厥謨矢陳也大東其直如矢箭也莊子人間世篇愛馬者以筐盛矢與屎同雍也夫子矢之誓也太甲惟明明后君也曲禮再拜稽首而后對與後同書毋作神羞耻也左傳可以羞於王公進也膳夫掌王之食飲膳羞致滋味為羞又永底烝民之生致也梅福傳爵禄天下之底石與砥同洪範五皇極中也又威用六極窮也詩昊天㒺極盡也窮也星有北極室亦有極杜詩仙仗離丹極李白大鵬賦序云可謂神遊八極之表倪寛傳天子建中和之極正也舜典讓于䕫龍䕫舜臣也大禹謨䕫䕫齋栗敬貌劉子曰䕫之一足獸名洪範九疇類也孟子糞其田疇說文曰耕治之田也荀子正論至賢疇四海成也籌也前律厯志疇人子弟與疇同書疇敢不袛若王之休命誰也檀弓疇昔之夜疇昔也無逸君子所其無逸安也立政乃惟庶習逸徳之人過也孟子遺逸而不怨遺也唐文藝傳序史家逸其行事失也成公三年馬逸不能止奔也杜詩俊逸鮑叅軍超也大禹謨儆戒無虞度也國語文王詢于八虞官也孟子伯者之民驩虞如也樂也詩騶虞獸名舜典疇若予工順也莊子人間世吾語若汝也漢石顯傳綬若若耶長貌唐儒學傳序取三品以上子弟若孫為之與也孟子序若此者衆如也泰誓毒痡四海老子亭之毒之王弼注亭謂品其形毒謂成其質臣工奄觀銍艾讀作乂即乂也前郊祀志天下艾安讀曰乂治也王褒傳俊艾將自至讀作乂俊乂也傅介子傳不誅無以懲艾讀作乂下武昭哉嗣服事也論語有事弟子服其勞用也又以服事殷服事也詩無思不服畏也賈誼傳服飛入誼舍讀作鵩書弼成五服又彰施于五彩作服衣也詩麟之定題也定之方中星名我将維天其右之右與祐同書相成王為左右泰卦以左右民音左佑助也詩采苓舍旃舍旃之也王褒傳頌荷旃被毳與氊同甘棠召伯所說息也問明篇韓非作説難之書詩胡為乎泥中胡何也狼跋其胡頷也胡考之寧遐也應劭漢儀奏曰宋愚人寶燕石覩者掩口盧胡而笑笑貌李傳贊屈萬乘之尊自等於古胡胡人也又桓桓武王桓威也周禮公執桓圭植也周易磐桓利居貞旋也屯卦小心翼翼㳟也書翼日乃瘳明也莊子以禮為翼羽也又榖則異室榖生也榖旦于差善也書既冨方榖禄也百榖用成榖粟也又我武維揚威武也曲禮堂上布武跡也語曰武盡美矣武王樂名示兒編卷十九
