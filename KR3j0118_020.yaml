body:
  text: 示兒編卷二十宋孫奕撰字説字同而義異二詩鶴鳴于九皋九折澤也哀公二十一年魯人之皋數年緩也燕燕于飛鳥嘉賔式燕以衎安也又夏屋渠渠勤也前漢吳王傳為渠率大也後漢薊子訓傳兒識父母軒渠笑悅軒舉笑貌前漢石渠論五經同異閣名杜詩憶渠愁只睡他也韓詩清溝映汚渠溝也俾爾耆而艾老也夜未艾止也孟子求三年之艾草名又夀考且寧考老也作召公考成也書三載考績推也爾雅釋名父死曰考淮南子夏后之璜不能無考瑕也又福履將之履祿也君子所履踐也孝經滿而不溢盈也維天之命假以溢我漢食貨志黃金以溢為名禮樂志郊祀歌舞成八溢並與益同公孫丑下弟子齊宿而後敢言讀作肅漢哀帝紀宿夜憂勞讀作夙西域傳大宛國有馬耆目宿讀作苜蓿左傳再宿為信息夫躬傳僕遫不足數僕步木反莊子人間世篇適有蚉虻僕緣前郊祀志匆明上通匆與聰同陳湯傳踰匆嶺與蔥同樊酈等贊雖有兹基兹讀曰鎡胸奴傳前世重之兹甚與滋同益也書念兹在兹此也李尋傳人民繇俗繇與謠同鼂錯傳禹得咎繇與皋陶同髙帝紀常繇讀作徭王吉傳吸新吐故以練五臧才浪反王莽傳府臧完具前地理志市明珠璧流離與琉璃同揚雄傳亡春秋之彼離讀作披離易明兩作離卦名詩彼黍離離盛貌旄邱流離之子别也班固東都賦僸佅兜離夷樂名張良贊髙祖數離困厄遭也毛詩注芍藥一名將離草名文選沈休文詩紫燕光陸離明也食貨志賦入貢棐與篚同戾太子傳母作棐德古匪字書天棐忱辭輔也髙帝發關中老弱未傅者悉詣軍傅音附鼂錯贊爰盎亦善傅會讀曰附律厯志罷去尤疏逺者十七家與踈同王吉傳布衣疏食與蔬同翼奉傳般庚遷殷谷永傳般樂遊畋並音盤乾卦反復道也復芳服反叔孫通傳惠帝作復道與復同髙帝紀以沛為湯沐邑復其民除也雍也亦可以弗畔矣夫畔背也左傳如農之有畔田界詩無然畔援猶跋扈也鄉黨屏氣似不息者漢廣不可休息髙帝紀臣有息女答客難喟然長息雍也今汝畫止也揚子書心畫也字畫鼂錯傳計畫始行策也揚子或曰人羡久生告子上無或乎王之不智也惑同泰卦后以財成天地之道財與裁同賈誼傳唯陛下財幸裁字同五行志選期門郎有財力者與才同文帝紀見馬遺財足與才同曲禮臨財毋茍得貨財中孚卦我有好爵吾與爾靡之靡本作縻同亡池反文帝紀為酒醪以靡榖者多音縻繫詞天髙地卑丙吉傳西曹地忍之地但也亦第也又其臭如蘭香也鄉黨臭惡不食穢也又其殆庶幾乎庶幸也論語既庶矣衆也籩人棗栗古栗字敘傳郡中震栗讀作栗又云栗取豫老景也禮記以共齊盛共與供同小明靖共爾位作恭字中庸拳拳服膺胸也詩戎狄是膺書誕膺天命上擊也下受也曲禮擬人必於其倫比也食貨志黍稷擬擬盛貌音擬少儀客爵居左又禮器周禮曰享先王以玉爵酒器孟子周室班爵祿也經解潔淨精微妙也又不遺微小毛詩不以微薄廢禮小也語曰微管仲吾其被髮左衽無也學記善學者如攻堅木論語剛毅木訥近仁檀弓事君有犯無隱匿也積也中庸索隱行怪逸也孟子惻隱之心痛也荀子哀公篇其馬將失讀作逸奔也杜欽傳言失欲之生害也與逸同繫詞原始要終要求也賈誼策一脛之大幾如要讀作腰王莽贊以要名譽讀作邀論語雖曰不要君吾不信也揚子般投其斧而習諸揚雄傳般倕棄其剞􅩻與班同人名禮樂志般裔裔班趙充國傳般師罷兵音班還也孟子有欲為王留行者霍去病傳留落不耦孟子我非堯舜之道不敢陳於王前漢史陳陳相因論語子在陳楊子一卷之書必立之師周易師衆也論語加之以師旅易不速之客三人來速召也楊子震乎辰何來之遲而去之速也易元者善之長也孟子勇士不忘喪其元首也書一人元良大也董策春秋謂一為元始也司馬遷贊或有柢梧音悟項羽傳諸將莫敢枝梧音悟張良等贊魁梧竒偉音悟言可警悟今人讀為吾非也字異而音同鄉黨當暑袗絺綌玉藻振絺綌不入公門與袗同之忍反為政非其鬼而祭之諂也表記事君逺而諫則讇也本亦作諂傳潢汙行潦之水食貨志川原為黃滹與潢汚同五行志兒啼腹中亦作啼嚴助傳孤子謕號古啼字吕后紀徘徊往來古裴字郊祀志神裴回若留放文帝紀見馬遺財足與裁同髙惠后文功臣表裁十一二與財同鼂錯傳逺縣才至音才僅也王褒傳萬祥畢溱讀作臻禮樂志四極爰轃與臻同項籍傳楚蜂起之將古蜂字過秦論豪傑蜂起東方朔傳變詐鏠出谷永傳災異鋒起趙廣漢傳專厲強壯蜂氣中山靖王傳讒言之徒蜂生並讀曰鋒相如封禪書逄涌原泉逄讀曰蜂言如逄大原泉也五行志􅀢火長通詩頡之頏之甘泉賦魚頡而鳥𦐄胡行反詩差池其羽子虛賦柴池茈虎柴音差參差也茈音此虎音豸不齊也刑法志法度􅤚異姓諸侯王表墮城銷刃火規反禮樂志六合紛員音云相如傳威武紛云揚雄傳紛沄沸渭奮擊貌韋賢傳萬國平古攸字所也敘傳九疇敘古攸字食貨志直為此廪廩也危也揚雄傳下隂􅉃以慘廪兮廪來感反一讀如本字寒涼意循吏傳此廩廪庶幾德讓君子之遺風言有風采也西域傳須國稟食給也音廩王莽傳封劋胡子子小反西域傳王莽封郭欽為剼胡子子小反枚乘傳隊入深淵隊直類反王莽傳危亡之禍不隧如髮直類反天文志枉矢墜至地則石也讀作墜敘傳薄姬墜魏古墜字禮樂志王吉疏恩愛寖薄古浸字溝洫志西南出寢數百里古浸字劉向傳災異􅒓甚嚴延年傳浸浸日多漸也地理志寖曰五湖古浸字中庸君子之道暗然而日章音暗文帝紀詔三光暗昧音暗律厯志宓戲氏之所以順天地宓與伏同相如傳青琴虙妃虙讀作伏藝文志蹴􅀢上子六反下巨六反枚乘傳東方朔傳作蹴鞠霍去病傳作躢鞠髙帝紀令趨銷印又令趣丞相急定功行封並音促孟子舍己之田而藝人之田甫田或耘或耔音云本亦作藝禮運君位危則大臣倍步內反坊記利祿先死者而後生者則民不偝音倍莊十一年禹湯罪已其興也悖焉蒲忽反告子浡然而生梁惠王則苖浡然興之矣作勃同繫詞屈信相感而利害生樂記習其俯仰詘伸郊祀志莫不扼􅓲音厄又與扼同又嗔目扼􅓲張良等贊數離困厄與厄同太史公傳仲尼厄而作春秋翟義傳以成三古厄字刑法志聖人既躬明哲之性讀作哲敘傳聖哲之常音哲孟子抱關擊柝貨殖傳作擊􅢎與柝同周禮辨師五采繅音早古藻字都宗人國有大故則令􅀈祠本作禱丁老反太卜清二瞢音夢占人八簭音筮太卜三􅪃音兆太祝辨九􅉔音拜太胥舍采音釋菜字同而音異賈誼傳貴賤有等而不隃貴踰同趙充國傳兵難隃度音遙韋賢傳我王以偷愈同襄三十年晉未可偷也音偷薄也孝經示之以好惡周禮天地神示音只子路行行如也音項詩置彼周行音航詩有覺德行音幸論語從之純如也從音縱又從者見之才用反詩衡從其畝平聲檀弓爾無從從縱字上聲繫詞造書契音忌書帝曰契音屑詩死生契闊音挈通鑑安帝義熙二年契丹音乞左傳敘創通大義音創曲禮頭有創則沐初良反禮器犧尊在西素何反書犧牷牲用音羲易輿説輹吐活反詩説于桑田音稅論語不亦説乎音悅采薇命將率本亦作帥桓二年藻率鞸鞛音律祭義古之獻繭者其率用此與音律中庸山一卷石之多卷音權玉藻龍卷以祭音衮論語則可卷而懷之音捲毛詩卷阿音拳曲也曲禮定猶與音又檀弓下咏斯猶音搖孟子般樂飲酒音盤學行般投其斧音班相如封禪書般般之獸古班字趙充國傳般師罷兵音班書十旬弗返音循均人豐年則公旬用三日音均論語不能專對如字大司徒其民專而長徒刃反孟子今病小愈荀子君子篇天子者形至佚心至愈音偷媒氏純帛無過五旬音緇詩白純束音屯髙祖紀諸侯罷至戲下虛為反謂軍之旌麾通鑑髙祖紀項羽進至戲許宜反地名荀子文武之道同伏戲與羲同大學詩云於戲前王不忘好胡反樂記禮有喪服小記葬者虞音赴成二年左輪朱殷音因赤黑色也詩殷其靁音隱景帝紀罪人不帑胸奴傳虛費府帑台黨反禮樂志陳舜之後招樂存焉音韶項羽贊招八州而朝同列音翹舉也揚雄傳默有深湛之思與沉同成帝贊湛于酒色音耽大禹謨奄有四海與淹同漢郊祀歌神奄留與淹同論語辟諸草木音譬戾太子傳辟諸甘泉音避洪範惟辟作福必益反君也孟子放辟邪侈與僻同禮記王制正刑明辟音闢法也張釋之傳跪而結之音係陸賈傳尉他結箕踞音髻尚書推而內之溝中音納溝洫志盟津洛內音汭樂記詩云莫其德音莫白反詩維莫之春音暮示兒編卷二十
