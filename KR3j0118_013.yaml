body:
  text: 示兒編卷十三宋孫奕撰正誤齒牙或疑昌黎去年落一牙今年落一齒為煩文豫按楊中立解誰謂鼠無牙曰牙牡齒也鼠無牡齒陸曰鼠有齒而無牙僖公五年云輔車相依唇亡齒寒杜曰輔頰輔車牙車史照通鑑釋文晉穆帝九年輔車頰骨牙車也咸卦咸其輔頰舌馬云輔上頷也漢張虞云耳目之間杜甫戲贈友云一朝被馬踏唇裂板齒無又按洪氏韓子年譜云去年與崔羣玉云左車第二牙無故動搖脫去而齒落詩云去年落一牙則此詩今年作也乃知在頰為牙當唇為齒也昭昭矣皮革羔羊詩曰羔羊之皮又曰羔羊之革毛曰革猶皮也初無區别孔曰説文謂獸皮治去其毛曰革對文則皮革異散文則皮革通鄭注掌皮曰皮謂若虎豹熊羆有文章者革謂無文章者去毛而獻之王光逺曰未練治謂之皮已練治謂之革此一説也司裘曰大裘飾皮革謂革輅也去毛得稱皮有毛得稱革此又一説也然論語虎豹之鞟猶犬羊之鞟虎豹與犬羊别者並以毛文異耳乃知鞟即革也按八音之中有革謂鼗鼓也則革已去毛無疑矣若夫帝王世紀曰黃帝煞夔以其皮為鼓庸非毛氏所謂革猶皮也叨餮文公十八年縉雲氏有不才子貪于飲食冒于貨賄天下之民以比三凶謂之叨餮杜曰貪財為叨貪食為餮故孫仲益競與詹及甫書曰晉侯被兵之後復用吏叨謂吏之貪財者也及觀北史明帝朝獲秃鶖於宮內遂養之崔光曰此即詩有鶖在梁解云秃鶖貪戀之鳥野澤所育不應入於殿庭况叨餮之禽必藉魚肉菽麥稻粱之養豈可留意於醜形惡聲哉老杜麂詩曰衣冠兼盜賊叨餮用斯須趙彥材云言衣冠之人行如盜賊唯知叨餮而已故使人多害生物以充庖正在斯須之間焉則是崔杜以二字為貪食之謂初無别也至東坡賦老叨又直以叨之一字為貪食云山海經又以叨餮為獸名則必貪婪之獸也檠檠東坡姪安節逺來夜坐三首前二首皆押燈檠韻末篇云大弨一弛何緣彀已覺翻翻不受檠孫倬云楊子曰見弓之張兮弛而不失其良兮曰何也曰檠之而已及考揚子正文作擏其字從手溫公音居影切復質諸周禮弓人注云至冬膠堅內之檠中定往來體檠音景韻略三十八梗作檠居影切所以正弓釋云蘇武能檠弓弩雖並從木皆非平聲東坡所押獨取楊倞注荀子繁弱巨黍古之良弓也然而不得排檠則不能自正音巨京反然玉篇廣韻平上聲皆收作正弓之檠但上聲注云檠今周禮亦作檠則是不専主平聲之音囊槖公劉之詩曰于槖于囊毛曰小曰槖大曰囊孔曰左傳稱趙盾見靈輒餓為之簞食與肉置諸槖以與之槖惟盛食而已是其小也公羊傳稱陳乞欲立公子陽生盛之巨囊囊內可以容人是其大也説文曰無底曰囊有底曰槖董氏曰無底曰槖有底曰囊唐韻曰槖無底囊二説不同並存之馬耳東坡雪夜詩曰試掃北臺看馬耳未隨埋沒有雙尖趙次公云馬耳山名竊謂天下之山至低不下數丈而止於尋丈者少雪雖深埋沒山阜未之有也趙指為山果何所據殊不知雪夜王晉之與霍辨對談雪盈尺王曰雪太深乎霍曰看北臺馬耳菜何如左右曰有兩尖在坡蓋用此何趙未嘗見是事而妄為是説於莵宣公四年楚人謂虎於莵於音烏前漢序傳楚人謂虎於檡一音烏塗今作於莵山谷題雙澗寺云二水奔奔鳴屋除松林落日吼於莵碑本作烏非也又詩曰王侯文采似於莵洪生人間汗血駒復用於字乃是欵乃人皆曰栁栁州漁父詩欵乃二字本書為欵乃讀曰襖靄既有山谷題浯溪碑可證又有元次山集中箋音可質胡仔漁隱叢話乃謂洪駒父詩話反其音為靄襖者非奈何廣韻十五海欵音於改反相然譍也謂之相然譍則正得一聲山水緑之本意當從駒父欵音靄乃音襖為正故洪景盧尚書欵乃齋記云栁别本或併二字為襖音又别出一靄字非也殷盤初讀進學解周誥殷盤之語頗疑盤庚是君名非訓誥誓命之比至味六一先生聼琴詩有二典意深博三盤語丁寧又復云然一再思之太甲益稷之屬篇皆以名檀弓本魯人以其善於禮故亦著名如泰伯衛靈公梁惠王亦載於語孟之篇首同此一意正鵠周禮司裘王大射則共虎侯熊侯豹侯設其鵠鄭注侯謂以虎熊豹麋之類飾其側又方制之以為音凖謂之鵠著于侯中所謂皮侯梓人張皮侯而棲鵠詩云終日射侯不出正兮射義云循聲而發發而不失正音征鵠者其為賢者乎孔子曰大射之侯其中制皮為鵠賔射之侯其中采畫為正正大如鵠皆居侯中三分之一其燕射則侯中畫為獸其中射處皆二尺則以侯中所射之處為正鵠也正與鵠皆禽名正鴊之省文也方言齊魯以題肩為鴊月令征鳥厲疾鄭氏謂征鳥題肩也齊人謂之擊征或名曰鷹正義曰征鳥鷹隼之屬也鵠即漢髙祖所謂鴻鵠髙飛一舉千里雖有矰繳尚安敢施鴊健黠而難中鵠髙逺而難中故射者取以為質的焉非熊六韜曰文王將田卜曰田於渭陽將大得焉非龍非彲非虎非羆兆得公侯天遺汝師以之佐昌施及三王文王乃齋三日田於渭陽卒見太公坐茒以漁文王乃載以歸立為師史記曰呂尚以漁釣姦周西伯西伯將獵卜之曰所獲非龍非彲非虎非羆所獲伯王之師果遇太公於渭水之陽載而歸立為師而沿襲皆作非熊用之嚴有翼雌黃亦云世所傳本或作非熊非羆致使學者相承皆以非熊為太公事何其謬歟及觀崔駰達旨詞曰或以漁父見兆於元龜注云西伯出獵卜之曰所獲非龍非彲非熊非羆所獲伯王之輔班固賔戲曰周望兆動於渭濵李善曰史記云太公望以漁釣姦周西伯將出占之曰所獲非龍非虎非熊非羆所謂伯王之輔則謂之非熊蓋本於此不可謂之謬矣然今史記實無非熊二字不知李善何所據而云赦書弱水本朝赦文必曰赦書日行五百里用昌黎答張徹詩赦行五百里蓋有自來矣又八月十五夜贈功曹云赦書一日行萬里罪從大辟皆除死信如後之説無乃太逺乎神仙傳謝自然泛海求蓬萊一道士曰蓬萊隔弱水三十萬里非飛仙不可到東坡詩則曰蓬萊不可到弱水三萬里信如蘇之説無乃太近乎瘴癘地杜甫夢李白詩曰江南瘴癘地逐客無消息舊注引劉孝標流離大海之南寄命瘴癘之地謂廣南也趙彥材乃引唐史白坐永王璘事詔長流夜郎會赦還潯陽坐事下獄潯陽今之江州屬江南東路今又屬西路豫謂此指夜郎而言江南非瘴鄉少陵號詩史必不妄言當是傳寫之誤雷詩何以又曰南方瘴癘地罹此農事苦引經誤無妄六二曰不耕穫不災畬則利有攸往而坊記乃曰不耕穫不災畬凶牧誓曰戎車三百兩虎賁三百人而孟子乃曰革車三百兩虎賁三千人矢其文德洽此四國宣王也禮記以為太王間居戎狄是膺荆舒是懲僖公也孟子以為周公滕文公上致逺恐泥子夏之言也班固以為出孔子其進鋭者其退速孟子之言也李固以為出老子孟子以孔子所謂生事之以禮死葬之以禮祭之以禮為曾子唐史以曾子所謂以能問於不能以多問於寡為孔子與有扈戰于甘野夏啓也劉向以為夏禹説苑濟人於溱洧子産也劉向以為景差説苑微子曰我舊云刻子論衡本性篇引之曰我舊云孩子立政曰以又我受民論衡明雩篇引之曰以友我愛民荀子堯問篇乃曰諸侯自為得師者王得友者伯得疑者存自為疑而莫己若者亡與今仲虺之誥能自得師者王謂人莫己若者亡文意小異鹽鐵論文舉所引孟子乃曰居今之朝不易其俗而成千乘之勢不能一朝居與今孟子由今之道無變今之俗雖與之天下不能一朝居文意大異誤經意孔子曰禹吾無間然即無瑕可指之義賈捐之泥於文而不明其意便謂禹入聖域而不優孔子曰為命裨諶草創之即非草野之義左邱明亦泥於文而不達其意直謂裨諶謀於野襄十一得非讀論語之誤歟詩曰天命玄鳥降而生商史記則謂元鳥墮卵簡狄吞之而生契詩曰履帝武敏歆攸戒攸止史記則謂巨迹在野薑嫄踐之而生稷得非讀詩之誤歟史記謂妻舜二女者豈非因堯典釐降二女而誤耶又謂舜重瞳子者豈非因舜典明四目而誤耶甚者有曰禹辛日娶妻甲日生子非泥益稷之文所謂娶于塗山辛壬癸甲而誤耶書曰協和萬邦論衡藝增篇以為唐必無萬國書曰弼成五服論衡語增篇以為五采之衣服則王充豈深明於書者耶意誤光武即位祝文曰上當天地之心地果可與天同稱上耶宋玉賦曰料天地之極髙地果可與天同稱髙耶唐髙昌傳曰髙昌兵如霜雪唐家兵如日月日月照霜雪幾何自殄滅謂日滅霜雪可也謂月滅霜雪可乎昌黎詩曰潢潦無根源朝滿夕已除謂潢潦無源可也謂潢潦無根可乎事誤前輩多引脫粟飯為公孫𢎞事按韓子春秋晏嬰齊相嘗食脫粟米不食重味則是倡自晏平仲多引浮查為張騫事按王子年拾遺記堯時有巨查浮于西海查上有光若星月查浮四海十二年一周天名貫月查又名挂星查羽仙棲息其上則自是堯時吳甘寧住止嘗以繒錦維舟去輒割棄以示奢侈則錦纜不始於煬帝韓詩外傳北郭先生妻曰結駟列騎所安不過容膝劉向列女傳楚於陵妻亦云則容膝之語非首出於淵明人言蘇武不拜單于考之范史乃是鄭衆選詩得魚腹中書考之史記乃是陳勝謝靈運述祖德詩有弦髙犒晉師之語按呂氏春秋鄭賈人弦髙實犒秦師也潘安仁西征賦有嵗次玄枵之語按安仁永康二年之長安嵗在壬子實困敦也並文選人皆信退之諱辨稱杜度以杜恕篤論求之乃知杜操字伯度泗州大聖傳云和尚何國人也又謂莫知所從來云不知何國人也以隋書西域傳觀之乃有何國觀後漢禮儀志上陵議狀注茍先帝有瓜葛之屬男女畢會不可以瓜葛為王導奕棋事觀劉禹錫贈進士張詩云憶爾懸弧日余為坐上賔舉筯食湯餅祝詞天麒麟不可専以湯餅為明皇王后事觀髙朕漢末為蜀郡守興設學校修周公禮樂殿邦人立石室祠之在文翁石室旁則興蜀之學不特文翁一人也詳見范鎮東齋記事觀前漢淮南王欽傳乃左顧存恤師古曰左顧猶言枉顧則左顧之事不當指為毛寶也觀述異記石室山晉時王質伐木至見數童子棋與質一物如棗核含之不覺飢視斧柯爛盡既歸無復時人則爛柯之事非奕棋也示兒編卷十三
