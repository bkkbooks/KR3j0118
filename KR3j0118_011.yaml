body:
  text: 示兒編卷十一宋孫奕撰正誤阡伯史記貨殖傳曰凡編戶之民富相什則卑下之佰則畏憚之千則役萬相僕物之理也前食貨志曰亡農夫之苦有阡伯之得顔曰阡謂千錢伯謂百錢也阡七堅反伯莫白反今俗謂百錢為一佰說文曰相十佰也談藪曰今之數錢百錢謂之佰者借佰字用之其實是百字如什與伍耳其字皆從人今俗書作阡陌而皆從阜非也何以别之史記商鞅為田開阡陌封疆漢朝錯募民實塞下議曰通田作之道正阡陌之界元帝紀曰出入阡陌師古曰阡陌田間道也南北曰阡東西曰陌皆從阜此為證耳如漢志商君壞井田開阡佰繼而曰衆庶階巷有馬阡佰之間成羣注亦謂南北曰阡東西曰佰其音又同乃皆從人蓋古字通用非謂當從人也是以陳勝贊曰躡足行伍之間俯仰阡陌之中索隱曰阡佰謂千人百人之長也漢儒作阡陌如淳曰時皆僻屈在阡陌之中陌音貊凡謂行伍則從人田間則從阜獨未有以阡佰之錢從阜者也然則指錢與行伍之阡佰當從人指田之阡陌當從阜故玉篇於人部則載錢與行伍之阡佰於阜部則載田之阡陌未嘗紊也且伍與什皆數也俱作人旁隄與防皆岸也俱作阜旁抑又可證未渠央庭燎曰夜未央箋云夜未央猶言夜未渠央也渠陸音其據反胡氏曰說文云央中央也大雅曰央中央也秦風云宛在水中央央亦中也二章言未艾三章言鄉晨是從未央而至未盡從未盡而至鄉明也嘗原音其據反者即與遽同音故荀子修身篇云有法而無志其義則渠渠然渠讀為遽古字渠遽通渠渠不寬大之貌顔氏家訓曰古樂歌詞云丈人且安坐調絃未遽央淵明雜詩曰嚴霜結野草枯瘁未遽央談藪載高爽題鼓嘲孫挹云身有八尺圍腹內無寸腸面皮如許厚受打未遽央邢居實寄陳履常云㑹合能幾日歡樂何遽央王介甫少壯喜文章云良夜未渠央青燈對寒更皆作遽字考之廣韵遽卒也急也是謂未卒然而中也至如淵明讀山海經詩方與三辰游夀考豈渠央魯直觀伯時畫馬詩云木穿石盤未渠透坐窗不傲令人瘦此古體必讀為去聲近世內翰汪彥章藻挽洪承議太孺詩落句云欲識慶源何自逺大川東去未渠央中書舍人張安國孝祥水調歌頭末句云莫遣兒輩覺此樂未渠央二公直作平音用誤也或者謂新唐書王求禮讓蘇味道曰果以為瑞則冬月雷渠為瑞耶李絳謂憲宗曰陛下焦心銷志求濟時之略渠便髙枕而卧哉邢文偉傳曰自非義均弼諧渠能進此藥石張說傳說曰宰相時來則為非可長保若貴臣盡杖正恐吾輩及之渠不為士君子地乎皇朝文鑑宋子京治戒曰兄弟之不懷求合它人人渠肯信哉張舜民與石司理書曰唯是問能求益渠敢遽然聞命已來勿知所濟魯直和王世弼寄七兄曰小材渠困我持斫問輪扁凡此皆言渠又何謂耶按髙祖紀項伯告羽曰沛公不先破關中兵公詎能入乎服䖍曰詎音渠猶未應得入也師古曰服說非也詎讀曰巨猶豈也孫寶傳曰掾部渠有人乎渠讀曰詎詎豈也杜詩曰牽牛處河西織女處其東萬古永相望七夕詎見同亦此意也渠音雖同而有二訓讀者當審轉為遽又為詎渠與詎皆訓豈也第與前之未渠央未遽央字同而義異豐碑檀弓曰公室視豐碑三家視桓楹鄭氏曰豐碑斷大木為之形如石碑於椁前後四角樹之穿中於間為鹿盧下棺以繂繞天子六繂四碑前後各重鹿盧也斷之形如大楹耳四植謂之桓諸侯四繂二碑碑如桓矣大夫二繂二碑士二繂無碑喪大記曰君葬用輴四綍二碑大夫葬用輴二繂二碑又曰凡封用綍去碑鄭曰碑桓楹也樹碑於壙之前後以紼繞碑間之鹿盧挽棺而去之此時棺下窆使挽者皆係紼而繞要負引舒縱之備失脫也用綍去碑者縱下之時也祭義曰祭之日君牽牲既入廟門麗于碑鄭曰麗繫也謂牽牲入廟係于中庭碑也聘禮曰東北南上碑南釋者曰宫必有碑所以識日景引隂陽也夷考前之四說所謂碑者於葬祭聘享之時植一大木耳即非石碑也而其字從石者取其堅而已然勒銘於其上者亦未之嘗聞也今喪葬令其螭首龜趺又易之以石者後儒增之耳此孫何碑解之辭也皇朝文鑑豫嘗聞杜甫為淑妃皇甫碑云日居月諸丘隴荆把列樹拱矣豐碑缺然又按東觀餘論云其立碑在葬後當開元二十三年皇甫葬時所作也則是杜誤以豐碑為可勒銘矣故近世之士不究其義凡作挽詩者多指豐碑為勒銘之碑用矣壽堂今士人尺牘中稱人之母曰夀堂蓋不知忌諱按陸士衡挽歌云夀堂延魑魅注曰夀堂祭祀處言既死於祭祀之處獨相處魑魅楚辭曰謇將淡兮夀堂王逸曰夀堂供神之處林逋自作夀堂詩曰湖外青山對結廬墳前修竹亦蕭踈茂陵它日求遺藁猶喜曽無封禪書皇朝文鑑又指邱塜為夀堂也究而言之稱人之母者豈不背理傷義乎毛詩自有夀母二字閟宫何不稱之名諱生為名死為諱從古而然禮曰卒哭乃諱是也曲禮上嘗以韵略推之其曰御名舊御名蓋自生存以前言之其曰廟諱蓋自祔廟之後言之條于韵首井井不紊古今名公巨卿為人撰軒亭堂樓等記及生祠碑則曰公名某及撰墓志銘神道碑與列傳則曰公諱某其别如此世俗不審乎是凡賔主相與言或斥某人名曰諱某或問某人名為何諱答者亦曰諱某可發一笑故歐公集古録亦曰樊毅修華嶽廟碑云樊君諱毅字仲德下車之初恭肅神祀據此碑乃即時所立而太守生稱諱者何哉蓋謂其碑之謬則世俗之名諱不辨亦久矣正昭秦始皇名政為之避其諱者讀正月為征月晉文帝名昭為之避其諱者讀昭穆為韶穆傳至于今當如夲字讀始有分别陸德明唐大儒也自秦晉至唐亦逺矣當作釋文時何不單出一音以正舛誤豈容䛇後學以疑二哉正字姑置勿論且以昭穆言之了無他說質諸孝經疏曰昭明也穆敬也故昭南面穆北面孫從父坐而已若音曰韶不知何以釋之朱元晦亦曰廟制太祖居中左昭右穆周廟文王當穆武王當昭故酒誥稱穆考文王而載見及訪落皆謂武王為昭考也豫以載見訪落驗之昭考並不讀曰韶考何獨於昭穆有兩音至如史照於通鑑光武十八年昭音韶本音昭亦謂招以照下穆以順上為義後避司馬昭諱昭作韶讀其說是矣不應復音韶請以征韶之音一洗而空之毋庸汨亂學者之耳目自古避諱而轉音者多皆當是正之獨此二字所係甚大而常用之急者故特表之三辰益稷曰日月星辰孔安國謂日月星為三辰桓公四年傳曰三辰旗旗昭其明也杜預謂三辰日月星也皆不指星名而言辰則並以總上三事為辰而辰非别物也周禮大宗伯以實柴祀日月星辰保章氏掌天星以志日月星辰之變亂鄭𤣥曰星謂五緯辰謂日月所㑹不二次也洪範二曰月三曰日四曰星辰孔氏謂二十八宿迭見以序氣節十二辰以紀日月所㑹也魯直蟹詩曰己標天上三辰次未免人間五鼎烹謂巨蟹在十二辰之未位也昭七年傳曰晉侯謂伯瑕何謂六物曰嵗時日月星辰是也公曰多語寡人辰而莫同何謂辰對曰日月之㑹是謂辰杜氏謂一嵗日月十二㑹也一以為五星一以為二十八宿而並以辰為日月所㑹之次也則辰與星固異矣退之有東野失子詩曰吾懸日與月吾係星與辰抑承襲而言也如漢律歷志云三辰之合於三統也日合於天統月合於地統斗合於人統五星之合於五行三辰五星之相經緯也既謂星為斗又謂斗之外有五星其說蓋不一矣司常掌九旗之物曰日月為常而已初不言畫星及左傳三辰旗旗則言畫星而不言何星穆天子傳稱天子葬盛姬畫日月七星乃畫北斗也紛紛藉藉莫之適從蓋嘗思而得其說以言其畫之於衣與旗則辰非有形容之可繪而謂之三辰則宜以言其遍祭天之諸神則十二次亦當祭之而謂之辰次亦宜如祭祀及掌天文則日月五星乃天之七政不得不以為先所謂璇璣玉衡以齊七政是也至於昏明迭見則非二十八宿無以辨之故五紀之所謂星辰蓋二十八宿布於四方隨天運轉以迭形昏旦若孟春昏參中旦尾中之類皆所以叙節氣也是以知五星所行下民不以為候故取於二十八宿也若夫鄉飲酒主三賔以象三光古之制禮也紀之以日月恭之以三光政教之夲也注曰三光者係於天三大辰也易曰三光大火也伐也北極也大火與伐天所以示民時早晚天下所取為正故謂之大辰辰時也北辰北極天之中也取居中之義以是觀之孔穎達無乃因記云日月又云三光遂強為之說當以日月為通論民農嘗讀榖梁傳成公元年曰古者有四民有士民有商民有農民有工民則四民有定名矣故史記貨殖傳曰夫業二十病農九十病末索隱曰言米賤則農人病也故云病農若米斗直九十則商賈病故云病末末謂逐末為商賈也此言得之如漢食貨志云糶甚貴傷民甚賤傷農韋昭曰此民謂士工商也夫豈知民即農之總名也既言民安得又言農哉乃知班固謂傷民傷農不如馬遷病農病末之為别白也雖然孟堅西都賦有曰士食舊德之名氏農服先疇之畎畝商循族世之所鬻工用髙曽之規矩又未嘗失言何獨於志而失之豈智於此而愚於彼乎且為韋昭之說者曰此民謂士工商強為之别也然周禮司農亦曰凡市僞飭之禁在民者十有二在商在賈在工者皆十有二又何耶韋昭言士工商而不言農周禮言農工商賈而不言士若以韋昭之說是則周禮之說非以周禮之說是則韋昭之說非周禮亦豈雜於漢儒而然若夫孟子曰信能行此五者則兼士農商旅民既言商又言旅既言士農商又言民而不言工亦不得言知言之要黎苖揚子重黎篇若秦楚強鬥震撼胎籍三正播其惡於黎苖吳祕謂布其虐甚於九黎之亂德三苖之不恭其說甚迂司馬溫公曰黎苖民也余按廣韵黎苖二字皆訓衆也則溫公之說其辭既明其理亦安信而有證弋人何慕問明篇鴻飛冥冥弋人何慕焉按後漢逸民傳序援此語作篡字退之酬崔少府云少嫌弋者篡今溫公亦謂曰篡以或作慕字為誤誠有所据日一日勞孝至篇或問勞功曰日一日勞考載曰功溫公曰載事也天運行不息是其勞也成造化之事是其功也其說盡善矣舊注杜審揚子問勞功為二事乃於日一日勞考載文下釋之斷曰功二字於下句句讀不明戞戞難讀溫公之說是而不為釐正其句亦非下日字當讀為曰以日一曰勞句斷考載曰功句斷言日専一而不息則謂之勞以成其事則謂之功矣道術莊子謂人相忘於道術當讀如經術之術廣雅曰術亦道路别名吕氏春秋曰子産相鄭桃李垂於術文選謝靈運登石門最髙頂云來人迷新術去子惑故蹊注曰術蹊皆山路也陳晉之解學記術有序曰月令審端徑術鄉飲酒莊周皆有道術之說是途之大者謂之道小者謂之術乃知鄭音遂非也信乎莊周以江湖對道術而言則直指為道路無疑矣三國袁術字公路杜甫朝享大廟賦押栗字韵有曰曙黃屋於道術又寄韋尹丈人云牢落乾坤大周流道術空以道術對乾坤皆明此意莊子語疵司馬遷言莊周其學無所不聞可謂博洽矣然其著書立言不無小疵觀其譏齊威公讀古人之糟粕固善矣而謂輪扁椎鑿非糟粕與言孔子七日不火食容或有之而藜羮不糝非火食與荀子反經三代以後儒者敢於自信而好異莫荀卿若也堯舜揖遜之主而以為非禪周公恭儉之臣而以為不恭不儉子思人所不可非則非之孟子人所不敢非則非之禮義夲不僞則以為僞人性夲不惡則以為惡六經有親出夫子之筆舌有實載聖人之夲文卿猶一切反之故議兵篇曰堯殺一人刑二人而天下治楊倞釋之謂一人為鯀二人為共工歡兜矣又自曰堯伐歡兜禹伐共工非惟與舜典四罪左氏舜去四凶之說異又且自相背馳甚者正論有曰象刑非生於治古並起於亂今則又直不以典謨象刑惟明之言為可信而好異甚矣究而言之象刑之制即周禮垂刑象之法于象魏是也畫刑為象者無非畫墨劓剕宫大辟之用刑刀鋸斧鉞之狀以示於人使之懲於未然而知畏耳茍知畏則不復犯刑乃刑期于無刑之夲意矣烏得謂之非生於治古者哉就如卿言是敢於殺人而不敢於刑人也然而李斯韓非之慘刻不當罪韓李而當罪卿其亦作俑者與示兒編卷十一
