body:
  text: 示兒編卷九宋孫奕撰文説聲畫押韻貴乎審初誠齋先生楊公考校湖南漕試同寮有取易義為魁先生見卷子上書盡字作尽必欲擯斥考官乃上庠人力争不可先生云明日掲牓有喧傳以為塲屋取得箇尺二秀才則吾輩将胡顔竟黜之廬陵出聖武為天下君賦小賦押君字者隔句皆押能羣韻而多寫作群當時有數人作者賦甚工意必前列而竟不掛名後主文出院與勸駕言及此甚嗟惜之且云二十文韻中無群字凡如此寫者皆不敢取又出三代有道之長賦三字韻或押殽函者並行黜落葢函音諴見二十七咸其與三字同韻乃函人唯恐傷人之函胡男切臨江軍出順天為日新之教賦教字韻效傚二字寫出効俲不從文而從力者並不取所謂顔魯公有干禄字即此可知後之人凡書者不可不辨其畫押者不可不審其聲雙音字貴詳審林徳頌埛賦文精義云如車攻宣王復古賦復字本獨音扶又反俗音伏熊淳押舊字云茍根本之謀在我素講則統緒之托指期可復皆本音也沈之萬押肅字云所嗟古制之久泯豈謂此詩之能復此用俗音也理當從經釋文是然恐主文用俗音故湏上請予按經釋文車攻序復古復文皆無音唯復㑹獨音扶又反復古之復當音伏訓反也復㑹之復訓又也則此復古熊淳押去聲非是沈之萬押入聲乃是林徳頌顧苐弗深究也林又云如渾天儀字本音胡本反葉重開天行徤賦云爰有稚圭擬形容於轉轂故令平子妙制作於渾儀此誤作平音用也如姚鳯渾天羲和之舊器賦云妙契洪造器名渾天此是矣予稽諸揚雄傳大潭思渾天顔師古音胡昆反揚子重黎篇或問渾天温公音胡本切則二音皆得通押不可謂誤張教授炳在廬陵郡學出孟荀羽翼六經賦羽有兩音上聲者五音之羽去聲者羽翼之羽有上請者許押上聲乃是落韻協韻不可重押如秦少游君臣相正國之肥賦第五韻云因知正主而御邪臣者難以存乎安强正臣而事邪主者不能浸乎明昌羙聖時之㑹聚常直道以更相葢上下交孚兮若從繩之紏畫故民俗阜蕃也常飽徳以康强所以舜申后稷之忠民或饑而可救唐相韓休之鯁已雖瘠以何傷係中魁選有訟其重疊用韵遂殿舉朝㫖今後詩賦如押安強即不得押康强矣葢十陽韵中强字亦作疆故也用字貴詳審凡用事湏探究本文不可以虛對實如陳傅良漢斲琱為樸賦云吏尚刻深弊見於乾封元鼎意多穿鑿機形於五鳯黄龍按漢郊祀志武帝封泰山改元封元年明年夏旱公孫卿曰黄帝時封則天旱乾封三年乃下詔曰天意欲乾封乎乾音干則乾封非年號也以對五鳯則為偏矣祭文簡古世傳北狄來祭皇太后文楊大年捧讀空紙無一字即自撰曰惟靈巫山一朶雲閬苑一圑雪桃源一枝花秋空一輪月豈期雲散雪消花殘月缺伏惟尚享時仁皇深喜其敏速歐陽文忠公奉母夫人喪歸廬陵道過臨江李觀以著作佐郎知清江縣太守命作祭文應聲而成曰孟軻亞聖母教之也夫人有子如軻雖死何憾尚享公聼之甚悲感且撃節稱賞二者雖皆祭文然體律簡古詞意超絶真得尹師魯止用五百字可記之法使施之他文無不可者故表而出之對用人名觀皇甫嵩醉鄉日月有徴人名必分品類則用字之法貴乎親切於是畧試申之如風雲中用朱雲斛律明月則申以李淳風南霽雲髙霞㝢韋雲起袁天綱崔日用鳥獸中用魏豹扁鵲則申以伯虎仲熊叔豹季騧梁鴻髙鳯賈彪郭象陳龜朱鳯崔駰朱虎孔鯉祝鮀石季龍韓擒虎草木中用鄧艾越椒則申以薛桞張松張華崔寔王筠盧把元徳秀髙仙芝布帛中用季布爰絲則申以黄裳黥布伍被陸扆田布常衮顔色如衛青李白則申以陶朱李赤師丹李絳朱邑黄香白圭黄覇龔黄元白赤松子黄石公形體如張耳伯牙則申以隸首姜肱馯臂公肩班叔皮習鑿齒親族如王郎衛子夫則申以竇王孫嬰嚴公子彭祖羊叔子祜劉伯祖祐家具如劉盆子公孫杵臼則申以袁盎京房臧宫渾室管輅張衡闕髙甑生州郡如馮唐孔光則申以王吉法真樂廣李通張衡李歙賈䕫杜撫欒巴馮道馬嚴李賀又以門目觸類而長之如國名用馬周董晉李漢馮唐呉漢路隋孫楚蘇秦唐儉虞翻西周東周前漢後漢帝王用趙堯王舜貢禹張湯田文蘇武卦名用楊震米恒李㢲苖復唐臨崔渙蘇安恒溫大有賈敦頥韓思復程知節韋思謙薛大鼎沈既濟金玉用韓瑗唐璿蘇瓌蕭瑀周瑜李珏王珪房琯郭璞庾琛衛玠劉琨蔣琬劉璋張守珪李抱玉數目用九方臯百里奚員半千武平一張九齡權萬紀雷萬春程千里武三思方萬頃張萬福鄂千秋山川用劉元海馬子山安禄山倪若水段干木韋巨源孔北海李西河賈山和嶠賈島李源韋淮李峴王潮李漢袁崧温嶠山簡江淹四時用子夏杜秋雷萬春車千秋韋夏卿趙冬曦四方用東園公北宮錡姚南仲公西華東方朔西門豹南宫适北宫黝東施西施南阮北阮以至髙皇小白倪寛王猛夏馥黄香劉晨叔夜谷永牟長傅喜馮驩李固徐堅梅福王祥許逺袁髙婁敬杜欽周仁韓信馮道劉徳祖逖宗均張衡郗鑒祖己仲壬田甲庖丁謝安穆寧陽虎樂羊牛崇馬援來濟劉洽馬良羊祐宰我夷吾京房渾室伯夷儀狄灌夫馮婦徐孺子來䕶兒金安上白敏中司馬遷公羊髙徐有功蘇無畏華無傷申不害蘇味道婁師徳史叔賔宗楚客堯辟邪北史堯暄字辟邪霍去病冉伯牛桑𢎞羊劉黒闥杜黄裳田仁㑹崔信明凡此皆可以類求所謂世間未有無對者也詩説假對詩律有借對法茍下字工巧賢於正格也少陵北鄰云愛酒晉山簡能詩何水曹贈張四學士云紫誥仍兼綰黄麻似六經又無復隨髙鳯空餘泣聚螢送楊六使西蕃云子雲清自守今日起為官寄韋有夏郎中云飲子頻通汗懐君想報珠九日云坐開桑落酒來折菊花枝一作來把葢用山簡對水曹兼綰對六經髙鳯對聚螢子雲對今日飲子對懐君桑落對菊花亦清秋方落㡌子夏正離羣之比也如少游與子瞻同席自矜髭髯之羙曰君子多乎哉子瞻戲曰小人樊湏也邵氏聞見後錄尤借對之的偏枯對詩貴於的對而病於偏枯雖子羙尚有此病如重過何氏曰手自栽蒲栁家纔足稻粱毛氏注詩云楊栁蒲栁也寄李白曰稻粱求未足薏苡謗何頻田舍曰櫸栁枝枝弱枇杷樹樹香此以一草木對二草木也贈崔評事曰燕王買駿骨渭老得熊羆得舍弟消息曰浪傳烏鵲喜深負鶺鴒詩寄髙詹事曰天上多鴻鴈池中足鯉魚寄李白曰幾年遭鵩鳥獨泣向麒麟又曰麒麟不動爐烟轉孔雀徐開扇影還此以一鳥獸對二鳥獸也秋野曰吾老甘貧病榮華有是非寄李白曰未負幽棲志兼全寵辱身偶題曰作者皆殊列聲名豈浪垂上韋左相曰聰明過管輅尺牘倒陳遵是以二字對一意也人日曰氷雪鶯難至春寒花較遲是以二景物對一物也歸鴈曰見花辭瘴海避雪到羅浮惠州二山是以一水對二山也月夜曰遥憐小兒女未觧憶長安是以二人對一郡也上韋左相曰巫咸不可問鄒魯莫容身是以一人對二國也贈太常張卿均曰友于皆挺㧞公望各端倪是以歇後對正語也龍門曰徃還時屢改川水日悠哉是以實對虚也大手筆如老杜則可然未免為白圭之玷恐後學不可效尤倒用字詩中倒用字獨昌黎為多醉贈張秘書曰元凱承華勛赴江陵云所學皆孔周歸彭城云閭里多死饑下言引龍夔城南聫句云戞鼔侑牢牲又百金交弟兄赴江陵云殷勤謝友朋孟東野失子云薄厚胡不均重云云身體豈寧康送恵師云超然謝朋親荅張徹云碧海滴瓏玲苦寒云調和進梅鹽東都遊春云渚牙相緯經音徑雜詩云詩書置後前寄崔立之云不約論財資又無人角雄雌孟先生云應對多差参又此格轉嶇嶔符讀書云寒饑出無驢人日登髙云盤蔬冬春雜南内朝賀云不見醻稗稊又磨淬出角圭晚秋聫句云惟學平貴富贈唐衢云坐令四海如虞唐八月十五夜贈功曹云嗣皇繼聖登夔臯贈劉師服云後日懸知漸莽鹵杏花云杏花兩株能白紅又百片飄泊隨西東感春云兩鬢雪白趨埃塵和盤谷子云推書撲筆歌慨慷音康皆倒字類也雙字詩人下雙字不一然各有㫖趣如盧子諒摵摵芳葉零韓吏部淮之水舒舒楚山直叢叢野晴山簇簇霜曉菊鮮鮮晨遊百花叢采朱兼白白剥剥啄啄有客至門角角雉雊羣雌粥粥鵲聲鳴楂楂烏噪聲擭擭蛙黽鳴無謂閣閣秪亂人腷腷膊膊雞初鳴月吐窗烱烱韋蘇州漠漠帆來重冥冥鳥去遲杜工部野日荒荒白江流泯泯清無邊落木蕭蕭下不盡長江滚滚來荆公新霜浦溆綿綿白薄晚林巒徃徃青東坡浥浥爐香初泛夜離離花影欲揺春六一翁霜雲暎月鮮鮮色風葉飛空撼撼聲古屋醉吟燈豔豔畫廊争聼雨瀟瀟聖俞淡淡平田水濛濛半嶺雲雖隨事命詞要不茍也遞相祖述老杜戲為詩曰未及前賢更勿疑遞相祖述復先誰所謂夫子自道也嘗觀其後出塞曰借問大将誰恐是霍嫖姚句法得之郭景純遊仙詩借問此何誰云是鬼谷子送十一舅云雖有車馬客而無人世喧句法得之淵明雜詩結廬在人境而無車馬喧春日憶李白云何時一樽酒重與細論文即孟浩然何時一盃酒重與李膺傾之體復愁云月生初學扇雲細不成衣即李義府鏤月成歌扇裁雲作舞衣之體醉歌云天開地裂長安陌寒盡春生洛陽殿即靈運日暎昆明水春生洛陽殿之體也若夫退之酒食罷無為棋槊以相娯句法又使少陵今夕行云咸陽客舍一事無相與博塞為歡娯祭姪孫湘文云情一何長命一何短句法又使少陵石壕吏云吏呼一何怒婦啼一何苦也用古今句法杜詩刈葵莫放手放手莫傷根一作傷葵根用古詩采葵莫傷根傷根葵不生江邊小閣云薄雲嵓際出孤月浪中翻用何遜入西塞云薄雲岩際出初月波中上寒食舟中云雲白山青萬餘里愁看直北是長安用沈佺期云雲白山青千萬里幾時重謁聖明君寒食舟中云春水舩如天上坐老年花似霧中看用沈佺期云舩如天上坐人似鏡中行莫相疑行云晚将末契託年少用陸士衡傷逝賦云託末契於後生此皆取古人之句也至於戲題畵山水圖云焉得并州快剪刀剪取呉淞半江水即白樂天聼曹綱琵琶示重蓮云誰能截得曹綱手揷向重蓮細袖中眼前無俗物多病也身輕即樂天眼前無俗物身外即僧居為人性癖躭佳句語不驚人死不休即樂天人各有一癖我癖在章句金魚換酒來即太白金龜換酒處此又同時人之句也類前人句太白獨酌勸孤影同淵明揮杯勸孤影退之江燕正飛飛同陸機飛飛燕弄聲韋蘇州荅裴税云采菊露未晞舉頭見南山同淵明采菊東籬下悠然見南山蘇子羙峽束滄淵深貯月岩排紅樹巧粧秋同老杜峽束滄江起嵓排石樹圓徐師川早朝云黄帝逺臨天北極紫宸位在殿中央老杜玉几由來天北極朱衣只在殿中央元白酧和云有月多同賞無盃不共持即昌黎縣齋讀書云詩成有共賦酒熟無孤斟潘佑感懐云幽禽喚杜宇宿蝶夢莊周即李白野禽啼杜宇山蝶舞荘周東坡西湖新成云二十四橋亦何有換此十頃玻璃風即歐公西湖云都将二十四橋月換得西湖十頃風太白云但得酒中趣勿為醒者傳類靖節但得琴中趣何勞絃上聲六一翁食車螯云但知羙無厭誰謂來甚遐梅聖俞河豚亦云但言羙無度誰知死如麻東坡初冬云一年好處君湏記正是橙黄橘緑時類昌黎早春云最是一年春好處絶勝烟栁滿皇都山谷云去時魚上氷歸時燕哺兒類昌黎征蜀聫句始去杏飛蝶及歸栁鳴蛩王元之春日雜興云何事春風容不得和鶯吹折數枝花同老杜恰是春風相欺得夜來吹折數枝花宋元憲郊云鑿開魚鳥忘情地展盡江湖極目天同徐仲雅五代人題明月圃云鑿開青帝春風圃移下姮娥夜月樓王荆公梅花云遙知不是雪為有暗香來類蘇子卿只言花似雪不悟有香來徐師川云誰家竹可欵何處酒莫㤀類退之遊青龍寺云何人有酒身無事誰家多竹門可欵太白瀑布云海風吹不斷江月照還空介甫嘲白髪云種種春風吹不長星星明月照還稀樂天琵琶行云間闗鶯語花底滑幽咽泉流水下灘醉翁聼筝云綿蠻巧囀花間舌嗚咽交流水下泉唐朱書喜陳懿老至云一别一千日一日十二憶苦心無閑時今日見玉色乃知山谷五更歸夢三百里一日思親十二時之語相若李白題峰頂寺云夜宿峰頂寺舉手捫星辰不敢髙聲語恐驚天上人乃知晏元獻危樓詩全似之陰鏗云栁色黄金嫩梨花白雪香太白行樂詞亦全用之晉書載記云蛟龍得雲雨鵰鶚在秋天杜子羙贈嚴閣老亦全用之杜詩轉字音杜工部反經史字音為多略舉數四如霍去病為嫖姚校尉服䖍音飄揺師古音頻妙羊召反荀悦漢紀作票鷂字今音飄揺不當其義公贈田九判官曰将軍不數漢嫖姚後出塞曰恐是霍嫖姚寄卿嘉榮曰自是一嫖姚凡三押皆作平聲六典曰後漢州置别駕持中皆刺史自辟除晉職官志曰州置别駕治中從事治字無音而六典作持字公寄岳州賈司馬巴州嚴使君曰典郡終㣲𦕈治中實棄捐趙彦才云治從平聲後漢明帝紀謂羣臣曰郎官上應列宿出宰百里應字無音公寄劉峽州曰刺史諸侯貴郎官列宿應既押平聲韵又使為太守事論語磨而不磷力刃切公暮春送馬大卿曰此道未磷緇别崔潩曰但取不磷緇皆作平聲張良賛曰為其貎魁梧竒偉蘇林曰梧音悟師古曰魁大貎也梧者言其可驚悟讀為吾非也公贈蕭郎中曰魁梧秉哲尊乃讀作吾鄭典設自歸州歸曰刺史似宼恂列郡宜競借乃讀作迹葢押適字韵也題衡州文宣王廟曰耳聞讀書聲殺伐思髣髴乃讀作沸葢押至字韻也韓詩曰浦帆晨初發郊扉冷未開帆音去聲今韻書已收又曰敕厨唯一味求飽或三鱣楊震傳有雀銜三鱣集講堂注音善今押為平聲韓詩轉字音韓吏部押韻或反平為側移側為平亦復多江漢云華燭光爛爛音闌此日足可惜云徃徃副所望音㤀别竇司直云婉孌不能㤀音望詠筍曰得時方張王二音帳旰東都遇春云渚牙相緯經音徑送劉師服云貴者恒難售音酬食蝦蟇云余初不下喉近亦能稍稍所教反讀東方朔雜事云事在不可赦音奢方橋云方橋如此作音佐送區𢎞南歸云我念前人譬葑菲音霏望秋作云怯膽變勇神明鑒音監栁詩轉字音栁儀曹押轉聲韵亦復有之遊南亭叙志云衆生均覆燾音陶望横江口云島嶼疑掐振音真詠三良云猛志填黄壤音攘詠韋安道云朅來事儒術十年所能逞音呈雖曰杜與韓栁喜取别聲押韵然自建安而來已皆然矣左太冲雜詩云壯齒不常居嵗暮常慷慨則已轉慷為平聲也陸士衡為顧彦先贈婦云京路多風塵素衣化為緇則已轉緇為上聲也劉公幹雜詩云安得肅肅羽從爾游波瀾此以去聲郎肝切用瀾字也顔延年登巴陵城云却倚雲夢林前瞻京䑓囿此以入聲于六切用囿字也即此觀之則知四聲皆有可通押者矣示兒編卷九
