body:
  text: 示兒編卷十六宋孫奕撰雜記易物名山谷喜為物易名鄭花則易為山礬竹夫人則易為竹妃水晶膾則易為醒酒氷洞庭春色則易為埽愁帚集句則易為百家衣東坡名㯶笋為木魚㯶筍詩名鐵拄杖為鐵君鐵拄杖詩名竹為愁節君文與可畵竹亦名之曰墨君皇朝文鑑東坡作文與可墨君堂記皆自我作古之一端也人相反孔子不飲盗泉列子曰孔子至於勝母暮矣而不宿過於盗泉渇矣而不飲惡其名也吳隠之飲貪泉晉書本傳二人正相反于公多隂徳于定國傳陳平多隂禍王陵傳二人正相反陳平多隂謀而知其後必廢丙吉有隂徳夏侯勝識其當封及子孫後漢袁安張甫等論晉文公譎而不正齊桓公正而不譎憲問邾子執玉髙其容仰定公執玉卑其容俯家語管仲失於奢晏子失於儉子貢問商也日益賜也日損談苑師也過商也不及先進伯夷死名於首陽之下盗跖死利於東陵之上荘子左邱明工言人事莊周工言天宋景文公論三代不封禪而王秦封禪而亾范唐鑑武王諤諤而昌紂嘿嘿而亾説苑紂以甲子日亾周武以甲子日興魏王珪説西伯幽而演易周旦顯而制禮典論髙帝孝文孝景皇帝宮女不過十餘人武帝時又多取好女至數千人以填後宮貢禹疏宣帝詔書好言祥瑞元帝詔書好言災異珩璜論唐太宗謂李世勣道宗不能大勝亦不大敗薛萬徹非大勝則大敗矣通鑑太宗紀孔子髙孔穿字理勝於詞公孫龍詞勝於理通鑑周赧王紀裴頠拙於用長荀朂工於用短王戎人倫鑑識西門豹性急故佩韋以自緩董安于性緩故佩弦以自急韓子張良得黄石公書而為帝者師京房得焦延夀易而亾其身張無垢説非其君不事非其民不使治則進亂則退伯夷也何事非君何使非民治亦進亂亦進伊尹也公孫丑上曾子居武城有越宼或曰宼至盍去諸曾子則去子思居於衛有齊宼或曰宼至盍去諸子思則守離婁下子路拯溺而受其牛呂氏春秋子貢贖人而不取金家語漢祖能用三傑項羽不能用一范增髙祖紀太宗以干戈之事尚能起李靖於既老而穆宗文宗不能用裴度於未病東坡説漢以羽林為南軍金吾為北軍唐以金吾領南衙羽林統北衙蘇秦為諸侯弱秦張儀為秦弱諸侯東坡説王衍口不言錢和嶠有錢癖晉魯褒作錢神論晉蕭綜作錢愚論南史阮籍作達莊論王坦之作廢莊論晉佛言無生老言不死集古録䟦李廣擊胡無部曲行陣屯舍不擊刁斗幕府省文書然逺斥堠未嘗遇害程不識擊胡正部曲行伍擊刁斗治簿至明軍不得休息未嘗遇害李廣傳注本草誤其禍疾而小注六經誤其禍遲而大唐子西易庵説崔祐甫為相所用多渉親故太宗紀竇易直為相未嘗用親故文宗紀司馬遷叙三千年事五十萬言班固叙二百年事乃八十萬言晉張輔傳于志寧為僕射修史恨不得學士來濟為學士恨不得修史南部新書嬰母知廢陵母知興班固王命論李白為蜀道難陸暢為蜀道易禹錫嘉話胡元禮在此人莫覓活李日知在此人莫覓死隋唐嘉話韓魏公用家資如國用曾魯公惜官物如己物晁氏客話劉隨州有眼作無眼句宋雍無眼作有眼句雲溪友議子羙以詩為文退之以文為詩后山蘇子瞻詞如詩秦少游詩如詞后山世間好言語老杜道盡世間俗言樂天道盡荆公歐陽公之文和氣多英氣少邵氏聞見後録蘇公之文自經中出英氣多和氣少邵氏聞見後錄韓退之文自經中來桞子厚之文自史中來同上魯直詩到人愛處聖俞詩到人不愛處同上永叔不好杜詩子瞻不好遷史后山蘇明允不能詩歐永叔不能賦曽子固短於韻語黄魯直短於散語后山韓退之不可謂之詩有章韻文也杜子羙不可謂之文無章韻詩也栁宗元而下兩失之矣蔡君謨言文章而不言政事歐公言政事而不言文章蘇子容顧長康善畫而不能詩杜子羙能作詩而不能畫王直方詩話味王摩詰詩詩中有畫觀摩詰之畵畫中有詩詩史人之相反如此物相反大椿以八千嵗為春秋朝􅌲不知晦朔二物正相反莊子蓂莢生而靈蓍草死而靈二物正相反六一説牡丹花之絶而無甘實荔枝果之絶而非名花六一黍熟頭低麥熟頭昻王元景談藪先種後熟謂之穜後種先熟謂之稑内宰注草盛在末竹盛在本草寔而生竹寔而死唐耜解字説草敗而螢木敗而芝藝圃折中墻下之木抽必外向庭中之風行必内向同上沈者曰蘋浮者曰藻韓詩外傳菊甘薏苦抱朴子菱寒芡暖菱花開背日芡花開向日仇池筆記凡草木花皆五出雪花獨六出韓詩外傳葵知隨日檉知應雨藝圃折中烏之鬭竦其尾鶉之鬭竦其翼甘氏星經鵠音鶴不日浴而白烏不日黔而黒荘鳬頸雖短續之則悲鶴脛雖長斷之則憂荘雞司晨犬司夜燕秋去鴈秋來鳬善浮鷗善沒禽經鷄晝明而夜昏鴞夜明而晝昏化書大肩無雄龜類細腰無雌蜂類博物志雄脚撲朔雌兔眼迷離木蘭歌蠶食而不飲蟬飲而不食家語魚無耳而聼蟬無舌而鳴淮南子巢居知風穴處知雨翼奉地震封事螣蛇無足而飛鼯䑕五技而竆荀子仲秋鳩化為鷹中春鷹化為鳩司裘注仲夏鹿角解仲冬麋角解月令鵲巢背太嵗燕㐲戊巳乾鵲知來猩猩知徃酉陽雜俎象膽隨四時在四腿春在前左夏在前右熊膽春在首夏在腹秋在左足冬在右足同上熊行數千里必在石岩枯木虎出百里外則迷失路道墨客揮犀蛙蟻知雨烏鳶知風燕避戊巳鵲避太嵗魚聚北首針浮南指藝圃折中猩猩啼而就禽狒狒笑而被格左思賦麝愛其臍狨愛其尾氂牛自斷其尾雄雞自斷其尾並談苑天道尚左星辰左轉地道向右瓜匏右纍藝圃折中日生東月生西禮記曰大明生於東箕星好風畢星好雨洪範注月未望則載魄于西既望則終魄于東楊子飲養陽氣食養隂氣禮記陽燧取火方諸取水論衡舟以行水車以行陸考工記水流濕火就燥乾卦陽律以竹為管隂律以銅為管典同注推手向前曰琵却手向後曰琶釋名合樂為柷止樂為敔書注外方内圓曰簠内方外圓曰簋詩注方曰筐圓曰筥詩注竹豆謂之籩木豆謂之豆爾雅有足曰錡無足曰釜詩注端石瑩㓗惟有鋒鋩者發墨歙石多鋩惟膩理者特佳蔡君謨硯説冠敝在於上履新處於下栁識弔夷齊文前推曰槳却曵曰櫂韻釋其物之相反有如此者自相反梁武帝手得江左而亦自失之唐明皇手定唐亂而亦自亂之無垢説唐明皇始年焚錦繡珠玉晚年乃喜淫侈憲宗始年四方無得進奉晚嵗乃喜羡餘同上禆諶謀於野則獲謀於邑則否襄公三十一年百里奚居虞而虞亾在秦而秦覇史記韓信傳叔孫通在秦則為諛士在漢而直諫裴矩在隋為佞人在唐而亦直諫無垢冉有從夫子則為門人之選從季氏則為聚歛之臣東坡續朋黨論孟子不見諸侯而見梁恵王見梁襄王韓非作說難之書而卒死於說難揚子問明孟公綽為趙魏老則優不可為滕薛大夫憲問黄霸為相功名减於治郡時王尊乍賢乍佞並漢王吉天下服其亷而恠其奢劉晏能亷於臨財而不能亷於取名並亷吏傳司馬相如言吃而善著書漢嵇康善著養生論而自以事坐誅阮籍口不臧否人物而作青白眼並晋光武却祥瑞不暇而受圖讖武宗除去浮屠而躬受道家之籙捫虱新論王衍髙談物理見石勒而下拜王坦之剛鯁自許見桓溫而倒執手板晉退之嘗譏人不解文字飲而自敗於文技嘗戒人服金石藥而自餌留黄孔毅夫新論李太白識郭子儀之為人傑而不能識永王璘之為無成書之羙者莫如顔魯公然書法之壊自魯公始詩之羙者莫如韓退之然詩格之變自退之始東坡説杜子羙詩冠古今而無韵者殆不可讀曽子固以文名天下而有韵者輙不工秦少游説梅聖俞云前史言退之為人木强若寛韵可自足而輙旁出窄韵難獨用而反不出歐公詩話事類堯為唐侯二十以徳盛舜為鰥民二十以孝聞皮日休鹿門隠書漢髙祖約法三章本紀唐高祖約法十二條本紀髙祖從諫如轉圜梅福傳徳宗從諫如轉規崔寜傳髙祖從諫如順流班彪王命論湯從諫如流伊訓注宣帝從諫如流孝宣勵精為治循吏傳太宗勵精思治崔植傳元宗勵精求治魏知古等賛徳宗勵精求治通鑑元宗勵精政事本賛文帝吏安其官民樂其業刑法志宣帝吏稱其軄民安其業本賛明帝吏稱其官民安其業後紀又通鑑明帝吏得其人民樂其業光武渡滹沱河而冰合王覇傳王方翼次葉河而冰亦合唐漢明帝作世祖紀章帝為顯宗紀職官分記肅宗與李泌為布衣交及即位事無大小皆咨之徳宗以張沙為翰林學士事無大小皆咨之通鑑唐代宗記舜殛鯀而用禹周公囚蔡叔而命蔡仲湯以伊尹遺大甲武王以周公遺成王並無垢説紂脯九侯劉恕外紀髙祖醢彭越本傳舜罰弗及嗣大禹謨文王罪人不孥孟三輔吏士東逆更始見劉秀皆喜曰不圖今日復見漢官威儀通鑑漢淮陽王紀桓温伐秦民争持牛酒迎勞曰不圖今日復覩官軍通鑑穆宗紀楚昭奚恤之對秦使以子西子敖子髙子反為寳劉向新序齊威王之對梁恵王以檀子盼子黔夫種首為寳史記田敬仲世家桓公官事無攝告子下管仲官事不攝八佾殷作九市之宮而諸侯畔靈王起章華之䑓而楚民散秦興阿房之殿而天下亂東方朔諫武帝張武受賄文帝更加賞賜以愧其心文紀賛長孫順徳受賕太宗更賜之帛以愧切其心本傳魏盧毓選舉先性行而後言才通鑑明帝紀北魏選舉之法先門地而後賢才齊明帝紀隋牛𢎞選舉先徳行而後文才文帝紀虞不用宮之竒而晉并之萊不用子焉説苑作子猛而齊并之荀子堯問伊尹去夏入殷殷王而夏亾管仲去魯入齊魯弱而齊强劉向荀子後序燔肉不至孔子去魯告子醴酒不設穆生去楚前漢楚元王傳孔子作春秋而子夏不能賛一辭世家呂氏著春秋而秦人不能易一字史記吕不韋傳孔子四十不惑語孟子四十不動心孟夫子斬少正卯於魯太公戮華士於齊范寗王何論西漢以楊雄為東道夫子新論東漢以楊震為闗西孔子本傳晉士弱曰國亂無象㐮九年牛僧孺曰太平無象本傳穰苴長於正吳起長於竒藝圃折中陳平起於亡命而為謀主韓信㧞於行陳而建上将梅福上書子産鑄刑書昭六趙鞅鑄刑鼎昭二十九左思字太冲作三都賦豪貴之家競相傳寫洛陽為之紙貴世説司馬遷儒之外五家班固儒之外八流盧景亮撰于夐神道碑賈山渉獵書記前班超渉獵書傳後晉束晳補亾詩六篇南陔白華華黍由庚崇邱由儀唐白居易補逸書一篇湯征姚鉉以栁子厚孝門銘表為序蕭統以髙唐神女賦為序捫虱新話文選出於蕭統而統自為之序文粹出於姚鉉而鉉自為之序楚襄王遊髙唐夢與神女遇宋玉髙唐賦楚襄王遊雲夢亦夢與神女遇宋玉神女賦衛夫人見王逸少真書云咄咄逼人法帖王子敬見王景仁名修隸行書云咄咄逼人書斷栁家元和脚東坡作手字者劉夢得羙子厚之能書也黄家元祐脚者陳無己紀魯直之善書也復齋漫録蚩尤為作亂之始三苖為虐刑之始羲即重之子孫和即黎之子孫並無垢説衛玠神清杜乂形清晉杜乂傳解狐舉怨韓子咎犯舉仇説苑虞邱子薦孫叔敖邱子家陷于法叔敖戮之虞邱子喜説苑左雄薦周舉舉後劾左雄雄悦謝之通鑑後漢順帝紀張釋之為廷尉天下無寃民于定國為廷尉民自以為不寃本傳劉寛蒲鞭後崔伯謙皮鞭北史商鞅欲變秦法則立徙木之令以示信史記吳起欲伐秦則立移轅之令以示信魏虞世南黙寫列女傳無一字謬蒋乂誦補侍臣圖贊不失一字並唐魏相奉行政事前侯霸明習故事後范武子光輔五君文襄靈成景出襄二十七年裴度事四朝憲穆敬文馮道歴五朝八姓通鑑論扁鵲之見威王以為病在骨髓史記秦緩之見晉侯以為疾在膏肓成公十年僖負覊饋重耳盤飱寘璧重耳受飱反璧僖二十三衛人饋叔向羮與錦叔向受羮反錦昭公十三唐元宗書崔琳等名覆以金甌本傳唐廢帝書姚顗數人名投琉璃瓶五代史盧文紀傳儀狄作酒夏禹時戰國䇿杜康作酒博物志孟明焚舟文三項籍湛船史記王莽稱王子僑為皇祖叔父唐髙祖稱老子為皇祖范唐鑑叚秀實倒用司農印唐繼岌倒用都統印五代趙髙指鹿為馬秦髙徳孺指野鳥為鸞唐魏謩議論有祖風狄兼謩剛正有祖風髙馮為監察彈治不避權要崔縱為中丞彈治不避權倖並唐孟軻之母斷機列女傳樂羊之妻斷織後阮籍知母而不知父雍姬知父而不知夫捫虱新話季子不禮於其嫂買臣見弃於其妻晝錦堂記張廵殺愛妾許逺殺僮奴唐鄧禹子十三人各守一藝後劉殷子七人各守一經晉郭子儀忠貫日月韓仁愿忠貫神明李華韓公廟碑戴胄為大理卿言若湧泉蘇頲為中書舍人思若湧泉唐劉寵受一錢後杜暹受紙百番唐崔洪口不言貨財崔遊口不語財利並晉李𢎞節以清謹顯既沒之後其家賣珠太宗疑其實貪亷吏傳劉宗龜姻不可干以財既沒之後其家鬻珠翠由是名損亷吏傳屈原有天問桞宗元有天對盧仝作月蝕詩云食月者月中之蝦䗫也梅聖俞作日食詩云食日者三足烏也孫興公遊天台賦序天台者葢山岳之神秀也晉張種與沈烱書虎邱者吳之神秀也陳段維一餅熟成一韻詩温庭筠一餅熟成一韵賦歸田録楊子雲有逐貧賦韓退之有送竆文淵明有形神影三首樂天有身心問荅三首少陵有四小松詩東坡有萬松亭詩聖俞有四禽詩子瞻有五禽言王逸少於書知變韓退之於詩知變陶侃用法得法外意東坡學書得書外意劉歆七畧古文或誤以見為典以陶為陰抱朴子書三寫以魚為魯以帝為虎曹不興為孫權畵屏風筆墨誤㸃因以為蠅張勃呉録桓温使王獻之畵扇筆誤落因畵作烏駮㹀牛晉田單火牛楊凝然馬長卿名犬子王修名狗子顔氏家訓雞有五徳韓詩外傳蟬有五徳陸雲蟬賦以珠彈雀荘以玉抵鵲鹽鐵論江泌不食菜心恐傷生邢峙不食邪蒿惡其名盧氏新録退之以磨蝎為身宮子瞻以磨蝎為命宫仇池筆記張敞自請治劇郡漢袁甫自言能作劇縣晉牛𢎞稱房暉為五經庫隋禇遂良稱谷那律為九經庫唐公孫景茂博渉經文稱書庫隋李涪以開元及第號周禮庫唐陸澄不能撰宋書號書厨南史李善不能屬詞號書簏唐曹子建七歩魏桞公權三歩世説劉徳千里駒前李琨吾家千里駒唐五鑿為正蜀六鑿相攘荘子張釋之十年不調前駱賔王十年不調上裴侍郎書馬融十年不得調後韋澳十年不調官唐夏侯湛累年不調抵疑序顔駟三葉不遇後漢張平子賦序忠義天下之大閑唐忠臣義傳序節義天下之大閑唐卓行傳賛陶潜預為祭文杜牧自撰墓誌劉恕外紀論芸香辟書蠧筆談魚石子亦辟書蠧秘閣閑談陳蕃周舉常相謂曰期月之間不見黄生則鄙吝之萌復見於心後漢黄憲陸象先嘗謂人曰季真賀知章字清談風流吾一日不見則鄙吝生矣唐賀知章傳示兒編卷十六
