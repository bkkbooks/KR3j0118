body:
  text: 示兒編卷八宋孫奕撰文説史異文前髙帝贊曰劉向頌云漢帝本系出自唐帝由是推之漢承堯運德祚已盛敘傳又曰皇矣漢祖纂堯之緒後漢杜林議郊祀制乃謂漢業特起功不緣堯宣帝紀曰神爵三年八月詔益吏百石以下俸十五韋昭曰若食一斛則益五斗荀悅漢紀云益吏百石以下俸五十斛劉輔上書曰腐木不可以為柱卑人不可以為主荀紀云腐木不可以為柱人婢不可以為主東漢仇覽傳為蒲亭長化不孝子陳元謝承以為陽遂亭長化不孝子羊元唐書來濟傳宣城石仲覽髙智周傳江都石仲覽唐百官志云平章事自李靖始郭正一傳自正一始百官志云太宗設官七百三十員曹確傳乃曰太宗著令文武官六百四十三員兵志曰天下府兵六百三十有四而在關中者二百六十有一陸贄奏議謂置府兵八百而關中五百太宗實録云正觀四年天下斷死罪二十九人七年天下死囚凡三百九十人自詣朝堂實録乃云二百九十人白居易樂府云死囚四百來歸獄舊本紀統紀年代記皆云二百九十人溫公考異曰今從新書刑法志新書刑法志云正觀四年天下斷死罪二十九人六年觀録囚徒憫死罪者三百九十人縱之還家期以明年秋即刑及期囚皆詣朝堂無後者太宗嘉其誠信悉原之班固賔戲曰孔席不暖墨突不黔淮南子修務訓篇曰孔子無黔突墨子無暖席前食貨志朝錯曰堯禹有九年之水湯有七年之旱而國亡捐瘠者以蓄積多而備先具也荀子富國篇云禹十年水湯七年旱而天下無菜色者十年之後年榖俱熟而陳積有餘是無他故焉知本末源流之謂也晉荀朂曰省吏不如省官省官不如省事省事不如清心唐李德裕曰省事不如省官省官不如省吏白居易傳云九嵗暗識聲律元稹白氏長慶集云五六嵗識聲韻又白氏長慶集云雞林賈人求市其詩頗切自云本國宰相每以百金換一篇本傳乃云雞林行賈售其國相亦篇易一金經史異易曰養賢以及萬民蕭何曰養其民以致賢人舜典曰四罪而天下咸服前鮑宣時政書曰堯放四罪而天下服孟子曰夏曰校殷曰序周曰庠前儒林傳曰夏曰校殷曰庠周曰序孟子曰庾公之斯學射於尹公之他離婁下左氏襄十四年尹公他學射於庾公差孟子曰詩亡然後春秋作文中子曰小雅廢春秋作文中子王道篇叔恬曰舜一嵗而巡五嶽舜典止巡四嶽破題道盡為文有三難命意上也破題次也遣辭又其次也不善遣辭則莫能敷暢其意不善涵蓄題意破題何自而道盡哉則是破題尤難者也嘗即是而觀古文第一句便道盡題意而盡善盡美者我國朝得三人焉歐陽文忠公縱囚論曰信義行於君子刑戮施於小人則一句道盡太宗求名之意矣其後韓文公廟碑蘇文忠有匹夫而為百世師一言而為天下法又一句道盡昌黎之道義矣百有餘年而至周益公必大三忠堂碑其曰文章天下之公器萬世不可得而私也節義天下之大間萬世不可得而踰也謂文忠歐陽公以文鳴忠襄楊公忠簡胡公俱以忠義鳴故首句已道盡三公平生事實然太宗文公一人耳皆易道三忠既三人又兩塗尤難道公兩句無一字無來處殆與歐蘇爭光不寧惟是以言乎表則誕皇孫賀重華宮曰有天下傳之子初微黃屋之心受帝祉施于孫俶誕青宮之胄乞致仕曰三千同臣心甫際興王之運七十致君事適臨告老之年謝復益國公曰華陽黑水裂地而封舊物青氊從天而下以言乎啓則賀陳右相曰底績政塗奮庸揆路濟巨川汝作舟楫式資利涉之功若和羮爾惟鹽梅更賴均調之助賀王德言除工部侍郎曰擢登起部仍直鑾坡閶闔晨趨班冠二卿之玉筍絲綸夜草燭搖內相之金蓮賀直院楊給事椿曰塗歸東省儤直北門論事激昻百辟憚回天之力摛文掞麗四方傳擲地之聲謝劉守冉送朱墨錢曰長者賜不敢辭正惟禮屈小人腹已屬饜過為身謀凡此皆字字破的篇篇出竒只在首聫其題意粲然靡所不載可謂文中虎也公平昔所著可觀不可殫姑舉此則嘗鼎一臠可知矣作文法艮齋先生謝公昌國自起部丐祠歸渝上嘗往謁焉舂容浹日無所不論因求作文之法先生曰余少時讀昌黎文得四字取為文法平生用不盡乃跽而請曰四字謂何答曰竒而法正而葩易詩之體盡在是矣文體亦不過是然文貴乎竒過於竒則艷故濟之以法文貴乎正過於正則朴故濟之以葩竒而有法度正而有葩華兩兩相濟不至偏勝則古作者不難到况今文乎又嘗得尚書張公茂獻文針曰作文有三病意到而辭不達如訟者抱直理口訥莫伸一病辭達而調不工如委巷相爾汝俚鄙厭聞二病調工而體不健如堂堂衣冠美丈夫而無精神三病又曰非積氣之清以為日月星辰則日月星辰不足以為天下之文非馭氣之正以為充實之文則文雖文不足以議自然之文是説也雖詩人之優逺騷客之靚深史家之詳贍一舉而兼之又豈特舉子之文而已哉賦要識題前輩作賦須看韻腳誠不易之論然近年主司亦有以韻腳誤人者如吉州出明哲通天地之心韻腳云此其實通而無間者而所取不主禮刑三代有道之長韻腳云三代長久其故可知而所取乃専主教太子筠州出明主謹養其和以知本末源流之謂也為韻而所取不主財貨乃知作賦須就題熟認不可參入外意必若太學出天子當陽韻腳云天子當陽照臨萬國則以陽字為太陽却不可不從賦須韻腳意全賀方回言學詩於前輩得八句云平淡不流於淺俗竒古不流於怪僻題詠不窘於物象序事不病於聲律比興深者通物理用事工者如已出格見於成篇渾然不可雋氣出於言外浩然不可屈盡心於此守而勿失請借此以為八韻之法茍妙達此旨始可言賦昔秦少遊賦郭子儀單騎見虜第四韻云兹蓋事方急則宜有異謀軍既孤則難拘常法遭彼虜之徑悍屬我師之困乏較之力則理必敗露示以誠則意當親狎我得不徹衛四環去兵兩夾雖鋒無鏌鎁之鋭而勢有泰山之壓踞鞍以出若無擒虎之威失隊而驚如棄華元之甲押險韻而意全若此乃為盡善凡八韻皆即此可反三隅矣近嵗效莆陽體者雖貴意全然疊字多而失之冗句法長而失之強此非善學桞下惠者也若解試省試尤貴得體切宜知之賦貴巧於使事髙安解試由也升堂賦滿場皆苦其無故實林振體狀題意獨得活法只用孔門同時之事映𢃄其第六聫云攀鱗附翼仰窺在寢之淵聞禮學詩下視過庭之鯉主文李先之朴撫案稱賞曰祗消此聫已見由也果在堂上矣遂置首選消艮齋先生謝尚書嘗云未第時試仁義天下之表制賦當時從遊場屋者衆皆閣筆無以體表制者自作第四韻散句有曰民多拱極之星世絶駭輿之馬為表制設也有學生曾其姓者巧於移掇上添兩句云如天其大民皆拱極之星若路以由世絶駭輿之馬非特唤醒得題目意透又以星襯仁天馬襯義路表制在其中矣較有工夫乃占第一豫次之作者不可不知賦以一字見工夫東坡有曰詩賦以一字見工拙誠哉是言嘗記前輩説歐公柄文衡出堯舜性仁賦取劉輝天下第一首聫句曰世陶極治之風雖稽於古內積安行之德蓋稟於天劉來謁謝頗自矜公雖喜之而嫌其積字不是性為改作藴劉頓駭服紹興己卯廬陵秋試大衍天地之樞賦劉明老破題八字云法著大衍理關萬殊主司喜其關字包盡題意取為冠場有用該字者皆末綴其後太學復出魁者亦不過用此八字郭昌明首冠宜春賦曰重明麗正化天下第三隔云德增日日之新斯能凝命世被風風之教孰不胥然以風風對日日真不經人道語也示兒編卷八
