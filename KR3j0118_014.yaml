body:
  text: 示兒編卷十四宋孫奕撰雜記無恙多能果然率然人皆知無恙為無憂而不知為蟲名人皆知多能為多材而不知為獸名按史記外戚世家云呂氏夷戚氏誅趙王而髙祖後宫獨無寵踈逺者得無恙索隱曰爾雅云恙憂也一説古者野居露宿恙噬人蟲也故人相恤云得無恙乎又按漢髙紀云吾非敢自愛恐能薄師古曰能謂材也能本獸名形似熊足似鹿為物堅中而強力故人之有賢材者皆謂之能然則以無恙配多能尤為的對又有獸名果然出國史補揚州人取果然得一果然則數十果然可得蓋果然不忍傷其類聚族而啼殺之不去也此禽獸而人心薄俗有不如者果然大類猩猩蛇名率然出山海經常山有巨蛇物觸之中首則尾至中尾則首至中腰則首尾俱至名曰率然孫子兵法曰將之三軍勢如率然者此也地有二義盤谷之名有二義或曰環山或曰盤旋而韓昌黎兩存之冉溪之名有二義或曰冉氏或曰可染而栁河東兩存之可稱之地天下可稱之地有四謝玄暉鼓吹曲云江南佳麗地是也杜甫祠南夕望詩云湖南清絶地回首一茫茫為懷錦水作也地名異梁一也而有南有大有少焉今汝州南縣為南梁皇都浚儀縣為大梁同州韓城縣為少梁蔡一也而有新有上有下焉新蔡上蔡今蔡州縣下蔡今潁川縣是也三齊三楚之有别齊與濟北膠東為三齊江陵為南楚彭城為西楚吳為東楚三蜀三吳之有異三蜀謂蜀都漢髙分置廣漢武帝分置犍為三吳今蘇潤湖州既辨三亳今曺州考城縣為北亳今南京榖城縣為南亳今西京偃師縣為西亳又分三江自豫章而下入于彭蠡而東至海為南江自蜀岷山至于九江彭蠡以入于海為中江自嶓冡導漾東流為漢過三澨大别以入于江匯于彭蠡以入于海為北江嵩髙外方一山而名二具區震澤一湖而號殊荆山有南北之異條蒙山有東西之異域地名同崆洞山有三在臨洮者秦築長城之所起也在安定者禹導涇水之所出也在臨汝者黃帝問道於廣成子之地也霍山有四南嶽之衡廬江之天柱皆謂之霍山晉之霍山在今晉州霍邑蠻氏有霍山在今汝州梁縣也汶水有二魯之汶水出泰山萊蕪縣所謂東北會于汶是也其一出朱虛縣太山北過淳于縣今濰之東南有大汶小汶是也泛水有二僖二十四年王處于泛南泛也出汝州僖三十年秦軍泛南東泛也在中牟蒙城有二楚之蒙縣莊周所居也宋之蒙縣宋萬弒閔公之地也武城有四襄十九年城武城魯地也即子遊所宰之邑也僖六年許僖公見楚子于武城楚地也文八年秦人伐晉取武城在今同州馮翊今恩州亦有武城縣漆沮既見於扶風又睹於馮翊沱潛既發於梁地復出於荆州帝王歷年以史記所載歷年計之五帝四百一十一年三代一千九百七十四年以劉恕外紀所載歷年計之五帝二百五十二年三代一千九百二十八年則外紀於五帝少一百五十九年於三代少四十六年紀元紀元非古也其起於誰乎以一字紀元者始於西漢文帝之後元年景帝之前元年中元年後元年以二字紀元者始於西漢武帝之建元以三字者始於梁武帝之中大通繼以中大同以四字者始于前漢哀帝之太初元將申於後漢光武之建武中元又申於魏大武帝之太平真君唐武后之天册萬嵗又曰萬嵗登封又曰萬嵗通天繼於我宋太宗之太平興國真宗之大中祥符徽宗之建中靖國唯復周制不改元但稱元年者自西魏廢帝始至于周明帝復改元以天紀者有天漢天策天璽天紀天監天嘉天康天興天賜天保天授天安天統天和天寶天復天祐天成天福先天又有甘露調露景雲神電以地紀者有地節地皇以乾紀者有乾明乾封唐髙宗通乾乾元乾符乾寧乾化乾祐以龍紀者有黃龍青龍神龍景龍龍翔龍朔龍德龍紀又有麟德大象神麚神龜以鳥紀者有元鳯五鳯天鳯神鳯儀鳯鳯皇又有神爵赤烏鴻嘉以瑞紀者有元鼎寶鼎寶應寶歷大寶神瑞嘉禾以元冠于上者曰元光元朔元狩元鼎元封元鳯元平元康元夀元始元初元嘉元徽元和以太冠于上者曰太初太始太元太平太和太豫太通太清太歷以大冠者曰大安大興大寧大常大延大同大明大開大統大象大寶大建大業大定大中大順以建者曰建元建昭建始建平建武建初建光建康建和建寧建安建興建國建衡建明建德建中以永者曰永光永始永平永元永初永寧永建永和永嘉永興永夀永安永熙永康永昌永明永泰永定永徽永淳永貞以景者曰景輝景元景平景和景明景初景龍景雲景福以初承于下者曰太初永初元初本初黃初景初以始承于下者曰太始本始建始永始元始更始泰始皇始太始正始以和者曰征和綏和章和永和建和光和太和咸和隆和延和景和興和天和元和中和以平者曰元平河平建平永平延平和平熹平中平初平興平嘉平升平景平正平熙平天平太平以昌者曰永昌隆昌延昌孝昌會昌以康者曰元康太康永康咸康寧康天康以寧者曰竟寧永寧建寧咸寧大寧興寧又寧乾寧以安者曰漢安建安永安太安咸安隆安興安長安以熙者曰延熙炎熙咸熙光熙義熙永熙按孔穎達云文王既王稱王而得取改元年者諸侯自於其國各稱元年元年是巳之所稱容或中年後改矣汲冡周書魏惠王有後元年漢初文帝二元景帝三元此必有因於古也其説有據故并録之通鑑周顯王紀四十五年秦惠王改其國十四年為元年注云古未有再改元蓋始於此張耘叟年歷辨誤云漢哀帝建平二年夏待詔夏賀良等言漢家歷運中衰當再受命宜改元易號乃詔改為太初元將元年號曰陳聖劉太平皇帝八月復詔蠲除之本紀但稱太初元年脫元將二字况太初本武帝號與哀世相去未逺不容更襲舊號蓋後之校讐者誤也溫公考異曰世祖中元元年四月改元續漢志云以建武三十二年為建武中元元年紀年通譜云據紀志俱出范氏而所載不同此必傳寫脫誤今官書纍經校定學者失於精審但見改元復有建武二字輒以意刪去斯為謬矣梁武帝大同大通之號俱有中字是亦憲章於此今從袁紀范書後漢光武紀以二月登封泰山四月己卯大赦改元為中元案禮儀志載封禪事云以建武三十二年為建武中元元年東夷列傳亦云建武中元二年倭奴國奉貢朝賀據紀傳俱出范氏而所載不同如此蓋後之校定者但見改元復有建武二字輒以意刪去之誤矣年號同西漢武帝紀元曰建元東晉康帝南齊髙祖亦曰建元東漢光武紀元曰建武西晉惠帝東晉元帝南齊明帝亦曰建武西漢宣帝東漢桓帝皆號元康晉明帝南北武成帝皆號太寧晉惠帝元魏文成帝皆號太安西晉愍帝蜀後主皆號建興漢章帝唐憲宗皆號元和後漢桓帝改元嘉宋文帝亦如之後漢和帝改元興東晉安帝吳烏程侯亦如之同曰黃龍者漢宣帝吳大帝也同曰五鳯者漢宣帝吳會稽王也漢宣帝魏髙貴鄉公俱曰甘露東晉安帝恭帝俱曰義熙南齊和帝魏廢帝均曰中興以泰冠于上者曰泰始則晉武帝宋明帝同曰泰和則魏明帝東晉廢帝魏文帝唐文宗同以永冠于上者曰永平則漢明帝晉惠帝魏宣帝同曰永興則漢桓帝晉惠帝魏明帝元孝武帝同曰永安則吳景帝晉惠帝同曰永康則漢桓帝晉惠帝同曰永寧則漢安帝晉惠帝同曰永初則後漢安帝宋髙祖同曰永嘉則後漢沖帝西晉懷帝同曰永和則後漢順帝東晉穆帝同曰永元則後漢和帝南齊東昏侯同曰永安則晉惠帝魏莊帝同曰永昌則晉元帝唐則天同曰永泰則南齊明帝唐代宗同以至父子有同號者漢髙祖與愍帝不改其乾祐梁太祖與末帝不改其乾化唐明宗與哀帝不改其天祐三世有同號者周太祖世宗恭帝相襲為顯德大宋藝祖皇帝與蜀主王衍同為乾德姓名同曾參與魯人同姓名而得殺人之謗史記甘茂傳宰豫與闞止同字子我而得作亂之誣史記仲尼弟子傳則凡名號同者可不參會而使之歸一乎堯時有羿淮南子云射十日有窮后羿淮南子云有窮之君二人皆善射舜臣有伯夷書注云薑姓孤竹君之子伯夷索隱曰姓墨名允字公信伯長也夷諡也一則為名一則為諡周有季子宣公十年天王母弟魯公子友閔元年字季子晉郤至成十七年字季吳季札襄三十一年衛子路戰國蘇秦史記字季皆為季子齊有夷吾莊八年管仲晉亦有之僖二十四年注晉侯夷吾周有南宫括君奭篇文王臣魯亦有之仲尼弟子即南宫縚憲問篇作南宫適管仲為敬仲髙徯定二十九年陳公子完莊二十二年皆字敬仲孔白擅弓公西與家語鬭勃僖二十八年駟帶昭十八年皆字子上孔伋原憲燕級平當皆字子思孔最冉季公孫僑皆字子産淡臺滅明公孫揮知罃皆字子羽巫馬期叔仲會皆字子期公孫兹秦非皆字子之顔由仲由皆字季路顓孫師公孫黑肱襄十八叔孫輒哀八年豐卷襄三十年琴牢皆字子張紂有左師觸龍荀子議兵篇趙亦有左師觸龍戰國䇿鄭有子西公孫夏楚有二子西大夫宜申公子申春秋時晉有趙括六國時趙亦有趙括春秋時晉有士燮三國時吳亦有士燮春秋時魯有兩公子偃一非成子庶子一是也鄭有兩公孫揮皆字子羽一非行人子羽一是也冉雍與漢陳實同字仲弓端木賜與漢王尊吾邱夀王同字子貢仲由與漢爰曾同字子路卜商與漢杜欽杜鄴孔光同字子夏前漢杜欽字子夏茂陵杜鄴與欽同姓字皆以才能稱京師故衣冠謂欽為盲杜子夏以相别欽惡以疾見詆乃為小冠髙廣財二寸由是京師更謂欽為小冠杜子夏而鄴為大冠杜子夏云宓不齊伏勝皆字子賤勝即濟南伏生出後漢伏湛傳鄭子産襄三十五唐杜甫皆字子美谷永終軍揚雄皆字子雲韋賢汲黯韓安國皆字長孺東方朔雋不疑于定國皆字曼倩司馬相如薛廣德施讎皆字長卿李陵任安丙吉皆字少卿車胤王濟皆字武子前漢枚乘晉嵇康皆字叔夜後漢邊韶魏毛玠皆字孝先漢晉孔安國同姓名漢晉王良同姓名前漢有兩韓信俱佐髙祖而一為韓王一為齊王又降為淮隂侯前後漢有兩王吉而在後漢者為酷吏後漢有兩王霸而避王莾者為逸民唐有兩李益而皆能詩又有兩韓翃而一為詩人一為刺史周唐皆有大顛而在唐者為名僧晉唐皆有李密而在晉者有孝德晉有三趙孟趙朔之子曰武諡文子稱趙孟趙武之子曰成趙成之子曰鞅又名吉父諡簡子亦稱趙孟趙鞅之子曰無恤諡襄子亦稱趙孟周有伯達後漢有公孫伯達淵明傳漢齊有三召平蕭何傳東陵侯曰召平項羽傳廣陵人亦曰召平齊悼惠王傳齊相亦曰召平趙有將曰扈輒史記李牧傳漢張耳時别有扈輒尹翁歸前鄭翁歸梁孔翁歸梁皆同名司馬食其衛酈食其審食其趙食其並漢皆同名荀闓蔡謨諸葛恢皆字道明晉賈琮班固並字孟堅後漢周有君牙唐有邢君牙梁有庾肩吾唐有施肩吾齊有孟嘗君田丈後漢有孟嘗君此皆名同而實異慕人姓名司馬相如初名犬子慕藺相如之為人更名相如前漢李綱始名瑗慕張綱之為人改名綱唐傅初起慕南容更字南容酈審趙慕衛司馬食其皆名食其項羽紀注人皆賢之惟員半千其先姓劉慕伍員而改為員氏則又甚焉姓可改也孰不可改也廣韻員音運注云姓也唐有刺史員半千不類名字馮野王習鑿齒劉牢之劉黑闥張開地張良傳乃良大父也殷開山李百藥劉大真吳武陵宗楚客牛仙客東郭咸陽名咸陽漢武帝時人不類名也竇嬰字王孫嚴彭祖字公子朱買臣字翁子趙充國字翁孫杜茂字諸公張宗字諸君施延字君子徐稚字孺子石沖字幼子胡常字少子羊祐字叔子張興字君上李宗字尊祖劉祐字伯祖李密字令伯裴光庭字連城薛平字坦塗獨孤郁字古風斛律光字明月李靖字藥師蕭瑀字時文桞公權字誠懸王維字摩詰何曽字潁秀裴頠字逸民傅嘏字蘭石牛僧孺字思賈島字浪仙不類名字也陳寵字昭公劉昆字桓公陳重字景公伏湛字惠公呂岱字定公竇融字周公袁安字邵公直類古之諸侯耳浩生不害吾丘夀王不類姓名也示兒編卷十四
