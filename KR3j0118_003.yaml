body:
  text: 示兒編卷三宋孫奕撰經說詩章句對耦章句始於詩對耦亦始於詩故三言若深則厲之類四言若關關雎鳩之類五言若于嗟乎騶虞六言若狂童之狂也且七言若遭我乎峱之間兮八言若十月蟋蟀入我牀下是以後世由三言至七言皆自此始如覯閔既多受侮不少誨爾諄諄聽我藐藐發彼小豝殪此大兕豈不爾受既其女遷念子懆懆視我邁邁之句無一字非的對則世之駢四儷六抽黃對白者得非又發端於是與相鼠相鼠有體人而無禮胡不遄死相州名陸璣云河東有大鼠能人立交前兩腳於頭上跳舞善鳴故退之城南聨句云禮鼠拱而立按地志相州屬河北與河東相鄰則知相州有此鼠能拱而人立其有禮之體如此詩人蓋取譬焉毛氏以相為視信如毛說則視物之有體與皮者皆可喻禮何取於鼠哉或謂相州當平聲呼非也世言相纈亦有所本陳無己詩云相州紅纈鄂州花相字可平音呼哉東坡指掌圖亦云河亶甲居相即今相州是也凱風凱風美孝子也衛之淫風流行雖有七子之母猶不能安其室當以之母屬下猶不能安其室為句如經云之子于歸莊子云之人也之德也之二蟲又何知之類黃鳥黃鳥有二種名同而實異小大殊也如黃鳥于飛集于灌木其鳴喈喈睍睆黃鳥載好其音鶯也詩人取其善鳴者也如交交黃鳥止于棘于桑于楚者黃雀也詩人言其交交而集于楚棘者衆多也如黃鳥黃鳥無啄我粟我粱我黍亦黃雀也蓋啄其粟與粱黍正今人稻粱熟時黃雀羣集于田壠以啄為人所羅所逐者正謂此耳毛氏陸氏謂黃鶯一名搏黍能搏黍則亦當是黃雀况黍熟於七八月之間亦無復有鶯矣鴇兔古語有曰鴇無舌無脾人皆疑焉嘗以鴇羽兔爰二詩推之信其有證蓋聲出乎舌鴇之為禽無舌則無聲也故詩人以鴇羽刺君子久從征役不得養其親而無舌以訴其情也脾屬土土主信兔之為獸無脾則無信也故詩人以兔爰刺桓王之失信而無脾以表其信也鸒斯小辨辨彼鸒斯孔謂此鳥名鸒而云斯者語辭其說誠有據及考董氏則信爾雅禽經師曠以二字為名李適中則又信楊子以二字為名曾不思詩人以斯為語助者多矣如彼何人斯哀我人斯湛湛露斯彼旟旐斯恩斯勤斯鬻子之閔斯以詛爾斯天難忱斯無射於人斯類皆云然何董李獨信諸子百家而不信經耶借曰詩亦有以螽斯名蟲然七月云斯螽其實一物容可以一切已前之語辭者顚倒其文而均指為物名乎不然此篇又有栁斯鹿斯亦將併以二字為栁鹿名可乎居諸柏舟曰日居月諸胡迭而微孔曰居諸者語助也日月曰日居月諸照臨下土毛曰日乎月乎照臨之也豫謂孟子注諸海求諸逺左氏拘諸原免諸國此諸訓於也而韵釋於字亦訓居也諸猶於也於猶居也言日月皆有所在未嘗失其軌度獨仁人不遇於頃公莊姜不見答於莊公此二詩所以自傷而作也孔皆以為助語脫或讀作何居之居則可如本字讀則不可毛並謂之乎以乎字釋諸則是以釋居字義似不通韓文公為爾惜居諸之句誠有味當求之死生契闊死生契闊與子成說契舊音挈非當作契合之契說如字契合也闊離也謂死生離合與汝成誓言矣衡門衡門一篇誘掖其君之詩也凡誘掖之說必使之心競而力爭蓋自卑者抗之使髙自惰者激之使勤自退者揚之使進自用者恢之使大如雖愚必明雖柔必强乃所謂懦而有立志者也說者謂衡門雖小可以棲遲泌水非廣可以樂饑食不必魴鯉娶不必姜子非也此詩三章首章言可以棲遲可以樂饑先發其端也中末二章言食必魴鯉娶必姜子者次陳其說也若曰衡門可棲遲泌水可樂饑則何以食魚者必須魴鯉之美味娶妻者必須姜子之大姓則知前曰可者真不可也後曰必者不得不必也此乃見其君願而無立志故作是詩以誘掖之也說此詩者死於語下則失之東門之楊東門之楊刺時也㛰姻失時男女多違親迎女猶有不至者也當以親迎二字為句七月兼夏周正周公作七月備陳一嵗之事而正則迭用夏周何也意其夏正建寅順四時之序便於農事乃以月言周正建子明一陽之生以改正朔乃以日言蓋周公以日月分隂陽謂隂生於午是以五月六月七月八月九月十月皆屬隂故以月言之謂陽生於子是以一之日二之日三之日四之日皆屬陽故以日言之若夫夏之三月不曰五之日而曰春日載陽言可蠶之候所謂季春之月躬桑以勸蠶事也月令夏之四月不曰六之日而曰四月秀葽蓋正陽之月嫌於無隂亦猶十月嫌於無陽謂之嵗亦陽止也常棣常棣常字諸家並無音合如字讀采薇曰維常之華毛謂常為常棣亦無音常棣與唐棣異俗或書作棠棣尤非其四章曰兄弟䦧於墻外禦其務每有良朋蒸也無戎陸音務如字鄭曰務侮也爾雅釋言亦云侮也按僖公二十四年富辰曰詩曰兄弟䦧於墻外禦其侮韓詩外傳曰周文公之詩曰兄弟䦧于墻外禦其侮國語富辰諫襄王曰古人有言兄弟讒䦧侮人百里比毛詩以務為侮其義明甚戎字叶韻當作戌戌亦禦也黽勉黽勉從事者黽蛙屬也蟈氏掌去蛙黽注謂蛙為蟈黽耿黽也蟈與耿黽尤怒鳴退之雜詩蛙黽鳴無謂閣閣秪亂人即其蟲也蛙黽之行勉强自力故曰黽勉如猶之為獸其行趦趄故曰猶豫南山有臺賢才不在野則聚於朝勢也亦理也南山北山皆賢者昔日窮處之地今徒見其有臺萊之草桑楊把李栲杻枸楰之木盛多如此而無一賢之遺逸於其間故作南山有臺之詩而序則曰樂得賢也五章反復詠歎而美之皆是意也非謂山之有草木喻國之有賢人衆多也天保君能下下以成其政陸音下下俱户嫁反非上下字依舊音下下字亥雅反思齊以思齊名篇序詩者偶無其說釋者無所考信直以齊訓莊似非文王儀刑於大姒之本意齊當讀如見賢思齊之齊文王有聖德以刑於寡妻故大姒既思有以同於大任又思有以順謁媚訓順於周姜也不然首章何以云思齊大任思媚周姜下武下武繼文也下者猶言不上也不上武則是下其武事以繼文德此武王之本心其或用武蓋不得已耳即非右武之君故曰一戎衣天下大定示天下弗復用也不然篇名下武而此詩未始一言及武詩人之作蓋有深意六官成王作周官見之於書自三公三孤之外有六卿分職率屬各有司存未嘗以象天地四時今考周禮無所謂三公三孤借曰既載之書不必贅可也而書謂冢宰掌邦治此乃以為天官况天事多在春官而臣不可稱天乎司徒掌邦教此乃以為地官况地事本主於司空而司徒可稱地乎以宗伯掌禮之官而曰春官春主生物而屬仁反主禮乎以司馬掌兵之官而曰夏官夏物盛而方長反主兵乎惟以司寇掌刑為秋官可矣至以司空掌工為冬官豈理也哉設若成王果以象天地四時則書必載之書所不載則亦無是事也以周官之言質周禮之六官相戾如此信乎周禮非周公之全書也八柄太宰以八柄詔王馭羣臣夫八柄之法先叙賞而後論罰賞多而罰少蓋爵祿豫置生者賞之柄也奪廢誅者罰之柄也賞先而多罰後而少周家忠厚不在茲乎宫正宮正凡邦之事蹕宮中句廟中則執燭言有王祭祀之事宮正則為王蹕於宮中祭於廟中則主執燭之役焉蓋廟中不蹕也宫伯獨不垂法象魏周禮一書其載制度紀綱庶事備自昔論者皆以為六官之所掌無一或闕也然以今考之則惟五官垂法於象魏而宗伯獨略於是焉是則若有可疑者然治教政刑事均曰象者實畫所用兵具之象於魏闕也其闕之上既可垂又可斂使萬民而觀者必有具之可指焉凡可以隨其治具而圖寫之特其治之粗迹耳若夫宗伯不布法非略也不容以象言也亦不容以粗迹著也經禮三百曲禮三千以和邦國以諧萬民進退揖遜之儀冠㛰喪祭之用班朝治軍之式蒞官行法之制防民為亂禁民為非蓋舍此孰能使之然也故天下之人日用常行而不可須㬰離曽何待於有司之詔告而可以一象魏盡之哉侯服職方氏辨九州之圖方千里曰王畿其外方五百里曰侯服按孔安國以謂斥候孔穎逹以謂侯聲近候且曰斥候謂檢行險阻伺候盜賊見禹貢解其發明多矣故附于此園㕓二十而一載師凡任地國宅無征園廛二十而一近郊十一逺郊二十而三甸稍縣都皆無過十二惟其漆林之征二十而五說者以為田稅非也竊詳鄭康成謂園廛亦輕之者廛無穀園少利鄭已得其說而未盡蓋在國之園廛既二十而一如近郊逺郊甸稍縣都之園廛自近而逺雖漸增亦不過乎十二讀禮者當自近郊至縣都以上皆承上園廛之文而求之不然漆林之征何以止於二十而五也載師閭師載師凡宅不毛者有里布凡田不耕者出屋粟凡民無職事者出夫家之征閭師凡無職者出夫布凡庶民不畜者祭無牲不耕者祭無盛不樹者無椁不蠶者不帛不績者不衰其責一何或重或輕耶載師之法掌士大夫受地之賦而閭師之法掌庶民受田之賦者也夫所謂不毛不耕無職事者蓋士大夫有分地而縱其民遊惰末作故罰其受地之人也重士大夫受地既多則其責也不得不重夫所謂無職不畜不耕不樹不蠶不績者蓋庶民受井田而或至於惰遊廢耕故責其受田之人也輕民受百畝則其責也不得不輕脫字按地官廛人之後有胥師釋文亦有胥師而正經止曰胥當是脫字司險司險𨽻夏官司馬又儕於掌固掌疆蓋周公謹固封守之職也是以五溝者設壕塹五重以捍患防盜也五塗者即壕上為五路以通車徒兵馬也鄭康成乃以五溝為遂溝洫澮川五塗為徑畛涂道路是指為田畝則失其㫖萍氏萍氏掌幾酒謹酒神農書曰萍能勝酒取其不沈溺於酒也示兒編卷三
